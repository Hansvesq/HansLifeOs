<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Vida</title>

  <link rel="preconnect" href="https://rsms.me/" crossorigin>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">

  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter var', 'Inter', 'system-ui', '-apple-system', 'sans-serif'],
            display: ['Inter var', 'Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            ink: { DEFAULT: '#0a0a0a', soft: '#1c1c1e', softer: '#2c2c2e' },
            paper: { DEFAULT: '#ffffff', soft: '#fafafa', softer: '#f4f4f5' },
            accent: {
              blue: '#0A84FF', green: '#30D158', red: '#FF453A', orange: '#FF9F0A',
              yellow: '#FFD60A', pink: '#FF375F', purple: '#5E5CE6', teal: '#64D2FF',
            }
          },
          borderRadius: { '4xl': '2rem' },
          boxShadow: {
            'soft':    '0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04)',
            'softer':  '0 1px 1px rgba(0,0,0,.03)',
            'lift':    '0 8px 30px rgba(0,0,0,.08)',
          },
        }
      }
    }
  </script>

  <style>
    html, body, #root { height: 100%; }
    body {
      font-feature-settings: 'cv11','ss01','ss03','cv02';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #fafafa;
      overscroll-behavior-y: none;
    }
    .dark body { background: #0a0a0a; }
    @supports (font-variation-settings: normal) { body { font-family: 'Inter var', sans-serif; } }
    .hairline { box-shadow: 0 0 0 1px rgba(0,0,0,.06); }
    .dark .hairline { box-shadow: 0 0 0 1px rgba(255,255,255,.08); }
    .hairline-b { box-shadow: 0 1px 0 rgba(0,0,0,.06); }
    .dark .hairline-b { box-shadow: 0 1px 0 rgba(255,255,255,.08); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
    .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); background-clip: content-box; }
    .glass { background: rgba(255,255,255,.72); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); }
    .dark .glass { background: rgba(10,10,10,.72); }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    select { background-image: none; }
    [data-lucide] { width: 1em; height: 1em; }
    button, [role="button"] { -webkit-tap-highlight-color: transparent; }
    .grad-ink { background: linear-gradient(180deg,#0a0a0a,#3a3a3a); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .dark .grad-ink { background: linear-gradient(180deg,#fff,#bdbdbd); -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* ---- Animaciones ---- */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: none; } }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); } }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes pulse-ring { 0% { transform: scale(.9); opacity: .8; } 80%, 100% { transform: scale(1.6); opacity: 0; } }
    @keyframes slide-right { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes float-up { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-40px); opacity: 0; } }

    .anim-in       { animation: fadeIn .35s cubic-bezier(.16,1,.3,1) both; }
    .anim-scale-in { animation: scaleIn .25s cubic-bezier(.16,1,.3,1) both; }
    .anim-pop      { animation: pop .35s cubic-bezier(.34,1.56,.64,1); }
    .anim-sheet    { animation: sheetUp .32s cubic-bezier(.32,.72,0,1) both; }
    .anim-shimmer  { background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; }

    /* Stagger helpers */
    .stagger > * { animation: fadeIn .35s cubic-bezier(.16,1,.3,1) both; }
    .stagger > *:nth-child(1) { animation-delay: .02s; }
    .stagger > *:nth-child(2) { animation-delay: .04s; }
    .stagger > *:nth-child(3) { animation-delay: .06s; }
    .stagger > *:nth-child(4) { animation-delay: .08s; }
    .stagger > *:nth-child(5) { animation-delay: .10s; }
    .stagger > *:nth-child(6) { animation-delay: .12s; }
    .stagger > *:nth-child(7) { animation-delay: .14s; }
    .stagger > *:nth-child(8) { animation-delay: .16s; }
    .stagger > *:nth-child(9) { animation-delay: .18s; }
    .stagger > *:nth-child(10) { animation-delay: .20s; }

    .press { transition: transform .15s cubic-bezier(.16,1,.3,1); }
    .press:active { transform: scale(.96); }

    /* number ticker */
    .ticker { font-variant-numeric: tabular-nums; }

    /* day cell calendar */
    .day-cell { transition: transform .2s cubic-bezier(.16,1,.3,1), box-shadow .2s; }
    .day-cell:hover { transform: scale(1.06); z-index: 2; }

    /* checkmark draw */
    @keyframes drawCheck { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
    .check-draw path { stroke-dasharray: 24; stroke-dashoffset: 24; animation: drawCheck .3s cubic-bezier(.16,1,.3,1) forwards; }

    /* shake on error */
    @keyframes shake { 10%, 90% { transform: translateX(-1px); } 20%, 80% { transform: translateX(2px); } 30%, 50%, 70% { transform: translateX(-4px); } 40%, 60% { transform: translateX(4px); } }
    .anim-shake { animation: shake .5s; }

    /* float +1 */
    .floater { position: absolute; pointer-events: none; animation: float-up .8s ease-out forwards; font-weight: 600; }
  </style>
</head>
<body class="font-sans text-ink dark:text-white">
  <div id="root"></div>
  <canvas id="confetti-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:9999;display:none"></canvas>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="env,react">
  /* =========================================================
     Vida — App de control personal con sync
     ========================================================= */

  const { useState, useEffect, useMemo, useRef, useCallback, createContext, useContext } = React;

  /* ---------- constantes ---------- */
  const AREAS = [
    { id: 'gym',      name: 'Gimnasio',     icon: 'dumbbell',         accent: '#FF453A' },
    { id: 'nakit',    name: 'Nakit',        icon: 'gem',              accent: '#FF9F0A' },
    { id: 'vdl',      name: 'VDL',          icon: 'briefcase',        accent: '#0A84FF' },
    { id: 'uni',      name: 'Universidad',  icon: 'graduation-cap',   accent: '#5E5CE6' },
    { id: 'personal', name: 'Personal',     icon: 'heart',            accent: '#FF375F' },
  ];
  const AREA_BY_ID = Object.fromEntries(AREAS.map(a => [a.id, a]));
  const CATEGORIAS_GASTO = ['Comida','Transporte','Suscripciones','Universidad','Salud','Ropa','Salidas','Materiales Nakit','Otros'];
  const CATEGORIAS_INGRESO = ['Salario VDL','Venta Nakit','Feria Nakit','Regalo','Otros'];

  /* ---------- helpers fecha/dinero/uid ---------- */
  const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-3);
  const todayISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
  const fmtMoney = (n) => '₡' + Math.round(n).toLocaleString('es-CR');
  const fmtDate = (iso, opts = { day:'numeric', month:'short' }) => {
    if (!iso) return ''; const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
    return d.toLocaleDateString('es-CR', opts);
  };
  const dayName = (iso) => ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'][new Date(iso+'T00:00:00').getDay()];
  const dayNameShort = (iso) => ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][new Date(iso+'T00:00:00').getDay()];
  const daysBetween = (a, b) => Math.round((new Date(b)-new Date(a))/86400000);
  const addDays = (iso, n) => { const d = new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
  const monthKey = (iso) => iso.slice(0,7);
  const isFuture = (iso) => iso > todayISO();
  const isPast = (iso) => iso < todayISO();

  /* =========================================================
     Sonidos sintetizados (Web Audio)
     ========================================================= */
  const SoundFX = (() => {
    let ctx = null;
    let muted = false;
    const ensureCtx = () => {
      if (!ctx) {
        try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
      }
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    };
    const tone = (freq, dur=0.1, type='sine', vol=0.07, attack=0.005, release=null) => {
      if (muted) return;
      const c = ensureCtx(); if (!c) return;
      const osc = c.createOscillator(); const gain = c.createGain();
      const filter = c.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 8000;
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime);
      gain.gain.setValueAtTime(0, c.currentTime);
      gain.gain.linearRampToValueAtTime(vol, c.currentTime + attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + (release || dur));
      osc.connect(filter); filter.connect(gain); gain.connect(c.destination);
      osc.start(); osc.stop(c.currentTime + dur + 0.05);
    };
    const noise = (dur=0.08, vol=0.04) => {
      if (muted) return;
      const c = ensureCtx(); if (!c) return;
      const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2 - 1) * (1 - i/data.length);
      const src = c.createBufferSource(); src.buffer = buf;
      const filter = c.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 1000;
      const gain = c.createGain(); gain.gain.value = vol;
      src.connect(filter); filter.connect(gain); gain.connect(c.destination); src.start();
    };
    return {
      setMuted: (m) => { muted = m; },
      isMuted: () => muted,
      tap:     () => tone(2000, 0.03, 'sine', 0.025),
      check:   () => { tone(880, 0.06, 'triangle', 0.07); setTimeout(()=>tone(1318, 0.10, 'triangle', 0.06), 35); },
      uncheck: () => tone(440, 0.08, 'triangle', 0.04),
      success: () => { tone(523, 0.08, 'sine', 0.08); setTimeout(()=>tone(659, 0.08, 'sine', 0.08), 80); setTimeout(()=>tone(784, 0.18, 'sine', 0.08), 160); },
      coin:    () => { tone(987, 0.05, 'square', 0.05); setTimeout(()=>tone(1318, 0.12, 'square', 0.04), 50); },
      cash:    () => { for (let i=0;i<5;i++) setTimeout(()=>tone(1200+Math.random()*800, 0.06, 'square', 0.04), i*40); setTimeout(()=>noise(0.18,0.05), 250); },
      milestone: () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f, 0.18, 'triangle', 0.08), i*90)); },
      whoosh:  () => { noise(0.15, 0.025); },
      error:   () => tone(180, 0.18, 'sawtooth', 0.04),
      wake:    () => { ensureCtx(); },
    };
  })();

  /* =========================================================
     Confetti (canvas)
     ========================================================= */
  function fireConfetti({ count = 80, duration = 1800, originX = null, originY = null } = {}) {
    const canvas = document.getElementById('confetti-canvas');
    if (!canvas) return;
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const resize = () => { canvas.width = innerWidth*dpr; canvas.height = innerHeight*dpr; canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px'; ctx.scale(dpr,dpr); };
    resize();
    const colors = ['#FF453A','#FF9F0A','#FFD60A','#30D158','#0A84FF','#5E5CE6','#FF375F'];
    const ox = originX ?? innerWidth/2, oy = originY ?? innerHeight*0.4;
    const parts = Array.from({length:count}, () => ({
      x: ox + (Math.random()-0.5)*40, y: oy,
      vx: (Math.random()-0.5)*14, vy: -Math.random()*16 - 8,
      g: 0.5,
      rot: Math.random()*Math.PI*2, vr: (Math.random()-0.5)*0.4,
      size: 6 + Math.random()*8, color: colors[Math.floor(Math.random()*colors.length)],
      shape: Math.random() > 0.5 ? 'rect' : 'circle',
    }));
    const start = performance.now();
    const tick = (t) => {
      const elapsed = t - start;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const fade = Math.max(0, 1 - elapsed/duration);
      for (const p of parts) {
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.fillStyle = p.color; ctx.globalAlpha = fade;
        if (p.shape === 'rect') ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
        else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
        ctx.restore();
      }
      if (elapsed < duration) requestAnimationFrame(tick);
      else { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display = 'none'; }
    };
    requestAnimationFrame(tick);
  }

  function vibrate(ms = 8) { if (navigator.vibrate) try { navigator.vibrate(ms); } catch {} }

  /* =========================================================
     Sync con GitHub Gist
     ========================================================= */
  const GIST_DESC = 'Vida app data';
  const GIST_FILE = 'vida-data.json';

  async function gistVerifyToken(token) {
    const r = await fetch('https://api.github.com/user', { headers: { Authorization: `token ${token}` } });
    if (!r.ok) throw new Error('Token inválido o sin permisos.');
    return r.json();
  }
  async function gistFindOrCreate(token, initialData) {
    const list = await fetch('https://api.github.com/gists?per_page=100', { headers: { Authorization: `token ${token}` } }).then(r => r.json());
    let g = (list || []).find(x => x.description === GIST_DESC);
    if (!g) {
      const created = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: GIST_DESC, public: false, files: { [GIST_FILE]: { content: JSON.stringify(initialData || {}) } } }),
      });
      if (!created.ok) throw new Error('No se pudo crear el gist.');
      g = await created.json();
    }
    return g.id;
  }
  async function gistRead(token, id) {
    const r = await fetch(`https://api.github.com/gists/${id}`, { headers: { Authorization: `token ${token}` } });
    if (!r.ok) throw new Error('No se pudo leer el gist.');
    const g = await r.json();
    const f = g.files[GIST_FILE];
    if (!f) return null;
    if (f.truncated) {
      const raw = await fetch(f.raw_url, { headers: { Authorization: `token ${token}` } });
      return JSON.parse(await raw.text());
    }
    try { return JSON.parse(f.content); } catch { return null; }
  }
  async function gistWrite(token, id, data) {
    const r = await fetch(`https://api.github.com/gists/${id}`, {
      method: 'PATCH',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(data) } } }),
    });
    if (!r.ok) throw new Error('No se pudo guardar.');
    return true;
  }

  /* =========================================================
     Estado global
     ========================================================= */
  const STORAGE_KEY = 'vida_v2';
  const AUTH_KEY = 'vida_auth_v1';

  const defaultState = {
    profile: { name: '', onboarded: false, _updatedAt: 0 },
    accounts: { personal: { balance: 201000, name: 'Personal' }, nakit: { balance: 0, name: 'Nakit' } },
    transactions: [],
    habits: [],
    todos: [],          // { id, text, areaId, date(YYYY-MM-DD), createdAt, completedAt|null }
    events: [],
    settings: { theme: 'system', sound: true, _version: 2 },
    stats: { confettiSeen: {} },
  };

  const StoreCtx = createContext(null);
  const useStore = () => useContext(StoreCtx);

  function loadLocal() {
    try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return defaultState;
      const p = JSON.parse(raw);
      return { ...defaultState, ...p,
        profile: { ...defaultState.profile, ...(p.profile||{}) },
        accounts: { ...defaultState.accounts, ...(p.accounts||{}) },
        settings: { ...defaultState.settings, ...(p.settings||{}) },
        stats: { ...defaultState.stats, ...(p.stats||{}) },
      };
    } catch { return defaultState; }
  }
  function saveLocal(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }
  function loadAuth() { try { return JSON.parse(localStorage.getItem(AUTH_KEY) || 'null'); } catch { return null; } }
  function saveAuth(a) { try { if (a) localStorage.setItem(AUTH_KEY, JSON.stringify(a)); else localStorage.removeItem(AUTH_KEY); } catch {} }

  function StoreProvider({ children }) {
    const [state, setState] = useState(loadLocal);
    const [auth, setAuth] = useState(loadAuth); // { token, user, gistId } | null
    const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | synced | error | offline
    const [authBusy, setAuthBusy] = useState(false);
    const syncTimer = useRef(null);
    const lastSavedRef = useRef('');

    // theme
    useEffect(() => {
      const html = document.documentElement;
      const apply = () => {
        const t = state.settings.theme;
        const dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        html.classList.toggle('dark', dark);
      };
      apply();
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      mq.addEventListener('change', apply);
      return () => mq.removeEventListener('change', apply);
    }, [state.settings.theme]);

    // sound
    useEffect(() => { SoundFX.setMuted(!state.settings.sound); }, [state.settings.sound]);

    // local persist + remote debounced sync
    useEffect(() => {
      saveLocal(state);
      if (!auth) return;
      const serial = JSON.stringify(state);
      if (serial === lastSavedRef.current) return;
      clearTimeout(syncTimer.current);
      setSyncStatus('syncing');
      syncTimer.current = setTimeout(async () => {
        try {
          await gistWrite(auth.token, auth.gistId, state);
          lastSavedRef.current = serial;
          setSyncStatus('synced');
        } catch (e) { setSyncStatus('error'); }
      }, 1500);
    }, [state, auth]);

    const update = useCallback((fn) => setState(s => fn(structuredClone(s))), []);

    const login = useCallback(async (token) => {
      setAuthBusy(true);
      try {
        const user = await gistVerifyToken(token);
        const gistId = await gistFindOrCreate(token, state);
        const remote = await gistRead(token, gistId);
        let useRemote = false;
        if (remote && remote.profile && remote.profile.onboarded) {
          // Si el remoto está onboarded y hay datos, preferimos remoto al hacer login
          useRemote = true;
        }
        if (useRemote) {
          setState({ ...defaultState, ...remote,
            profile: { ...defaultState.profile, ...(remote.profile||{}) },
            accounts: { ...defaultState.accounts, ...(remote.accounts||{}) },
            settings: { ...defaultState.settings, ...(remote.settings||{}) },
            stats: { ...defaultState.stats, ...(remote.stats||{}) },
          });
        }
        const newAuth = { token, user: { login: user.login, name: user.name, avatar: user.avatar_url }, gistId };
        saveAuth(newAuth); setAuth(newAuth); setSyncStatus('synced');
        return true;
      } catch (e) {
        setSyncStatus('error'); throw e;
      } finally { setAuthBusy(false); }
    }, [state]);

    const logout = useCallback(() => {
      saveAuth(null); setAuth(null); setSyncStatus('idle');
    }, []);

    /* ----- acciones de dominio ----- */
    const actions = useMemo(() => ({
      setProfile: (patch) => update(s => { Object.assign(s.profile, patch); return s; }),
      setSettings: (patch) => update(s => { Object.assign(s.settings, patch); return s; }),
      setAccounts: (patch) => update(s => { Object.assign(s.accounts, patch); return s; }),

      addTransaction: (tx) => update(s => {
        const t = { id: uid(), date: todayISO(), ...tx };
        s.transactions.unshift(t);
        const acc = s.accounts[t.account];
        if (acc) acc.balance += (t.type === 'income' ? +t.amount : -+t.amount);
        return s;
      }),
      removeTransaction: (id) => update(s => {
        const i = s.transactions.findIndex(t => t.id === id); if (i < 0) return s;
        const t = s.transactions[i]; const acc = s.accounts[t.account];
        if (acc) acc.balance -= (t.type === 'income' ? +t.amount : -+t.amount);
        s.transactions.splice(i,1); return s;
      }),

      addHabit: (h) => update(s => { s.habits.push({ id: uid(), createdAt: todayISO(), log: {}, ...h }); return s; }),
      removeHabit: (id) => update(s => { s.habits = s.habits.filter(h => h.id !== id); return s; }),
      toggleHabit: (id, date) => update(s => {
        const h = s.habits.find(x => x.id === id); if (!h) return s;
        h.log[date] = !h.log[date];
        if (!h.log[date]) delete h.log[date];
        return s;
      }),

      addTodo: (todo) => update(s => {
        s.todos.push({ id: uid(), createdAt: todayISO(), completedAt: null, areaId: 'personal', date: todayISO(), ...todo });
        return s;
      }),
      updateTodo: (id, patch) => update(s => { const t = s.todos.find(x => x.id === id); if (t) Object.assign(t, patch); return s; }),
      removeTodo: (id) => update(s => { s.todos = s.todos.filter(t => t.id !== id); return s; }),
      toggleTodo: (id) => update(s => {
        const t = s.todos.find(x => x.id === id); if (!t) return s;
        t.completedAt = t.completedAt ? null : new Date().toISOString();
        return s;
      }),

      addEvent: (e) => update(s => { s.events.unshift({ id: uid(), status:'planned', items:[], sales:[], notes:'', openingFloat:0, ...e }); return s; }),
      updateEvent: (id, patch) => update(s => { const e = s.events.find(x => x.id === id); if (e) Object.assign(e, patch); return s; }),
      removeEvent: (id) => update(s => { s.events = s.events.filter(e => e.id !== id); return s; }),
      addEventItem: (eventId, item) => update(s => { const e = s.events.find(x => x.id === eventId); if (e) e.items.push({ id: uid(), name:'', price:0, ...item }); return s; }),
      updateEventItem: (eventId, itemId, patch) => update(s => { const e = s.events.find(x => x.id === eventId); if (!e) return s; const it = e.items.find(i => i.id === itemId); if (it) Object.assign(it, patch); return s; }),
      removeEventItem: (eventId, itemId) => update(s => { const e = s.events.find(x => x.id === eventId); if (e) e.items = e.items.filter(i => i.id !== itemId); return s; }),
      addSale: (eventId, sale) => update(s => {
        const e = s.events.find(x => x.id === eventId); if (!e) return s;
        const total = sale.lines ? sale.lines.reduce((a,l)=>a+l.price*l.qty,0) : 0;
        e.sales.push({ id: uid(), ts: Date.now(), method: sale.method||'efectivo', ...sale, total });
        return s;
      }),
      removeSale: (eventId, saleId) => update(s => { const e = s.events.find(x => x.id === eventId); if (e) e.sales = e.sales.filter(x => x.id !== saleId); return s; }),
      closeEvent: (eventId) => update(s => {
        const e = s.events.find(x => x.id === eventId); if (!e) return s;
        e.status = 'closed';
        const total = e.sales.reduce((a,sa)=>a+sa.total,0);
        if (total > 0) {
          s.transactions.unshift({ id: uid(), date: e.endDate || todayISO(), account: 'nakit', type: 'income', amount: total, category: 'Feria Nakit', note: `Cierre de ${e.name}`, eventId: e.id });
          s.accounts.nakit.balance += total;
        }
        return s;
      }),

      markConfetti: (key) => update(s => { s.stats.confettiSeen[key] = true; return s; }),
      reset: () => setState(defaultState),
      importState: (obj) => setState({ ...defaultState, ...obj }),
    }), [update]);

    return <StoreCtx.Provider value={{ state, actions, auth, login, logout, syncStatus, authBusy }}>{children}</StoreCtx.Provider>;
  }

  /* =========================================================
     Cálculo del estado de un día (cumplido / a medias / fallido)
     ========================================================= */
  function dayStatus(state, dateISO) {
    const today = todayISO();
    // Ítems del día: todos los hábitos que existían en/antes del día + todos los todos asignados a ese día
    const habitsForDay = state.habits.filter(h => h.createdAt <= dateISO);
    const todosForDay = state.todos.filter(t => t.date === dateISO);
    const totalH = habitsForDay.length;
    const totalT = todosForDay.length;
    const total = totalH + totalT;
    const doneH = habitsForDay.filter(h => h.log[dateISO]).length;
    const doneT = todosForDay.filter(t => !!t.completedAt).length;
    const done = doneH + doneT;
    const score = total > 0 ? done/total : 0;

    let status;
    if (total === 0) status = 'empty';            // sin plan
    else if (score >= 1) status = 'done';
    else if (dateISO > today) status = 'planned';
    else if (dateISO === today) status = 'inProgress';
    else if (score >= 0.5) status = 'partial';
    else status = 'failed';

    return { status, score, done, total, doneH, totalH, doneT, totalT };
  }

  function CountUp({ value, format = (n)=>n, duration = 600 }) {
    const [n, setN] = useState(value);
    const fromRef = useRef(value);
    useEffect(() => {
      const from = fromRef.current; const to = value;
      if (from === to) return;
      const start = performance.now();
      let raf;
      const tick = (t) => {
        const p = Math.min(1, (t-start)/duration);
        const eased = 1 - Math.pow(1-p, 3);
        setN(from + (to-from)*eased);
        if (p < 1) raf = requestAnimationFrame(tick);
        else fromRef.current = to;
      };
      raf = requestAnimationFrame(tick);
      return () => cancelAnimationFrame(raf);
    }, [value]);
    return <span className="ticker">{format(n)}</span>;
  }

  function SyncDot({ status }) {

    return <span className="inline-flex h-2 w-2 rounded-full" style={{background:c, boxShadow: status==='syncing' ? '0 0 12px '+c : 'none'}}/>;
  }
  function SyncLabel({ status }) { return { synced:'Sincronizado', syncing:'Sincronizando…', error:'Error de sync', idle:'Local', offline:'Sin red' }[status] || 'Local'; }

  /* =========================================================
     HOY (To-do + hábitos combinados)

  function TodayView({ go }) {
    const { state, actions } = useStore();
    const [tab, setTab] = useState('today'); // today | tomorrow | habits

    const [todoFormOpen, setTodoFormOpen] = useState(false);
    const [todoFormDate, setTodoFormDate] = useState(todayISO());

    const tomorrow = addDays(today, 1);
    const targetDate = tab === 'tomorrow' ? tomorrow : today;

    const habitsForTarget = state.habits.filter(h => h.createdAt <= targetDate);
    const todosForTarget = state.todos.filter(t => t.date === targetDate);

    return (
      <div className="space-y-6 anim-in">
        <div className="flex items-end justify-between">
          <div>
            <h1 className="text-3xl font-semibold tracking-tight">Hoy</h1>
            <p className="text-zinc-500 mt-1">Lo que hay que hacer y lo que ya tachaste.</p>
          </div>
          <div className="flex gap-2">
            <Button variant="secondary" onClick={()=>{ setTodoFormDate(targetDate); setTodoFormOpen(true); }}><Icon name="plus" size={16}/> Tarea</Button>
            <Button onClick={()=>setHabitFormOpen(true)}><Icon name="repeat" size={16}/> <span className="hidden sm:inline">Hábito</span></Button>
          </div>
        </div>

        {/* Tabs */}
        <div className="flex gap-1 p-1 rounded-2xl bg-paper-softer dark:bg-ink-soft w-fit">
          {[['today','Hoy'],['tomorrow','Mañana'],['habits','Hábitos']].map(([k,l]) => (
            <button key={k} onClick={()=>{ SoundFX.tap(); setTab(k); }} className={`press px-4 h-9 rounded-xl text-sm font-medium transition ${tab===k ? 'bg-white dark:bg-ink-softer shadow-softer':'text-zinc-500'}`}>{l}</button>
          ))}
        </div>

        {tab === 'habits' ? (
          <HabitsManager onOpenForm={()=>setHabitFormOpen(true)}/>

          <DayChecklist date={targetDate} habits={habitsForTarget} todos={todosForTarget} planning={tab==='tomorrow'}/>

        <TodoForm open={todoFormOpen} date={todoFormDate} onClose={()=>setTodoFormOpen(false)}/>
      </div>
    );
  }

  function DayChecklist({ date, habits, todos, planning }) {
    const { actions } = useStore();
    const all = [...habits.map(h=>({k:'habit',...h})), ...todos.map(t=>({k:'todo',...t}))];
    const total = all.length;
    const done = habits.filter(h=>h.log[date]).length + todos.filter(t=>t.completedAt).length;
    const score = total ? done/total : 0;

    return (
      <div className="space-y-5">
        <Card className="p-5">
          <div className="flex items-end justify-between">
            <div>
              <div className="text-xs uppercase tracking-wider text-zinc-500 font-semibold">{planning ? 'Plan para mañana':'Progreso'}</div>
              <div className="mt-1 text-2xl font-semibold ticker">{done}<span className="text-zinc-400 text-base font-medium"> / {total}</span></div>
            </div>
            <div className="text-sm text-zinc-500 capitalize">{dayName(date).toLowerCase()} {fmtDate(date,{day:'numeric',month:'short'})}</div>
          </div>
          <div className="mt-3 h-2 rounded-full bg-paper-softer dark:bg-ink-softer overflow-hidden">
            <div className="h-full transition-all duration-700 ease-out" style={{ width: `${Math.round(score*100)}%`, background: score>=1?'#30D158':score>=.5?'#FF9F0A':'#0A84FF' }}/>
          </div>
        </Card>

        {all.length === 0 ? (
          <Card className="p-10 text-center">
            <Icon name="sparkles" size={28} className="text-zinc-400"/>
            <p className="mt-3 text-zinc-500">{planning ? 'Aún no hay nada para mañana. Crea tus primeras tareas.' : 'No hay nada planeado para hoy.'}</p>
          </Card>
        ) : (
          <div className="space-y-2 stagger">
            {all.map(it => it.k === 'habit'
              ? <CheckItem key={'h'+it.id} kind="habit" item={it} date={date} onToggle={()=>actions.toggleHabit(it.id, date)}/>
              : <CheckItem key={'t'+it.id} kind="todo" item={it} date={date} onToggle={()=>actions.toggleTodo(it.id)} onDelete={()=>actions.removeTodo(it.id)}/>
            )}
          </div>
        )}
      </div>
    );
  }

  /* =========================================================
     CALENDARIO
     ========================================================= */
  function CalendarView() {
    const { state } = useStore();
    const [cursor, setCursor] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
    const [selected, setSelected] = useState(todayISO());

    const monthMatrix = useMemo(() => {
      const y = cursor.getFullYear(), m = cursor.getMonth();
      const firstDay = new Date(y, m, 1);
      const startWeekDay = firstDay.getDay(); // 0 Sun
      const daysInMonth = new Date(y, m+1, 0).getDate();
      const cells = [];
      for (let i=0; i<startWeekDay; i++) cells.push(null);
      for (let d=1; d<=daysInMonth; d++) {
        const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        cells.push({ iso, day: d, ...dayStatus(state, iso) });
      }
      while (cells.length % 7 !== 0) cells.push(null);
      return cells;
    }, [cursor, state]);

    const monthLabel = cursor.toLocaleDateString('es-CR', { month: 'long', year: 'numeric' });

    // stats del mes mostrado
    const monthStats = useMemo(() => {
      let done=0, partial=0, failed=0, planned=0, totalDays=0;
      for (const c of monthMatrix) if (c) {
        totalDays++;
        if (c.status==='done') done++;
        else if (c.status==='partial') partial++;
        else if (c.status==='failed') failed++;
        else if (c.status==='planned' || c.status==='inProgress') planned++;
      }
      return { done, partial, failed, planned, totalDays };
    }, [monthMatrix]);

    // racha máxima del estado completo
    const bestStreak = useMemo(() => {
      const start = state.habits.reduce((min, h) => h.createdAt < min ? h.createdAt : min, todayISO());
      let best = 0, cur = 0; let d = start;
      while (d <= todayISO()) {
        const st = dayStatus(state, d);
        if (st.status === 'done') { cur++; if (cur > best) best = cur; }
        else cur = 0;
        d = addDays(d, 1);
      }
      return best;
    }, [state]);

    const sel = dayStatus(state, selected);
    const habitsSel = state.habits.filter(h => h.createdAt <= selected);
    const todosSel = state.todos.filter(t => t.date === selected);

    return (
      <div className="space-y-8 anim-in">
        <div>
          <h1 className="text-3xl font-semibold tracking-tight">Calendario</h1>
          <p className="text-zinc-500 mt-1">Tu historial: cumplido, a medias, fallido.</p>
        </div>

        {/* Resumen del mes */}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 stagger">
          <Card className="p-4"><div className="text-xs text-zinc-500">Cumplidos</div><div className="text-2xl font-semibold mt-1 ticker" style={{color:'#30D158'}}>{monthStats.done}</div></Card>
          <Card className="p-4"><div className="text-xs text-zinc-500">A medias</div><div className="text-2xl font-semibold mt-1 ticker" style={{color:'#FF9F0A'}}>{monthStats.partial}</div></Card>
          <Card className="p-4"><div className="text-xs text-zinc-500">Fallidos</div><div className="text-2xl font-semibold mt-1 ticker" style={{color:'#FF453A'}}>{monthStats.failed}</div></Card>
          <Card className="p-4"><div className="text-xs text-zinc-500">Mejor racha</div><div className="text-2xl font-semibold mt-1 ticker">{bestStreak} <span className="text-base text-zinc-500 font-medium">{bestStreak===1?'día':'días'}</span></div></Card>
        </div>

        {/* Calendario */}
        <Card className="p-4 sm:p-6">
          <div className="flex items-center justify-between mb-4">
            <button onClick={()=>{ SoundFX.tap(); setCursor(new Date(cursor.getFullYear(), cursor.getMonth()-1, 1)); }} className="press h-9 w-9 grid place-items-center rounded-xl hover:bg-paper-softer dark:hover:bg-ink-softer"><Icon name="chevron-left" size={18}/></button>
            <div className="font-semibold capitalize">{monthLabel}</div>
            <button onClick={()=>{ SoundFX.tap(); setCursor(new Date(cursor.getFullYear(), cursor.getMonth()+1, 1)); }} className="press h-9 w-9 grid place-items-center rounded-xl hover:bg-paper-softer dark:hover:bg-ink-softer"><Icon name="chevron-right" size={18}/></button>
          </div>

          <div className="grid grid-cols-7 text-center text-xs text-zinc-400 mb-2">
            {['D','L','M','M','J','V','S'].map((d,i) => <div key={i}>{d}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1.5 sm:gap-2">
            {monthMatrix.map((c, i) => {
              if (!c) return <div key={i}/>;
              const isToday = c.iso === todayISO();
              const isSelected = c.iso === selected;
              const colorBg = c.status==='done' ? '#30D158'
                            : c.status==='partial' ? '#FF9F0A'
                            : c.status==='failed' ? '#FF453A'
                            : c.status==='inProgress' ? 'rgba(10,132,255,.18)'
                            : c.status==='planned' ? 'rgba(10,132,255,.10)'
                            : 'transparent';
              const textColor = (c.status==='done'||c.status==='partial'||c.status==='failed') ? 'white' : 'inherit';
              return (
                <button key={i} onClick={()=>{SoundFX.tap(); setSelected(c.iso);}} className={`day-cell aspect-square rounded-2xl text-sm font-medium relative grid place-items-center ${isSelected ? 'ring-2 ring-ink dark:ring-white':''} ${c.status==='empty' ? 'bg-paper-softer dark:bg-ink-softer text-zinc-400' : ''}`}
                        style={{ background: c.status==='empty' ? undefined : colorBg, color: textColor }}>
                  <span>{c.day}</span>
                  {isToday && <span className="absolute bottom-1.5 h-1 w-1 rounded-full bg-ink dark:bg-white"/>}
                  {c.total > 0 && c.status !== 'done' && c.status !== 'failed' && c.status !== 'partial' && (
                    <span className="absolute top-1.5 right-1.5 text-[9px] text-zinc-500">{c.done}/{c.total}</span>
                  )}
                </button>
              );
            })}
          </div>

          <div className="mt-5 flex flex-wrap gap-3 text-xs text-zinc-500">
            <span className="inline-flex items-center gap-1.5"><span className="h-3 w-3 rounded-md" style={{background:'#30D158'}}/>Cumplido</span>
            <span className="inline-flex items-center gap-1.5"><span className="h-3 w-3 rounded-md" style={{background:'#FF9F0A'}}/>A medias</span>
            <span className="inline-flex items-center gap-1.5"><span className="h-3 w-3 rounded-md" style={{background:'#FF453A'}}/>Fallido</span>
            <span className="inline-flex items-center gap-1.5"><span className="h-3 w-3 rounded-md bg-paper-softer dark:bg-ink-softer hairline"/>Sin plan</span>
            <span className="inline-flex items-center gap-1.5"><span className="h-3 w-3 rounded-md" style={{background:'rgba(10,132,255,.2)'}}/>En curso / planeado</span>
          </div>
        </Card>

        {/* Detalle día seleccionado */}
        <Section title={`${dayName(selected)} ${fmtDate(selected,{day:'numeric',month:'long'})}`}>
          <Card className="p-5">
            <div className="flex items-end justify-between">
              <div>
                <div className="text-xs uppercase tracking-wider font-semibold" style={{
                  color: sel.status==='done'?'#30D158':sel.status==='partial'?'#FF9F0A':sel.status==='failed'?'#FF453A':'#8E8E93'
                }}>{({done:'Cumplido',partial:'A medias',failed:'Fallido',inProgress:'En curso',planned:'Planeado',empty:'Sin plan'})[sel.status]}</div>
                <div className="text-3xl font-semibold ticker mt-1">{sel.done}<span className="text-zinc-400 text-lg font-medium"> / {sel.total}</span></div>
              </div>
              <div className="text-sm text-zinc-500">{Math.round(sel.score*100)}%</div>
            </div>
            <div className="mt-3 h-2 rounded-full bg-paper-softer dark:bg-ink-softer overflow-hidden">
              <div className="h-full transition-all duration-700 ease-out" style={{ width: `${Math.round(sel.score*100)}%`, background: sel.status==='done'?'#30D158':sel.status==='partial'?'#FF9F0A':sel.status==='failed'?'#FF453A':'#0A84FF' }}/>
            </div>
          </Card>

          {(habitsSel.length + todosSel.length) > 0 && (
            <div className="space-y-2 mt-3 stagger">
              <DayItems date={selected} habits={habitsSel} todos={todosSel}/>
            </div>
          )}
        </Section>
      </div>
    );
  }

  function DayItems({ date, habits, todos }) {
    const { actions } = useStore();
    return (
      <>
        {habits.map(h => <CheckItem key={'h'+h.id} kind="habit" item={h} date={date} onToggle={()=>actions.toggleHabit(h.id, date)}/>)}
        {todos.map(t => <CheckItem key={'t'+t.id} kind="todo" item={t} date={date} onToggle={()=>actions.toggleTodo(t.id)} onDelete={()=>actions.removeTodo(t.id)}/>)}

     FINANZAS
     ========================================================= */
  function TxForm({ open, onClose }) {
    const { actions } = useStore();
    const [account, setAccount] = useState('personal');
    const [type, setType] = useState('expense');
    const [amount, setAmount] = useState('');
    const [category, setCategory] = useState('Comida');
    const [note, setNote] = useState('');
    const [date, setDate] = useState(todayISO());
    useEffect(() => { if (open) { setAccount('personal'); setType('expense'); setAmount(''); setCategory('Comida'); setNote(''); setDate(todayISO()); } }, [open]);

    const cats = type === 'income' ? CATEGORIAS_INGRESO : CATEGORIAS_GASTO;

    return (
      <Sheet open={open} onClose={onClose} title="Nuevo movimiento"

          <div className="grid grid-cols-2 gap-3">
            <label className="block"><span className="text-sm text-zinc-500">Cuenta</span><Select value={account} onChange={e=>setAccount(e.target.value)} className="mt-1"><option value="personal">Personal</option><option value="nakit">Nakit</option></Select></label>

          </div>
          <label className="block"><span className="text-sm text-zinc-500">Fecha</span><Input type="date" value={date} onChange={e=>setDate(e.target.value)} className="mt-1"/></label>
          <label className="block"><span className="text-sm text-zinc-500">Nota (opcional)</span><Textarea rows={2} value={note} onChange={e=>setNote(e.target.value)}/></label>
        </div>
      </Sheet>
    );
  }

  function FinancesView() {
    const { state, actions } = useStore();
    const [scope, setScope] = useState('all');
    const [formOpen, setFormOpen] = useState(false);
    const filtered = state.transactions.filter(t => scope === 'all' ? true : t.account === scope);
    const stats = useMemo(() => {
      const m = monthKey(todayISO()); let inc=0, exp=0; const byCat = {};
      for (const t of filtered) {
        if (!t.date.startsWith(m)) continue;
        if (t.type === 'income') inc += +t.amount;
        else { exp += +t.amount; byCat[t.category] = (byCat[t.category]||0) + +t.amount; }
      }
      return { inc, exp, net: inc-exp, cats: Object.entries(byCat).sort((a,b)=>b[1]-a[1]) };
    }, [filtered]);
    const balance = scope === 'personal' ? state.accounts.personal.balance
                  : scope === 'nakit' ? state.accounts.nakit.balance
                  : state.accounts.personal.balance + state.accounts.nakit.balance;
    const exportExcel = () => {
      const rows = state.transactions.map(t => ({ Fecha:t.date, Cuenta: state.accounts[t.account]?.name||t.account, Tipo: t.type==='income'?'Ingreso':'Gasto', Categoría:t.category, Monto: t.type==='income'?+t.amount:-+t.amount, Nota: t.note||'' }));
      const ws = XLSX.utils.json_to_sheet(rows); ws['!cols'] = [{wch:12},{wch:10},{wch:10},{wch:18},{wch:14},{wch:30}];
      const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Movimientos');
      XLSX.writeFile(wb, `vida-finanzas-${todayISO()}.xlsx`); SoundFX.success();
    };
    return (
      <div className="space-y-8 anim-in">
        <div className="flex items-center justify-between">
          <div><h1 className="text-3xl font-semibold tracking-tight">Finanzas</h1><p className="text-zinc-500 mt-1">Personal y Nakit, en un mismo lugar.</p></div>
          <div className="flex gap-2"><Button variant="secondary" onClick={exportExcel}><Icon name="download" size={16}/> <span className="hidden sm:inline">Excel</span></Button><Button onClick={()=>setFormOpen(true)}><Icon name="plus" size={16}/> Movimiento</Button></div>
        </div>
        <div className="flex gap-2">
          {['all','personal','nakit'].map(s => (
            <button key={s} onClick={()=>{SoundFX.tap(); setScope(s);}} className={`press px-4 h-9 rounded-full text-sm font-medium ${scope===s ? 'bg-ink text-white dark:bg-white dark:text-ink':'bg-paper-softer dark:bg-ink-soft'}`}>{s==='all'?'Todas':s==='personal'?'Personal':'Nakit'}</button>
          ))}
        </div>
        <Card className="p-6 sm:p-8 anim-scale-in">
          <div className="text-sm text-zinc-500">Saldo</div>
          <div className="mt-2 text-4xl sm:text-5xl font-semibold tracking-tight grad-ink ticker"><CountUp value={balance} format={v=>fmtMoney(v)}/></div>
          <div className="mt-6 grid grid-cols-2 gap-4">
            <div className="p-4 rounded-2xl bg-paper-softer dark:bg-ink-softer"><div className="flex items-center gap-1.5 text-xs text-zinc-500"><Icon name="arrow-up" size={12}/> Ingresos del mes</div><div className="mt-1 text-xl font-semibold ticker" style={{color:'#30D158'}}>{fmtMoney(stats.inc)}</div></div>
            <div className="p-4 rounded-2xl bg-paper-softer dark:bg-ink-softer"><div className="flex items-center gap-1.5 text-xs text-zinc-500"><Icon name="arrow-down" size={12}/> Gastos del mes</div><div className="mt-1 text-xl font-semibold ticker" style={{color:'#FF453A'}}>{fmtMoney(stats.exp)}</div></div>
          </div>
        </Card>
        {stats.cats.length > 0 && (
          <Section title="Dónde se va la plata (este mes)">
            <Card className="p-5 space-y-3">
              {stats.cats.slice(0,6).map(([cat, amt]) => {
                const pct = stats.exp ? (amt/stats.exp)*100 : 0;
                return (<div key={cat}><div className="flex justify-between text-sm"><span>{cat}</span><span className="text-zinc-500">{fmtMoney(amt)} <span className="text-zinc-400">· {pct.toFixed(0)}%</span></span></div><div className="mt-1.5 h-2 bg-paper-softer dark:bg-ink-softer rounded-full overflow-hidden"><div className="h-full bg-ink dark:bg-white transition-all duration-700" style={{width:pct+'%'}}/></div></div>);
              })}
            </Card>
          </Section>
        )}
        <Section title="Movimientos" action={<span className="text-sm text-zinc-500">{filtered.length} {filtered.length===1?'registro':'registros'}</span>}>
          {filtered.length === 0 ? (
            <Card className="p-10 text-center"><Icon name="receipt" size={28} className="text-zinc-400"/><p className="mt-3 text-zinc-500">Sin movimientos todavía.</p><Button className="mt-4" onClick={()=>setFormOpen(true)}><Icon name="plus" size={16}/> Anotar movimiento</Button></Card>
          ) : (
            <Card className="overflow-hidden">
              {filtered.slice(0,100).map((t,i) => (
                <div key={t.id} className={`flex items-center gap-4 p-4 anim-in ${i>0?'hairline-b':''}`} style={{animationDelay: (i*0.02)+'s'}}>
                  <div className={`h-10 w-10 grid place-items-center rounded-2xl ${t.type==='income'?'bg-accent-green/10 text-accent-green':'bg-accent-red/10 text-accent-red'}`}><Icon name={t.type==='income'?'arrow-up':'arrow-down'} size={18}/></div>
                  <div className="min-w-0 flex-1"><div className="font-medium">{t.category}</div><div className="text-xs text-zinc-500 truncate">{state.accounts[t.account]?.name||t.account} · {fmtDate(t.date,{day:'numeric',month:'short',year:'numeric'})}{t.note?' · '+t.note:''}</div></div>
                  <div className={`font-semibold ticker ${t.type==='income'?'text-accent-green':'text-accent-red'}`}>{t.type==='income'?'+':'-'}{fmtMoney(t.amount)}</div>
                  <button onClick={()=>{ if (confirm('¿Eliminar este movimiento?')) { actions.removeTransaction(t.id); SoundFX.uncheck(); } }} className="press h-8 w-8 grid place-items-center rounded-lg hover:bg-paper-softer dark:hover:bg-ink-softer text-zinc-400 hover:text-accent-red"><Icon name="x" size={14}/></button>
                </div>
              ))}
            </Card>
          )}
        </Section>
        <TxForm open={formOpen} onClose={()=>setFormOpen(false)}/>
      </div>
    );
  }

  /* =========================================================
     EVENTOS
     ========================================================= */

          <label className="block"><span className="text-sm text-zinc-500">Ubicación</span><Input className="mt-1" placeholder="Lugar del evento" value={location} onChange={e=>setLocation(e.target.value)} icon="map-pin"/></label>
          <div className="grid grid-cols-2 gap-3">

            <label className="block"><span className="text-sm text-zinc-500">Fin</span><Input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="mt-1"/></label>

          <label className="block"><span className="text-sm text-zinc-500">Vuelto inicial / efectivo de caja (opcional)</span><Input type="number" value={openingFloat} onChange={e=>setOpeningFloat(e.target.value)} className="mt-1" icon="banknote"/></label>

  function EventDetail({ id, back }) {
    const { state, actions } = useStore();
    const e = state.events.find(x => x.id === id);
    const [tab, setTab] = useState('sell');
    const [newItemOpen, setNewItemOpen] = useState(false);
    const [newItemName, setNewItemName] = useState(''); const [newItemPrice, setNewItemPrice] = useState('');
    const [editingItemId, setEditingItemId] = useState(null);
    if (!e) return <div className="text-center py-20"><p className="text-zinc-500">Evento no encontrado.</p><Button className="mt-4" onClick={back}>Volver</Button></div>;
    const total = e.sales.reduce((a,s)=>a+s.total,0);
    const cashSales = e.sales.filter(s=>s.method==='efectivo').reduce((a,s)=>a+s.total,0);
    const exportExcel = () => {
      const wb = XLSX.utils.book_new();
      const summary = [['Feria', e.name],['Ubicación', e.location||''],['Fechas', `${e.startDate} a ${e.endDate}`],['Estado', e.status],[],['Total ventas', total],['Cantidad de ventas', e.sales.length],['Efectivo', cashSales],['Otros métodos', total-cashSales],['Vuelto inicial', e.openingFloat||0],['Efectivo en caja al cerrar', (e.openingFloat||0)+cashSales]];
      const wsS = XLSX.utils.aoa_to_sheet(summary); wsS['!cols']=[{wch:24},{wch:24}]; XLSX.utils.book_append_sheet(wb, wsS, 'Resumen');
      const ventas = e.sales.map(s => { const lines = s.lines || []; return { Fecha: new Date(s.ts).toLocaleString('es-CR'), Productos: lines.map(l => { const it = e.items.find(i=>i.id===l.itemId); return `${l.qty}× ${it?.name||'?'}`; }).join(', '), Cantidad: lines.reduce((a,l)=>a+l.qty,0), Método: s.method, Total: s.total, Nota: s.note||'' }; });
      const wsV = XLSX.utils.json_to_sheet(ventas); wsV['!cols']=[{wch:20},{wch:36},{wch:10},{wch:14},{wch:14},{wch:24}]; XLSX.utils.book_append_sheet(wb, wsV, 'Ventas');
      const itemStats = e.items.map(it => { const sold = e.sales.reduce((a,s) => a + (s.lines||[]).filter(l=>l.itemId===it.id).reduce((aa,l)=>aa+l.qty,0), 0); return { Producto: it.name, Precio: it.price, Vendidos: sold, Subtotal: sold*it.price }; });
      const wsI = XLSX.utils.json_to_sheet(itemStats); wsI['!cols']=[{wch:30},{wch:12},{wch:10},{wch:14}]; XLSX.utils.book_append_sheet(wb, wsI, 'Productos');
      XLSX.writeFile(wb, `nakit-${e.name.replace(/[^\w]+/g,'-').toLowerCase()}-${todayISO()}.xlsx`); SoundFX.success();
    };
    return (
      <div className="space-y-6 anim-in">
        <div className="flex items-center gap-2">
          <button onClick={()=>{SoundFX.tap(); back();}} className="press h-9 w-9 grid place-items-center rounded-xl hover:bg-paper-softer dark:hover:bg-ink-soft"><Icon name="arrow-left" size={18}/></button>
          <div className="flex-1 min-w-0"><h1 className="text-2xl font-semibold tracking-tight truncate">{e.name}</h1><p className="text-sm text-zinc-500 truncate">{e.location||'—'} · {fmtDate(e.startDate)} – {fmtDate(e.endDate)}</p></div>
          <Button variant="secondary" onClick={exportExcel}><Icon name="download" size={16}/> <span className="hidden sm:inline">Excel</span></Button>
        </div>
        <Card className="p-4 sm:p-5 flex flex-wrap items-center justify-between gap-3 anim-scale-in">
          <div>
            <div className="text-xs uppercase tracking-wider font-semibold" style={{color: e.status==='active'?'#FF9F0A':e.status==='closed'?'#8E8E93':'#0A84FF'}}>{e.status==='active'?'En curso':e.status==='closed'?'Cerrado':'Planeado'}</div>
            <div className="text-2xl font-semibold mt-1 ticker">{fmtMoney(total)}<span className="text-base text-zinc-500 font-medium"> · {e.sales.length} ventas</span></div>
          </div>
          <div className="flex gap-2">
            {e.status === 'planned' && <Button variant="success" onClick={()=>{ actions.updateEvent(e.id, { status:'active' }); SoundFX.success(); }}><Icon name="play" size={16}/> Iniciar</Button>}
            {e.status === 'active' && <Button onClick={()=>{ if (confirm('¿Cerrar la feria? El total se sumará al saldo de Nakit.')) { actions.closeEvent(e.id); SoundFX.cash(); fireConfetti({count:120}); } }}><Icon name="square" size={16}/> Cerrar</Button>}

          </div>
        </Card>
        <div className="flex gap-1 p-1 rounded-2xl bg-paper-softer dark:bg-ink-soft w-fit">
          {[['sell','Vender'],['catalog','Productos'],['summary','Resumen']].map(([k,l]) => (
            <button key={k} onClick={()=>{SoundFX.tap(); setTab(k);}} className={`press px-4 h-9 rounded-xl text-sm font-medium transition ${tab===k ? 'bg-white dark:bg-ink-softer shadow-softer':'text-zinc-500'}`}>{l}</button>

            {e.items.length === 0 ? <Card className="p-10 text-center"><Icon name="gem" size={28} className="text-zinc-400"/><p className="mt-3 text-zinc-500">Agrega los productos que vas a llevar.</p></Card> : (

                {e.items.map((it, i) => {

                  return (
                    <div key={it.id} className={`flex items-center gap-4 p-4 ${i>0?'hairline-b':''}`}>
                      <div className="h-10 w-10 grid place-items-center rounded-2xl bg-accent-orange/10 text-accent-orange"><Icon name="gem" size={18}/></div>
                      <div className="flex-1 min-w-0"><div className="font-medium truncate">{it.name}</div><div className="text-xs text-zinc-500">{fmtMoney(it.price)} · {sold} vendidas</div></div>
                      <button onClick={()=>{ setEditingItemId(it.id); setNewItemName(it.name); setNewItemPrice(it.price); setNewItemOpen(true); }} className="press h-9 w-9 grid place-items-center rounded-xl hover:bg-paper-softer dark:hover:bg-ink-softer text-zinc-500"><Icon name="pencil" size={14}/></button>
                      <button onClick={()=>{ if (confirm('¿Eliminar producto?')) actions.removeEventItem(e.id, it.id); }} className="press h-9 w-9 grid place-items-center rounded-xl hover:bg-paper-softer dark:hover:bg-ink-softer text-zinc-400 hover:text-accent-red"><Icon name="trash-2" size={14}/></button>
                    </div>
                  );
                })}
              </Card>
            )}
          </Section>
        )}
        {tab === 'summary' && <SummaryTab event={e}/>}
        <Sheet open={newItemOpen} onClose={()=>setNewItemOpen(false)} title={editingItemId ? 'Editar producto' : 'Nuevo producto'}
               footer={<div className="flex justify-end gap-2"><Button variant="ghost" onClick={()=>setNewItemOpen(false)}>Cancelar</Button><Button onClick={()=>{ if (!newItemName.trim()) return; if (editingItemId) actions.updateEventItem(e.id, editingItemId, { name: newItemName.trim(), price: Number(newItemPrice)||0 }); else actions.addEventItem(e.id, { name: newItemName.trim(), price: Number(newItemPrice)||0 }); setNewItemOpen(false); }}>Guardar</Button></div>}>
          <div className="space-y-4">
            <label className="block"><span className="text-sm text-zinc-500">Nombre</span><Input className="mt-1" placeholder="Ej. Anillo perla" value={newItemName} onChange={e=>setNewItemName(e.target.value)}/></label>
            <label className="block"><span className="text-sm text-zinc-500">Precio</span><Input className="mt-1" type="number" placeholder="0" value={newItemPrice} onChange={e=>setNewItemPrice(e.target.value)} icon="banknote"/></label>
          </div>
        </Sheet>
      </div>
    );
  }

  function SellTab({ event }) {
    const { actions } = useStore();
    const [cart, setCart] = useState({});
    const [method, setMethod] = useState('efectivo');
    const [note, setNote] = useState('');
    const addToCart = (id) => { setCart(c => ({ ...c, [id]: (c[id]||0)+1 })); SoundFX.tap(); };
    const decFromCart = (id) => setCart(c => { const n = (c[id]||0)-1; const nc = {...c}; if (n<=0) delete nc[id]; else nc[id]=n; return nc; });
    const total = Object.entries(cart).reduce((a,[id,q]) => a + (event.items.find(i=>i.id===id)?.price||0)*q, 0);
    const cartCount = Object.values(cart).reduce((a,q)=>a+q,0);
    const completeSale = () => {
      if (cartCount === 0) return;
      const lines = Object.entries(cart).map(([itemId, qty]) => ({ itemId, qty, price: event.items.find(i=>i.id===itemId)?.price || 0 }));
      actions.addSale(event.id, { lines, method, note });
      setCart({}); setNote(''); SoundFX.cash(); vibrate(20); fireConfetti({ count: 30, originY: window.innerHeight*0.6 });
    };
    return (
      <div className="grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-6">
        <div className="space-y-3">
          {event.items.length === 0 ? <Card className="p-10 text-center"><Icon name="package" size={28} className="text-zinc-400"/><p className="mt-3 text-zinc-500">Agrega productos primero.</p></Card> : (
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 stagger">
              {event.items.map(it => { const q = cart[it.id]||0; return (
                <button key={it.id} onClick={()=>addToCart(it.id)} className="press group relative p-4 rounded-3xl bg-white dark:bg-ink-soft hairline hover:shadow-soft transition text-left">
                  <div className="h-12 w-12 grid place-items-center rounded-2xl bg-accent-orange/10 text-accent-orange mb-3"><Icon name="gem" size={20}/></div>
                  <div className="font-medium truncate">{it.name}</div>
                  <div className="text-sm text-zinc-500">{fmtMoney(it.price)}</div>
                  {q>0 && <span className="absolute top-3 right-3 h-7 min-w-[28px] px-2 grid place-items-center rounded-full bg-ink text-white text-xs font-semibold dark:bg-white dark:text-ink anim-pop">{q}</span>}
                </button>
              ); })}
            </div>
          )}
        </div>
        <Card className="p-5 h-max lg:sticky lg:top-24">
          <h3 className="font-semibold mb-3">Venta actual</h3>
          {cartCount === 0 ? <p className="text-sm text-zinc-500">Toca un producto para empezar.</p> : (
            <div className="space-y-2 mb-4">
              {Object.entries(cart).map(([id, q]) => { const it = event.items.find(i=>i.id===id); if (!it) return null; return (
                <div key={id} className="flex items-center gap-2 anim-in">
                  <div className="flex-1 min-w-0"><div className="font-medium truncate">{it.name}</div><div className="text-xs text-zinc-500">{fmtMoney(it.price)} c/u</div></div>
                  <button onClick={()=>{SoundFX.tap(); decFromCart(id);}} className="press h-8 w-8 grid place-items-center rounded-lg bg-paper-softer dark:bg-ink-softer"><Icon name="minus" size={14}/></button>
                  <span className="w-6 text-center font-semibold ticker">{q}</span>
                  <button onClick={()=>addToCart(id)} className="press h-8 w-8 grid place-items-center rounded-lg bg-paper-softer dark:bg-ink-softer"><Icon name="plus" size={14}/></button>
                </div>
              );})}
            </div>
          )}
          <div className="hairline-b -mx-5 px-5 pb-4 mb-4"><div className="flex justify-between text-lg font-semibold"><span>Total</span><span className="ticker">{fmtMoney(total)}</span></div></div>
          <div className="space-y-3">
            <div><span className="text-sm text-zinc-500">Método</span>
              <div className="mt-1 grid grid-cols-3 gap-2">{['efectivo','sinpe','tarjeta'].map(m => (
                <button key={m} onClick={()=>{SoundFX.tap(); setMethod(m);}} className={`press h-10 rounded-xl text-sm font-medium capitalize ${method===m ? 'bg-ink text-white dark:bg-white dark:text-ink':'bg-paper-softer dark:bg-ink-softer'}`}>{m}</button>
              ))}</div>
            </div>
            <Input placeholder="Nota (opcional)" value={note} onChange={e=>setNote(e.target.value)}/>
            <Button className="w-full" size="lg" disabled={cartCount===0} onClick={completeSale} sound={null}><Icon name="check" size={18}/> Cobrar {total>0 && fmtMoney(total)}</Button>
          </div>
        </Card>
        {event.sales.length > 0 && (
          <div className="lg:col-span-2">
            <Section title="Ventas recientes">
              <Card className="overflow-hidden">
                {event.sales.slice().reverse().slice(0,12).map((s,i) => { const lines = s.lines||[]; return (
                  <div key={s.id} className={`flex items-center gap-4 p-4 anim-in ${i>0?'hairline-b':''}`}>
                    <div className="h-10 w-10 grid place-items-center rounded-2xl bg-accent-green/10 text-accent-green"><Icon name="receipt" size={18}/></div>
                    <div className="flex-1 min-w-0"><div className="font-medium truncate">{lines.map(l=>`${l.qty}× ${event.items.find(i=>i.id===l.itemId)?.name||'?'}`).join(', ')}</div><div className="text-xs text-zinc-500">{new Date(s.ts).toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit'})} · {s.method}{s.note?' · '+s.note:''}</div></div>
                    <div className="font-semibold text-accent-green ticker">+{fmtMoney(s.total)}</div>
                    <button onClick={()=>{ if (confirm('¿Eliminar esta venta?')) { actions.removeSale(event.id, s.id); SoundFX.uncheck(); } }} className="press h-8 w-8 grid place-items-center rounded-lg hover:bg-paper-softer dark:hover:bg-ink-softer text-zinc-400 hover:text-accent-red"><Icon name="x" size={14}/></button>
                  </div>
                );})}
              </Card>
            </Section>
          </div>
        )}
      </div>
    );
  }

  function SummaryTab({ event }) {
    const total = event.sales.reduce((a,s)=>a+s.total,0);
    const cash = event.sales.filter(s=>s.method==='efectivo').reduce((a,s)=>a+s.total,0);
    const sinpe = event.sales.filter(s=>s.method==='sinpe').reduce((a,s)=>a+s.total,0);
    const tarjeta = event.sales.filter(s=>s.method==='tarjeta').reduce((a,s)=>a+s.total,0);
    const itemStats = event.items.map(it => { const sold = event.sales.reduce((a,s)=> a + (s.lines||[]).filter(l=>l.itemId===it.id).reduce((aa,l)=>aa+l.qty,0), 0); return { ...it, sold, subtotal: sold*it.price }; }).sort((a,b)=>b.sold-a.sold);
    const top = itemStats[0]; const ticketAvg = event.sales.length ? total/event.sales.length : 0;
    return (
      <div className="space-y-5 stagger">
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <Card className="p-4"><div className="text-xs text-zinc-500">Total</div><div className="text-2xl font-semibold mt-1 ticker" style={{color:'#30D158'}}>{fmtMoney(total)}</div></Card>
          <Card className="p-4"><div className="text-xs text-zinc-500">Ventas</div><div className="text-2xl font-semibold mt-1 ticker">{event.sales.length}</div></Card>
          <Card className="p-4"><div className="text-xs text-zinc-500">Ticket promedio</div><div className="text-2xl font-semibold mt-1 ticker">{fmtMoney(ticketAvg)}</div></Card>
          <Card className="p-4"><div className="text-xs text-zinc-500">Más vendido</div><div className="text-base font-semibold mt-1 truncate">{top?top.name:'—'}</div><div className="text-xs text-zinc-500">{top?top.sold+' uds':''}</div></Card>
        </div>
        <Card className="p-5">
          <h3 className="font-semibold mb-4">Métodos de pago</h3>
          {[['Efectivo',cash,'#30D158'],['Sinpe',sinpe,'#0A84FF'],['Tarjeta',tarjeta,'#5E5CE6']].map(([n,v,c]) => { const pct = total ? (v/total)*100 : 0; return (
            <div key={n} className="mb-3 last:mb-0">
              <div className="flex justify-between text-sm"><span>{n}</span><span className="text-zinc-500">{fmtMoney(v)} · {pct.toFixed(0)}%</span></div>
              <div className="mt-1.5 h-2 bg-paper-softer dark:bg-ink-softer rounded-full overflow-hidden"><div className="h-full transition-all duration-700" style={{width:pct+'%',background:c}}/></div>
            </div>
          );})}
          {event.openingFloat > 0 && (
            <div className="mt-4 pt-4 hairline-b">
              <div className="flex justify-between text-sm"><span>Vuelto inicial</span><span>{fmtMoney(event.openingFloat)}</span></div>
              <div className="flex justify-between text-sm font-semibold mt-1"><span>Efectivo en caja al cerrar</span><span style={{color:'#30D158'}}>{fmtMoney(event.openingFloat + cash)}</span></div>
            </div>
          )}
        </Card>
        <Card className="p-5">
          <h3 className="font-semibold mb-3">Por producto</h3>
          {itemStats.length === 0 ? <p className="text-sm text-zinc-500">Sin productos.</p> : (
            <div className="space-y-2">{itemStats.map(it => (
              <div key={it.id} className="flex items-center gap-3">
                <div className="flex-1 min-w-0"><div className="font-medium truncate">{it.name}</div><div className="text-xs text-zinc-500">{fmtMoney(it.price)} c/u</div></div>
                <div className="text-right"><div className="font-semibold ticker">{it.sold} <span className="text-zinc-400 font-normal text-sm">uds</span></div><div className="text-xs text-zinc-500">{fmtMoney(it.subtotal)}</div></div>
              </div>
            ))}</div>
          )}
        </Card>
      </div>
    );
  }

  /* =========================================================
     AJUSTES
     ========================================================= */
  function SettingsView() {
    const { state, actions, auth, logout, syncStatus } = useStore();
    const [name, setName] = useState(state.profile.name || '');
    const [pBal, setPBal] = useState(state.accounts.personal.balance);
    const [nBal, setNBal] = useState(state.accounts.nakit.balance);
    const exportAll = () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `vida-backup-${todayISO()}.json`; a.click(); URL.revokeObjectURL(url); SoundFX.success();
    };
    const importAll = (file) => { const r = new FileReader(); r.onload = () => { try { const obj = JSON.parse(r.result); if (confirm('¿Reemplazar todos los datos actuales?')) { actions.importState(obj); SoundFX.success(); } } catch { alert('Archivo inválido.'); SoundFX.error(); } }; r.readAsText(file); };
    return (
      <div className="space-y-8 anim-in">
        <div><h1 className="text-3xl font-semibold tracking-tight">Ajustes</h1><p className="text-zinc-500 mt-1">Personaliza la app y maneja tus datos.</p></div>

        <Section title="Cuenta">
          <Card className="p-5">
            {auth ? (
              <div className="flex items-center gap-4">
                {auth.user.avatar && <img src={auth.user.avatar} alt="" className="h-12 w-12 rounded-full"/>}
                <div className="flex-1 min-w-0">
                  <div className="font-semibold truncate">{auth.user.name || auth.user.login}</div>
                  <div className="text-xs text-zinc-500 truncate">@{auth.user.login} · <SyncDot status={syncStatus}/> <SyncLabel status={syncStatus}/></div>
                </div>
                <Button variant="ghost" onClick={()=>{ if (confirm('¿Cerrar sesión? Los datos seguirán en este dispositivo.')) logout(); }}><Icon name="log-out" size={16}/> Salir</Button>
              </div>
            ) : (
              <div>
                <p className="text-sm text-zinc-500 mb-3">No has iniciado sesión. Tus datos solo viven en este dispositivo.</p>
                <Button onClick={()=>location.reload()}><Icon name="log-in" size={16}/> Iniciar sesión</Button>
              </div>
            )}
          </Card>
        </Section>

        <Section title="Perfil">
          <Card className="p-5">
            <label className="block"><span className="text-sm text-zinc-500">Nombre</span><Input className="mt-1" value={name} onChange={e=>setName(e.target.value)} onBlur={()=>actions.setProfile({ name: name.trim() })}/></label>
          </Card>
        </Section>

        <Section title="Saldos (ajuste manual)">
          <Card className="p-5 space-y-4">
            <p className="text-xs text-zinc-500">Cambia estos solo si necesitas reconciliar con tu banco.</p>
            <label className="block"><span className="text-sm text-zinc-500">Saldo Personal</span><Input type="number" className="mt-1" value={pBal} onChange={e=>setPBal(e.target.value)} onBlur={()=>actions.setAccounts({ personal: { ...state.accounts.personal, balance: Number(pBal)||0 } })}/></label>
            <label className="block"><span className="text-sm text-zinc-500">Saldo Nakit</span><Input type="number" className="mt-1" value={nBal} onChange={e=>setNBal(e.target.value)} onBlur={()=>actions.setAccounts({ nakit: { ...state.accounts.nakit, balance: Number(nBal)||0 } })}/></label>
          </Card>
        </Section>

        <Section title="Apariencia y sonido">
          <Card className="p-5 space-y-4">
            <div>
              <span className="text-sm text-zinc-500">Tema</span>
              <div className="mt-2 grid grid-cols-3 gap-2">
                {[['system','Sistema','monitor'],['light','Claro','sun'],['dark','Oscuro','moon']].map(([k,l,ic]) => (
                  <button key={k} onClick={()=>{SoundFX.tap(); actions.setSettings({ theme: k });}} className={`press h-12 rounded-2xl text-sm font-medium inline-flex items-center justify-center gap-2 transition ${state.settings.theme===k ? 'bg-ink text-white dark:bg-white dark:text-ink':'bg-paper-softer dark:bg-ink-softer'}`}><Icon name={ic} size={16}/> {l}</button>
                ))}
              </div>
            </div>
            <label className="flex items-center justify-between gap-3 p-3 rounded-2xl bg-paper-softer dark:bg-ink-softer cursor-pointer">
              <div className="flex items-center gap-3"><Icon name={state.settings.sound ? 'volume-2' : 'volume-x'} size={18}/> <div><div className="font-medium">Sonidos</div><div className="text-xs text-zinc-500">Efectos al marcar, vender y cumplir.</div></div></div>
              <input type="checkbox" checked={state.settings.sound} onChange={e=>{ actions.setSettings({ sound: e.target.checked }); if (e.target.checked) SoundFX.check(); }}/>
            </label>
          </Card>
        </Section>

        <Section title="Datos">
          <Card className="p-5 space-y-2">
            <Button variant="secondary" className="w-full" onClick={exportAll}><Icon name="download" size={16}/> Exportar respaldo (.json)</Button>
            <label className="block">
              <input type="file" accept="application/json" className="hidden" onChange={e=>{ if (e.target.files[0]) importAll(e.target.files[0]); }}/>
              <span className="block w-full"><Button as="span" variant="secondary" className="w-full"><Icon name="upload" size={16}/> Importar respaldo</Button></span>
            </label>
            <Button variant="danger" className="w-full mt-3" onClick={()=>{ if (confirm('Esto borrará todo localmente. La copia en GitHub seguirá hasta que sincronice. ¿Seguro?')) actions.reset(); }}><Icon name="trash-2" size={16}/> Borrar datos locales</Button>
          </Card>
        </Section>

        <p className="text-xs text-zinc-400 text-center">Vida · v2 · {auth ? 'Sincronizado con GitHub Gist' : 'Solo dispositivo'}</p>
      </div>
    );
  }

  /* =========================================================
     SHELL
     ========================================================= */
  const NAV = [
    { id: 'home',     label: 'Inicio',    icon: 'house' },
    { id: 'today',    label: 'Hoy',       icon: 'list-checks' },
    { id: 'calendar', label: 'Calendario',icon: 'calendar-days' },
    { id: 'finances', label: 'Finanzas',  icon: 'wallet' },
    { id: 'events',   label: 'Eventos',   icon: 'store' },
    { id: 'settings', label: 'Ajustes',   icon: 'settings' },
  ];

  function App() {
    const { state, auth, syncStatus } = useStore();
    const [showLogin, setShowLogin] = useState(!auth);
    const [route, setRoute] = useState('home');

    useEffect(() => { if (auth) setShowLogin(false); }, [auth]);

    // Refresh icons on route change
    useEffect(() => {
      const tid = setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 0);
      return () => clearTimeout(tid);
    });

    // Wake audio context on first interaction
    useEffect(() => {
      const wake = () => SoundFX.wake();
      window.addEventListener('pointerdown', wake, { once: true });
      window.addEventListener('keydown', wake, { once: true });
      return () => { window.removeEventListener('pointerdown', wake); window.removeEventListener('keydown', wake); };
    }, []);

    const go = (r) => { window.scrollTo({ top: 0, behavior: 'instant' }); SoundFX.whoosh(); setRoute(r); };

    if (showLogin && !auth) return <Login onSkip={()=>setShowLogin(false)}/>;
    if (!state.profile.onboarded) return <Onboarding onDone={()=>{}}/>;

    const [base, sub] = route.split(':');
    let view;
    if (base === 'home') view = <Dashboard go={go}/>;
    else if (base === 'today') view = <TodayView go={go}/>;
    else if (base === 'calendar') view = <CalendarView/>;
    else if (base === 'finances') view = <FinancesView/>;
    else if (base === 'events') view = sub ? <EventDetail id={sub} back={()=>go('events')}/> : <EventsList go={go}/>;
    else if (base === 'settings') view = <SettingsView/>;
    else view = <Dashboard go={go}/>;

    const activeNav = base;

    return (
      <div className="min-h-full">
        <header className="sticky top-0 z-30 glass hairline-b">
          <div className="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center gap-3">
            <div className="h-8 w-8 rounded-xl bg-ink dark:bg-white grid place-items-center text-white dark:text-ink"><Icon name="layers" size={16}/></div>
            <div className="font-semibold tracking-tight">Vida</div>
            <div className="ml-2 hidden sm:flex items-center gap-1.5 text-xs text-zinc-500"><SyncDot status={syncStatus}/> <SyncLabel status={syncStatus}/></div>
            <div className="flex-1"/>
            <nav className="hidden md:flex items-center gap-1">
              {NAV.map(n => (
                <button key={n.id} onClick={()=>go(n.id)} className={`press px-3 h-9 rounded-xl text-sm font-medium inline-flex items-center gap-2 transition ${activeNav===n.id ? 'bg-paper-softer dark:bg-ink-soft text-ink dark:text-white' : 'text-zinc-500 hover:text-ink dark:hover:text-white hover:bg-paper-softer dark:hover:bg-ink-soft'}`}>
                  <Icon name={n.icon} size={14}/> {n.label}
                </button>
              ))}
            </nav>
            {auth && auth.user.avatar && <img src={auth.user.avatar} alt="" className="h-8 w-8 rounded-full hairline ml-2"/>}
          </div>
        </header>

        <main className="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-10 pb-28 md:pb-10">
          <div key={route}>{view}</div>
        </main>

        <nav className="md:hidden fixed bottom-0 inset-x-0 z-30 glass hairline-b" style={{paddingBottom:'env(safe-area-inset-bottom)'}}>
          <div className="grid grid-cols-6">
            {NAV.map(n => (
              <button key={n.id} onClick={()=>go(n.id)} className="press flex flex-col items-center gap-0.5 py-2.5">
                <Icon name={n.icon} size={20} className={activeNav===n.id ? 'text-ink dark:text-white' : 'text-zinc-400'}/>
                <span className={`text-[10px] font-medium ${activeNav===n.id ? 'text-ink dark:text-white' : 'text-zinc-500'}`}>{n.label}</span>
              </button>
            ))}
          </div>
        </nav>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<StoreProvider><App /></StoreProvider>);

  setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 50);
  </script>
</body>
</html>
