<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="Tu vida, en orden. Hábitos, finanzas, energía y eventos en un solo lugar." />
  <title>Vida</title>

  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/svg+xml" href="icon.svg"/>
  <link rel="apple-touch-icon" href="icon.svg"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Vida"/>
  <meta name="format-detection" content="telephone=no"/>

  <link rel="preconnect" href="https://rsms.me/" crossorigin>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">

  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter var', 'Inter', 'system-ui', '-apple-system', 'sans-serif'],
            display: ['Inter var', 'Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            ink: { DEFAULT: '#0a0a0a', soft: '#1c1c1e', softer: '#2c2c2e' },
            paper: { DEFAULT: '#ffffff', soft: '#fafafa', softer: '#f4f4f5' },
            accent: {
              blue: '#0A84FF', green: '#30D158', red: '#FF453A', orange: '#FF9F0A',
              yellow: '#FFD60A', pink: '#FF375F', purple: '#5E5CE6', teal: '#64D2FF',
            }
          },
          borderRadius: { '4xl': '2rem' },
          boxShadow: {
            'soft':    '0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04)',
            'softer':  '0 1px 1px rgba(0,0,0,.03)',
            'lift':    '0 8px 30px rgba(0,0,0,.08)',
          },
        }
      }
    }
  </script>

  <style>
    html, body, #root { height: 100%; }
    body {
      font-feature-settings: 'cv11','ss01','ss03','cv02';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #fafafa;
      overscroll-behavior-y: none;
    }
    .dark body { background: #0a0a0a; }
    @supports (font-variation-settings: normal) { body { font-family: 'Inter var', sans-serif; } }
    .hairline { box-shadow: 0 0 0 1px rgba(0,0,0,.06); }
    .dark .hairline { box-shadow: 0 0 0 1px rgba(255,255,255,.08); }
    .hairline-b { box-shadow: 0 1px 0 rgba(0,0,0,.06); }
    .dark .hairline-b { box-shadow: 0 1px 0 rgba(255,255,255,.08); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
    .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); background-clip: content-box; }
    .glass { background: rgba(255,255,255,.72); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); }
    .dark .glass { background: rgba(10,10,10,.72); }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    select { background-image: none; }
    [data-lucide] { width: 1em; height: 1em; }
    button, [role="button"] { -webkit-tap-highlight-color: transparent; }
    .grad-ink { background: linear-gradient(180deg,#0a0a0a,#3a3a3a); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .dark .grad-ink { background: linear-gradient(180deg,#fff,#bdbdbd); -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* ---- Animaciones ---- */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: none; } }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); } }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes pulse-ring { 0% { transform: scale(.9); opacity: .8; } 80%, 100% { transform: scale(1.6); opacity: 0; } }
    @keyframes slide-right { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes float-up { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-40px); opacity: 0; } }

    .anim-in       { animation: fadeIn .35s cubic-bezier(.16,1,.3,1) both; }
    .anim-scale-in { animation: scaleIn .25s cubic-bezier(.16,1,.3,1) both; }
    .anim-pop      { animation: pop .35s cubic-bezier(.34,1.56,.64,1); }
    .anim-sheet    { animation: sheetUp .32s cubic-bezier(.32,.72,0,1) both; }
    .anim-shimmer  { background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; }

    /* Stagger helpers */
    .stagger > * { animation: fadeIn .35s cubic-bezier(.16,1,.3,1) both; }
    .stagger > *:nth-child(1) { animation-delay: .02s; }
    .stagger > *:nth-child(2) { animation-delay: .04s; }
    .stagger > *:nth-child(3) { animation-delay: .06s; }
    .stagger > *:nth-child(4) { animation-delay: .08s; }
    .stagger > *:nth-child(5) { animation-delay: .10s; }
    .stagger > *:nth-child(6) { animation-delay: .12s; }
    .stagger > *:nth-child(7) { animation-delay: .14s; }
    .stagger > *:nth-child(8) { animation-delay: .16s; }
    .stagger > *:nth-child(9) { animation-delay: .18s; }
    .stagger > *:nth-child(10) { animation-delay: .20s; }

    .press { transition: transform .15s cubic-bezier(.16,1,.3,1); }
    .press:active { transform: scale(.96); }

    /* number ticker */
    .ticker { font-variant-numeric: tabular-nums; }

    /* day cell calendar */
    .day-cell { transition: transform .2s cubic-bezier(.16,1,.3,1), box-shadow .2s; }
    .day-cell:hover { transform: scale(1.06); z-index: 2; }

    /* checkmark draw */
    @keyframes drawCheck { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
    .check-draw path { stroke-dasharray: 24; stroke-dashoffset: 24; animation: drawCheck .3s cubic-bezier(.16,1,.3,1) forwards; }

    /* shake on error */
    @keyframes shake { 10%, 90% { transform: translateX(-1px); } 20%, 80% { transform: translateX(2px); } 30%, 50%, 70% { transform: translateX(-4px); } 40%, 60% { transform: translateX(4px); } }
    .anim-shake { animation: shake .5s; }

    /* float +1 */
    .floater { position: absolute; pointer-events: none; animation: float-up .8s ease-out forwards; font-weight: 600; }

    /* Mobile thumb-friendly: tap targets mínimos 44px en clases reservadas */
    @media (max-width: 640px) {
      .press, .press-spring, .checkbox, button, [role="button"] { -webkit-tap-highlight-color: transparent; }
      .icon-btn-mobile { min-height: 44px; min-width: 44px; }
      input[type="checkbox"] { width: 18px; height: 18px; }
    }
    /* Better touch behaviors */
    button { touch-action: manipulation; }
    .no-overscroll { overscroll-behavior: contain; }

    /* toast slide-up */
    @keyframes toast-in { from { opacity: 0; transform: translateY(16px) scale(.96); } to { opacity: 1; transform: none; } }
    .anim-toast { animation: toast-in .3s cubic-bezier(.34,1.56,.64,1) both; }

    /* sheet drag handle */
    .sheet-handle { width: 36px; height: 4px; border-radius: 999px; background: rgba(0,0,0,.18); margin: 8px auto 0; }
    .dark .sheet-handle { background: rgba(255,255,255,.20); }

    /* glow pulse on cards */
    @keyframes glow-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(48,209,88,.0), 0 0 0 0 rgba(48,209,88,.0); }
      35%  { box-shadow: 0 0 0 6px rgba(48,209,88,.18), 0 0 32px rgba(48,209,88,.45); }
      100% { box-shadow: 0 0 0 0 rgba(48,209,88,.0), 0 0 0 0 rgba(48,209,88,.0); }
    }
    .anim-glow-good { animation: glow-pulse 1.1s ease-out; }
    @keyframes glow-pulse-bad {
      0%   { box-shadow: 0 0 0 0 rgba(255,69,58,.0); }
      35%  { box-shadow: 0 0 0 6px rgba(255,69,58,.18), 0 0 32px rgba(255,69,58,.40); }
      100% { box-shadow: 0 0 0 0 rgba(255,69,58,.0); }
    }
    .anim-glow-bad { animation: glow-pulse-bad 1.1s ease-out; }

    /* FAB pop */
    @keyframes fab-pop {
      from { opacity: 0; transform: scale(.4); }
      to   { opacity: 1; transform: scale(1); }
    }
    .anim-fab { animation: fab-pop .26s cubic-bezier(.34,1.56,.64,1) both; }
    .anim-fab:nth-child(2) { animation-delay: .04s; }
    .anim-fab:nth-child(3) { animation-delay: .08s; }
    .anim-fab:nth-child(4) { animation-delay: .12s; }

    /* page slide for tab content */
    @keyframes page-fade-in { from { opacity: 0; } to { opacity: 1; } }
    .anim-tab { animation: page-fade-in .22s cubic-bezier(.16,1,.3,1) both; }

    /* radio-pulse for live updates */
    @keyframes radio-pulse {
      0% { transform: scale(.85); opacity: .6; }
      80%, 100% { transform: scale(2); opacity: 0; }
    }
    .live-dot { position: relative; }
    .live-dot::after {
      content:''; position: absolute; inset: -4px;
      border-radius: 50%; background: currentColor; opacity: .35;
      animation: radio-pulse 1.6s ease-out infinite;
    }

    /* =========================================================
       SISTEMA VISUAL DINÁMICO
       ========================================================= */

    /* Easings tipo Apple */
    :root {
      --ease-spring: cubic-bezier(.34,1.56,.64,1);
      --ease-out:    cubic-bezier(.16,1,.3,1);
      --ease-soft:   cubic-bezier(.32,.72,0,1);
    }

    /* Tipografía con escalas mobile más generosas */
    @media (max-width: 640px) {
      .text-3xl { font-size: 1.75rem; line-height: 1.1; }
      .text-4xl { font-size: 2.25rem; line-height: 1.05; }
      .text-5xl { font-size: 2.75rem; line-height: 1; }
      .text-6xl { font-size: 3.5rem; line-height: 1; }
    }

    /* Scroll iOS-like */
    html, body { overscroll-behavior-y: none; -webkit-overflow-scrolling: touch; }
    main { -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }

    /* Mesh gradient backgrounds (sutiles, decorativos) */
    .mesh-blue {
      background-image:
        radial-gradient(at 12% 18%, rgba(10,132,255,.18) 0, transparent 45%),
        radial-gradient(at 88% 22%, rgba(94,92,230,.16) 0, transparent 50%),
        radial-gradient(at 50% 95%, rgba(255,55,95,.10) 0, transparent 55%);
    }
    .mesh-orange {
      background-image:
        radial-gradient(at 8% 8%, rgba(255,159,10,.20) 0, transparent 50%),
        radial-gradient(at 92% 92%, rgba(255,69,58,.14) 0, transparent 50%);
    }
    .mesh-green {
      background-image:
        radial-gradient(at 8% 100%, rgba(48,209,88,.22) 0, transparent 60%),
        radial-gradient(at 100% 0%, rgba(100,210,255,.14) 0, transparent 50%);
    }
    .mesh-purple {
      background-image:
        radial-gradient(at 0% 0%, rgba(94,92,230,.20) 0, transparent 55%),
        radial-gradient(at 100% 100%, rgba(191,90,242,.18) 0, transparent 55%);
    }
    .mesh-pink {
      background-image:
        radial-gradient(at 100% 0%, rgba(255,55,95,.18) 0, transparent 55%),
        radial-gradient(at 0% 100%, rgba(255,159,10,.14) 0, transparent 55%);
    }
    .dark .mesh-blue   { background-image: radial-gradient(at 12% 18%, rgba(10,132,255,.28) 0, transparent 45%), radial-gradient(at 88% 22%, rgba(94,92,230,.24) 0, transparent 50%), radial-gradient(at 50% 95%, rgba(255,55,95,.18) 0, transparent 55%); }
    .dark .mesh-orange { background-image: radial-gradient(at 8% 8%, rgba(255,159,10,.30) 0, transparent 50%), radial-gradient(at 92% 92%, rgba(255,69,58,.20) 0, transparent 50%); }
    .dark .mesh-green  { background-image: radial-gradient(at 8% 100%, rgba(48,209,88,.30) 0, transparent 60%), radial-gradient(at 100% 0%, rgba(100,210,255,.20) 0, transparent 50%); }
    .dark .mesh-purple { background-image: radial-gradient(at 0% 0%, rgba(94,92,230,.30) 0, transparent 55%), radial-gradient(at 100% 100%, rgba(191,90,242,.26) 0, transparent 55%); }
    .dark .mesh-pink   { background-image: radial-gradient(at 100% 0%, rgba(255,55,95,.26) 0, transparent 55%), radial-gradient(at 0% 100%, rgba(255,159,10,.20) 0, transparent 55%); }

    /* Tarjeta con highlight de borde superior (estilo iOS card) */
    .card-shine {
      position: relative;
      overflow: hidden;
    }
    .card-shine::before {
      content:''; position:absolute; inset:0 0 auto 0; height:1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
      pointer-events:none;
    }
    .dark .card-shine::before { background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent); }

    /* Halo (glow) para elementos importantes */
    .halo-orange { box-shadow: 0 0 0 1px rgba(255,159,10,.3), 0 8px 28px rgba(255,159,10,.18); }
    .halo-blue   { box-shadow: 0 0 0 1px rgba(10,132,255,.3), 0 8px 28px rgba(10,132,255,.18); }
    .halo-green  { box-shadow: 0 0 0 1px rgba(48,209,88,.3), 0 8px 28px rgba(48,209,88,.18); }
    .halo-purple { box-shadow: 0 0 0 1px rgba(94,92,230,.3), 0 8px 28px rgba(94,92,230,.20); }

    /* Animación de respiración para la racha */
    @keyframes breathe {
      0%,100% { transform: scale(1);   filter: drop-shadow(0 0 6px rgba(255,159,10,.45)); }
      50%     { transform: scale(1.08);filter: drop-shadow(0 0 14px rgba(255,159,10,.85)); }
    }
    .breathe { animation: breathe 2.6s ease-in-out infinite; }

    /* Gradient text utility */
    .grad-text-blue   { background: linear-gradient(135deg,#0A84FF,#5E5CE6); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .grad-text-warm   { background: linear-gradient(135deg,#FF9F0A,#FF453A); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .grad-text-cool   { background: linear-gradient(135deg,#30D158,#64D2FF); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .grad-text-purple { background: linear-gradient(135deg,#5E5CE6,#FF375F); -webkit-background-clip:text; background-clip:text; color:transparent; }

    /* View transitions: SOLO opacity (sin transform — para no romper position:fixed de los modales) */
    @keyframes viewFadeIn { from { opacity:0; } to { opacity:1; } }
    .view-enter { animation: viewFadeIn .28s var(--ease-out) both; }

    /* Pulso decorativo */
    @keyframes softPulse {
      0%, 100% { opacity: .55; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.18); }
    }
    .soft-pulse { animation: softPulse 2.4s ease-in-out infinite; }

    /* Spring scale al press */
    .press-spring { transition: transform .2s var(--ease-spring); }
    .press-spring:active { transform: scale(.94); }

    /* Lift on hover (only for pointer devices) */
    @media (hover: hover) {
      .lift-hover { transition: transform .25s var(--ease-out), box-shadow .25s var(--ease-out); }
      .lift-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,.08); }
      .dark .lift-hover:hover { box-shadow: 0 10px 30px rgba(0,0,0,.55); }
    }

    /* Tap target mínimos en mobile */
    @media (max-width: 640px) {
      button, [role="button"], a.button { min-height: 44px; }
    }

    /* Bottom nav refinado para mobile */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
      background: rgba(255,255,255,.78);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      border-top: 1px solid rgba(0,0,0,.06);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .dark .tabbar {
      background: rgba(10,10,10,.78);
      border-top-color: rgba(255,255,255,.08);
    }
    .tabbar-grid { display: grid; grid-template-columns: repeat(5, 1fr); position: relative; padding: 6px 4px 4px; }
    .tabbar-pill {
      position: absolute; top: 4px; bottom: 4px; width: calc((100% - 8px)/5);
      left: 4px;
      background: rgba(0,0,0,.06);
      border-radius: 14px;
      transition: transform .42s var(--ease-spring);
      pointer-events: none;
    }
    .dark .tabbar-pill { background: rgba(255,255,255,.08); }
    .tabbar-btn {
      position: relative;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 9px 0 8px;
      min-height: 52px;
      color: var(--tw-text-tertiary, rgb(161,161,170));
      transition: color .2s var(--ease-out);
      -webkit-tap-highlight-color: transparent;
      z-index: 1;
    }
    .tabbar-btn[data-active="true"] { color: #0a0a0a; }
    .dark .tabbar-btn[data-active="true"] { color: #ffffff; }
    .tabbar-btn span { font-size: 10px; font-weight: 600; letter-spacing: -.005em; }

    /* Top nav desktop con indicador deslizante */
    .topnav { position: relative; }
    .topnav-pill {
      position: absolute; top: 0; bottom: 0;
      background: rgb(244,244,245);
      border-radius: 12px;
      transition: transform .42s var(--ease-spring), width .42s var(--ease-spring), opacity .25s;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
    }
    .dark .topnav-pill { background: rgb(28,28,30); }
    .topnav-btn { position: relative; z-index: 1; }

    /* Tabs animadas con indicador */
    .tabs-wrap {
      position: relative; display: flex; padding: 4px; background: rgb(244,244,245); border-radius: 14px;
      overflow-x: auto; max-width: 100%; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; scroll-snap-type: x proximity;
    }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .dark .tabs-wrap { background: rgb(28,28,30); }
    .tabs-pill {
      position: absolute; top: 4px; bottom: 4px; left: 0;
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
      transition: transform .42s var(--ease-spring), width .42s var(--ease-spring);
      z-index: 0;
    }
    .dark .tabs-pill { background: rgb(58,58,60); box-shadow: 0 1px 2px rgba(0,0,0,.4); }
    .tabs-btn { position: relative; z-index: 1; padding: 8px 14px; font-size: 13px; font-weight: 600; color: rgb(115,115,115); transition: color .2s; -webkit-tap-highlight-color: transparent; white-space: nowrap; flex-shrink: 0; scroll-snap-align: start; }
    .tabs-btn[data-active="true"] { color: #0a0a0a; }
    .dark .tabs-btn { color: rgb(161,161,170); }
    .dark .tabs-btn[data-active="true"] { color: #ffffff; }
    @media (max-width: 640px) {
      .tabs-wrap { width: 100%; }
    }

    /* Glow ring para checkboxes completados */
    @keyframes ringPop {
      0%   { transform: scale(.5); opacity: 0; }
      50%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .ring-pop { animation: ringPop .35s var(--ease-spring); }

    /* Stagger acentuado para mobile */
    .stagger-fast > * { animation: fadeIn .28s var(--ease-out) both; }
    .stagger-fast > *:nth-child(1) { animation-delay: .02s; }
    .stagger-fast > *:nth-child(2) { animation-delay: .06s; }
    .stagger-fast > *:nth-child(3) { animation-delay: .10s; }
    .stagger-fast > *:nth-child(4) { animation-delay: .14s; }
    .stagger-fast > *:nth-child(5) { animation-delay: .18s; }
    .stagger-fast > *:nth-child(6) { animation-delay: .22s; }
    .stagger-fast > *:nth-child(7) { animation-delay: .26s; }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body class="font-sans text-ink dark:text-white">
  <div id="root"></div>
  <canvas id="confetti-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:9999;display:none"></canvas>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
  /* =========================================================
     Vida — App de control personal con sync
     ========================================================= */

  const { useState, useEffect, useMemo, useRef, useCallback, createContext, useContext } = React;

  /* ---------- constantes ---------- */
  const AREAS = [
    { id: 'gym',      name: 'Gimnasio',     icon: 'dumbbell',         accent: '#FF453A' },
    { id: 'nakit',    name: 'Nakit',        icon: 'gem',              accent: '#FF9F0A' },
    { id: 'vdl',      name: 'VDL',          icon: 'briefcase',        accent: '#0A84FF' },
    { id: 'uni',      name: 'Universidad',  icon: 'graduation-cap',   accent: '#5E5CE6' },
    { id: 'personal', name: 'Personal',     icon: 'heart',            accent: '#FF375F' },
  ];
  const AREA_BY_ID = Object.fromEntries(AREAS.map(a => [a.id, a]));
  const CATEGORIAS_GASTO = ['Comida','Transporte','Suscripciones','Universidad','Salud','Ropa','Salidas','Materiales Nakit','Otros'];
  const CATEGORIAS_INGRESO = ['Salario VDL','Venta Nakit','Feria Nakit','Regalo','Otros'];

  /* ---------- helpers fecha/dinero/uid ---------- */
  const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-3);
  const todayISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
  const isoOf = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  const Toast = (() => {
    let subs = [];
    const push = (opts) => {
      const id = uid();
      const t = { id, kind:'info', duration: 3200, ...opts };
      subs.forEach(fn => fn({ type:'add', toast: t }));
      if (t.duration > 0) setTimeout(() => subs.forEach(fn => fn({ type:'remove', id })), t.duration);
      return id;
    };
    return {
      push,
      success: (msg, opts={}) => push({ kind:'success', message: msg, ...opts }),
      error:   (msg, opts={}) => push({ kind:'error',   message: msg, ...opts }),
      info:    (msg, opts={}) => push({ kind:'info',    message: msg, ...opts }),
      warning: (msg, opts={}) => push({ kind:'warning', message: msg, ...opts }),
      dismiss: (id) => subs.forEach(fn => fn({ type:'remove', id })),
      _subscribe: (fn) => { subs.push(fn); return () => { subs = subs.filter(x => x !== fn); }; },
    };
  })();

  function ToastStack() {

      });

  const SoundFX = (() => {
    let ctx = null;
    let muted = false;
    const ensureCtx = () => {
      if (!ctx) {
        try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
      }
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    };
    const tone = (freq, dur=0.1, type='sine', vol=0.07, attack=0.005, release=null) => {
      if (muted) return;
      const c = ensureCtx(); if (!c) return;
      const osc = c.createOscillator(); const gain = c.createGain();
      const filter = c.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 8000;
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime);
      gain.gain.setValueAtTime(0, c.currentTime);
      gain.gain.linearRampToValueAtTime(vol, c.currentTime + attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + (release || dur));
      osc.connect(filter); filter.connect(gain); gain.connect(c.destination);
      osc.start(); osc.stop(c.currentTime + dur + 0.05);
    };
    const noise = (dur=0.08, vol=0.04) => {
      if (muted) return;
      const c = ensureCtx(); if (!c) return;
      const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2 - 1) * (1 - i/data.length);
      const src = c.createBufferSource(); src.buffer = buf;
      const filter = c.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 1000;
      const gain = c.createGain(); gain.gain.value = vol;
      src.connect(filter); filter.connect(gain); gain.connect(c.destination); src.start();
    };
    return {
      setMuted: (m) => { muted = m; },
      isMuted: () => muted,
      tap:     () => tone(2000, 0.03, 'sine', 0.025),
      check:   () => { tone(880, 0.06, 'triangle', 0.07); setTimeout(()=>tone(1318, 0.10, 'triangle', 0.06), 35); },
      uncheck: () => tone(440, 0.08, 'triangle', 0.04),
      success: () => { tone(523, 0.08, 'sine', 0.08); setTimeout(()=>tone(659, 0.08, 'sine', 0.08), 80); setTimeout(()=>tone(784, 0.18, 'sine', 0.08), 160); },
      coin:    () => { tone(987, 0.05, 'square', 0.05); setTimeout(()=>tone(1318, 0.12, 'square', 0.04), 50); },
      cash:    () => { for (let i=0;i<5;i++) setTimeout(()=>tone(1200+Math.random()*800, 0.06, 'square', 0.04), i*40); setTimeout(()=>noise(0.18,0.05), 250); },
      milestone: () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f, 0.18, 'triangle', 0.08), i*90)); },
      whoosh:  () => { tone(620, 0.05, 'sine', 0.025, 0.002, 0.06); setTimeout(()=>tone(880, 0.05, 'sine', 0.018, 0.002, 0.06), 18); },
      nav:     () => { tone(720, 0.04, 'sine', 0.02, 0.002, 0.05); },
      error:   () => tone(180, 0.18, 'sawtooth', 0.04),
      wake:    () => { ensureCtx(); },
    };
  })();

  function fireConfetti({ count = 80, duration = 1800, originX = null, originY = null } = {}) {
    const canvas = document.getElementById('confetti-canvas');
    if (!canvas) return;
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const resize = () => { canvas.width = innerWidth*dpr; canvas.height = innerHeight*dpr; canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px'; ctx.scale(dpr,dpr); };
    resize();
    const colors = ['#FF453A','#FF9F0A','#FFD60A','#30D158','#0A84FF','#5E5CE6','#FF375F'];
    const ox = originX ?? innerWidth/2, oy = originY ?? innerHeight*0.4;
    const parts = Array.from({length:count}, () => ({
      x: ox + (Math.random()-0.5)*40, y: oy,
      vx: (Math.random()-0.5)*14, vy: -Math.random()*16 - 8,
      g: 0.5,
      rot: Math.random()*Math.PI*2, vr: (Math.random()-0.5)*0.4,
      size: 6 + Math.random()*8, color: colors[Math.floor(Math.random()*colors.length)],
      shape: Math.random() > 0.5 ? 'rect' : 'circle',
    }));
    const start = performance.now();
    const tick = (t) => {
      const elapsed = t - start;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const fade = Math.max(0, 1 - elapsed/duration);
      for (const p of parts) {
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.fillStyle = p.color; ctx.globalAlpha = fade;
        if (p.shape === 'rect') ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
        else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
        ctx.restore();
      }
      if (elapsed < duration) requestAnimationFrame(tick);
      else { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display = 'none'; }
    };
    requestAnimationFrame(tick);
  }

  /* =========================================================
     Sync con GitHub Gist
     ========================================================= */
  const GIST_DESC = 'Vida app data';
  const GIST_FILE = 'vida-data.json';

  async function gistVerifyToken(token) {
    const r = await fetch('https://api.github.com/user', { headers: { Authorization: `token ${token}` } });
    if (!r.ok) throw new Error('Token inválido o sin permisos.');
    return r.json();
  }
  async function gistFindOrCreate(token, initialData) {
    const list = await fetch('https://api.github.com/gists?per_page=100', { headers: { Authorization: `token ${token}` } }).then(r => r.json());
    let g = (list || []).find(x => x.description === GIST_DESC);
    if (!g) {
      const created = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: GIST_DESC, public: false, files: { [GIST_FILE]: { content: JSON.stringify(initialData || {}) } } }),
      });
      if (!created.ok) throw new Error('No se pudo crear el gist.');
      g = await created.json();
    }
    return g.id;
  }
  async function gistRead(token, id) {
    const r = await fetch(`https://api.github.com/gists/${id}`, { headers: { Authorization: `token ${token}` } });
    if (!r.ok) throw new Error('No se pudo leer el gist.');
    const g = await r.json();
    const f = g.files[GIST_FILE];
    if (!f) return null;
    if (f.truncated) {
      const raw = await fetch(f.raw_url, { headers: { Authorization: `token ${token}` } });
      return JSON.parse(await raw.text());
    }
    try { return JSON.parse(f.content); } catch { return null; }
  }
  async function gistWrite(token, id, data) {
    const r = await fetch(`https://api.github.com/gists/${id}`, {
      method: 'PATCH',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(data) } } }),
    });
    if (!r.ok) throw new Error('No se pudo guardar.');
    return true;
  }

  const weekStart = (iso) => {

  const StoreCtx = createContext(null);
  const useStore = () => useContext(StoreCtx);

  function loadLocal() {
    try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return defaultState;
      const p = JSON.parse(raw);
      // Merge cuentas: cada id default + valores guardados (preserva balance, name, etc.)
      const accounts = {};
      Object.keys(defaultState.accounts).forEach(id => {
        accounts[id] = { ...defaultState.accounts[id], ...((p.accounts||{})[id] || {}) };
      });
      // Si el user tenía cuentas custom desconocidas en el viejo formato, las traemos también
      if (p.accounts) for (const k of Object.keys(p.accounts)) if (!(k in accounts)) accounts[k] = p.accounts[k];
      return { ...defaultState, ...p,
        profile: { ...defaultState.profile, ...(p.profile||{}) },
        accounts,
        settings: { ...defaultState.settings, ...(p.settings||{}) },
        stats: { ...defaultState.stats, ...(p.stats||{}) },

        customCategories: { income: (p.customCategories?.income)||[], expense: (p.customCategories?.expense)||[] },
        netWorthHistory: p.netWorthHistory || [],
      };
    } catch { return defaultState; }
  }
  function saveLocal(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }
  function loadAuth() { try { return JSON.parse(localStorage.getItem(AUTH_KEY) || 'null'); } catch { return null; } }
  function saveAuth(a) { try { if (a) localStorage.setItem(AUTH_KEY, JSON.stringify(a)); else localStorage.removeItem(AUTH_KEY); } catch {} }

  function StoreProvider({ children }) {
    const [state, setState] = useState(loadLocal);
    const [auth, setAuth] = useState(loadAuth); // { token, user, gistId } | null
    const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | synced | error | offline
    const [authBusy, setAuthBusy] = useState(false);
    const syncTimer = useRef(null);
    const lastSavedRef = useRef('');

    // theme
    useEffect(() => {
      const html = document.documentElement;
      const apply = () => {
        const t = state.settings.theme;
        const dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        html.classList.toggle('dark', dark);
      };
      apply();
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      mq.addEventListener('change', apply);
      return () => mq.removeEventListener('change', apply);
    }, [state.settings.theme]);

    // sound
    useEffect(() => { SoundFX.setMuted(!state.settings.sound); }, [state.settings.sound]);

    // local persist + remote debounced sync
    useEffect(() => {
      saveLocal(state);
      if (!auth) return;
      const serial = JSON.stringify(state);
      if (serial === lastSavedRef.current) return;
      clearTimeout(syncTimer.current);
      setSyncStatus('syncing');
      syncTimer.current = setTimeout(async () => {
        try {
          await gistWrite(auth.token, auth.gistId, state);
          lastSavedRef.current = serial;
          setSyncStatus('synced');
        } catch (e) { setSyncStatus('error'); }
      }, 1500);
    }, [state, auth]);

    const update = useCallback((fn) => setState(s => fn(structuredClone(s))), []);

    const login = useCallback(async (token) => {
      setAuthBusy(true);
      try {
        const user = await gistVerifyToken(token);
        const gistId = await gistFindOrCreate(token, state);
        const remote = await gistRead(token, gistId);
        let useRemote = false;
        if (remote && remote.profile && remote.profile.onboarded) {
          // Si el remoto está onboarded y hay datos, preferimos remoto al hacer login
          useRemote = true;
        }
        if (useRemote) {
          // Deep merge de accounts: cada cuenta default + valores guardados (preserva color/icon/enabled/order)
          const accounts = {};
          Object.keys(defaultState.accounts).forEach(id => {
            accounts[id] = { ...defaultState.accounts[id], ...((remote.accounts||{})[id] || {}) };
          });
          if (remote.accounts) for (const k of Object.keys(remote.accounts)) if (!(k in accounts)) accounts[k] = remote.accounts[k];
          setState({ ...defaultState, ...remote,
            profile: { ...defaultState.profile, ...(remote.profile||{}) },
            accounts,
            settings: { ...defaultState.settings, ...(remote.settings||{}) },
            stats: { ...defaultState.stats, ...(remote.stats||{}) },
            energy: { ...defaultState.energy, ...(remote.energy||{}) },
            health: { ...defaultState.health, ...(remote.health||{}) },
            weeklyPlans: remote.weeklyPlans || [],
            transfers: remote.transfers || [],
            pending: remote.pending || [],
            budgets: remote.budgets || {},
            customCategories: { income: (remote.customCategories?.income)||[], expense: (remote.customCategories?.expense)||[] },
            netWorthHistory: remote.netWorthHistory || [],
          });
        }
        const newAuth = { token, user: { login: user.login, name: user.name, avatar: user.avatar_url }, gistId };
        saveAuth(newAuth); setAuth(newAuth); setSyncStatus('synced');
        return true;
      } catch (e) {
        setSyncStatus('error'); throw e;
      } finally { setAuthBusy(false); }
    }, [state]);

    const logout = useCallback(() => {
      saveAuth(null); setAuth(null); setSyncStatus('idle');
    }, []);

    /* ----- acciones de dominio ----- */
    const actions = useMemo(() => ({
      setProfile: (patch) => update(s => { Object.assign(s.profile, patch); return s; }),
      setSettings: (patch) => update(s => { Object.assign(s.settings, patch); return s; }),
      setAccounts: (patch) => update(s => { Object.assign(s.accounts, patch); return s; }),

      addTransaction: (tx) => update(s => {
        s.transactions = s.transactions || [];
        s.accounts = s.accounts || {};
        const t = { id: uid(), date: todayISO(), ...tx };
        s.transactions.unshift(t);
        const acc = s.accounts[t.account];
        if (acc) acc.balance = (acc.balance || 0) + (t.type === 'income' ? +t.amount : -+t.amount);
        return s;
      }),
      updateTransaction: (id, patch) => update(s => {
        const t = s.transactions.find(x => x.id === id); if (!t) return s;
        // revertir efecto del original sobre el saldo
        const oldAcc = s.accounts[t.account];
        if (oldAcc) oldAcc.balance -= (t.type === 'income' ? +t.amount : -+t.amount);
        // aplicar patch
        Object.assign(t, patch);
        // re-aplicar efecto con valores nuevos
        const newAcc = s.accounts[t.account];
        if (newAcc) newAcc.balance += (t.type === 'income' ? +t.amount : -+t.amount);
        return s;
      }),
      removeTransaction: (id) => update(s => {
        const i = s.transactions.findIndex(t => t.id === id); if (i < 0) return s;
        const t = s.transactions[i]; const acc = s.accounts[t.account];
        if (acc) acc.balance -= (t.type === 'income' ? +t.amount : -+t.amount);
        s.transactions.splice(i,1); return s;
      }),
      // Genera instancias de transacciones recurrentes desde su última materialización hasta hoy.
      materializeRecurring: () => update(s => {
        const today = todayISO();
        const seeds = (s.transactions || []).filter(t => t.recurring && !t.parentId);
        for (const seed of seeds) {
          const period = seed.recurringPeriod || 'monthly';
          let last = seed.lastMaterialized || seed.date;
          while (true) {
            let next;
            const d = new Date(last + 'T00:00:00');
            if (period === 'weekly') { d.setDate(d.getDate()+7); next = isoOf(d); }
            else if (period === 'yearly') { d.setFullYear(d.getFullYear()+1); next = isoOf(d); }
            else { d.setMonth(d.getMonth()+1); next = isoOf(d); }
            if (next > today) break;
            // crear instancia
            const inst = { id: uid(), date: next, type: seed.type, amount: +seed.amount, account: seed.account, category: seed.category, note: seed.note || '', parentId: seed.id };
            s.transactions.unshift(inst);
            const acc = s.accounts[inst.account];
            if (acc) acc.balance += (inst.type === 'income' ? +inst.amount : -+inst.amount);
            last = next;
          }
          seed.lastMaterialized = last;
        }
        return s;
      }),

      addHabit: (h) => update(s => { s.habits.push({ id: uid(), createdAt: todayISO(), log: {}, ...h }); return s; }),
      removeHabit: (id) => update(s => { s.habits = s.habits.filter(h => h.id !== id); return s; }),
      toggleHabit: (id, date) => update(s => {
        const h = s.habits.find(x => x.id === id); if (!h) return s;
        const willBeDone = !h.log[date];
        h.log[date] = willBeDone;
        if (!h.log[date]) delete h.log[date];
        // detección de milestone de racha (solo al marcar, no al desmarcar; solo si date es hoy)
        if (willBeDone && date === todayISO()) {
          let n = 0, d = date;
          while (h.log[d]) { n++; d = addDays(d, -1); }
          const ms = [7,14,30,60,100,200,365];
          const seenKey = `streak-${id}-${n}`;
          if (ms.includes(n) && !s.stats.confettiSeen[seenKey]) {
            s.stats.confettiSeen[seenKey] = true;
            setTimeout(() => window.dispatchEvent(new CustomEvent('vida:streak', { detail: { habit: h.name, streak: n } })), 80);
          }
        }
        return s;
      }),

      addTodo: (todo) => update(s => {
        s.todos.push({ id: uid(), createdAt: todayISO(), completedAt: null, areaId: 'personal', date: todayISO(), ...todo });
        return s;
      }),
      updateTodo: (id, patch) => update(s => { const t = s.todos.find(x => x.id === id); if (t) Object.assign(t, patch); return s; }),
      removeTodo: (id) => update(s => { s.todos = s.todos.filter(t => t.id !== id); return s; }),
      toggleTodo: (id) => update(s => {
        const t = s.todos.find(x => x.id === id); if (!t) return s;
        t.completedAt = t.completedAt ? null : new Date().toISOString();
        return s;
      }),

      addEvent: (e) => update(s => { s.events.unshift({ id: uid(), status:'planned', items:[], sales:[], notes:'', openingFloat:0, ...e }); return s; }),
      updateEvent: (id, patch) => update(s => { const e = s.events.find(x => x.id === id); if (e) Object.assign(e, patch); return s; }),
      removeEvent: (id) => update(s => { s.events = s.events.filter(e => e.id !== id); return s; }),
      addEventItem: (eventId, item) => update(s => { const e = s.events.find(x => x.id === eventId); if (e) e.items.push({ id: uid(), name:'', price:0, ...item }); return s; }),
      updateEventItem: (eventId, itemId, patch) => update(s => { const e = s.events.find(x => x.id === eventId); if (!e) return s; const it = e.items.find(i => i.id === itemId); if (it) Object.assign(it, patch); return s; }),
      removeEventItem: (eventId, itemId) => update(s => { const e = s.events.find(x => x.id === eventId); if (e) e.items = e.items.filter(i => i.id !== itemId); return s; }),
      addSale: (eventId, sale) => update(s => {
        const e = s.events.find(x => x.id === eventId); if (!e) return s;
        const total = sale.lines ? sale.lines.reduce((a,l)=>a+l.price*l.qty,0) : 0;
        e.sales.push({ id: uid(), ts: Date.now(), method: sale.method||'efectivo', ...sale, total });
        return s;
      }),
      removeSale: (eventId, saleId) => update(s => { const e = s.events.find(x => x.id === eventId); if (e) e.sales = e.sales.filter(x => x.id !== saleId); return s; }),
      closeEvent: (eventId) => update(s => {
        const e = s.events.find(x => x.id === eventId); if (!e) return s;
        e.status = 'closed';
        const total = e.sales.reduce((a,sa)=>a+sa.total,0);
        if (total > 0) {
          s.transactions.unshift({ id: uid(), date: e.endDate || todayISO(), account: 'nakit', type: 'income', amount: total, category: 'Feria Nakit', note: `Cierre de ${e.name}`, eventId: e.id });
          s.accounts.nakit.balance += total;
        }
        return s;
      }),

      markConfetti: (key) => update(s => { s.stats.confettiSeen[key] = true; return s; }),
      dismissRitual: (weekStartISO) => update(s => { s.stats.ritualDismissed[weekStartISO] = true; return s; }),

      /* ============== Finanzas extendidas ============== */
      // Cuentas
      toggleAccount: (id, enabled) => update(s => { if (s.accounts[id]) s.accounts[id].enabled = enabled; return s; }),
      updateAccount: (id, patch) => update(s => { if (s.accounts[id]) Object.assign(s.accounts[id], patch); return s; }),
      addAccount: (id, info) => update(s => {
        if (s.accounts[id]) return s;
        const order = Math.max(0, ...Object.values(s.accounts).map(a=>a.order||0)) + 1;
        s.accounts[id] = { balance:0, color:'#8E8E93', icon:'wallet', enabled:true, order, ...info };
        return s;
      }),
      removeAccount: (id) => update(s => {
        if (id === 'personal' || id === 'nakit') return s; // no borrar las core
        // mover transacciones a 'personal' como fallback (mantienen su saldo)
        s.transactions.forEach(t => { if (t.account === id) t.account = 'personal'; });
        s.transfers = (s.transfers || []).filter(t => t.from !== id && t.to !== id);
        delete s.accounts[id];
        return s;
      }),

      // Categorías custom
      addCategory: (kind, name) => update(s => {
        s.customCategories = s.customCategories || { income:[], expense:[] };
        const arr = s.customCategories[kind] = s.customCategories[kind] || [];
        const trimmed = name.trim(); if (!trimmed) return s;
        if (!arr.includes(trimmed)) arr.push(trimmed);
        return s;
      }),
      removeCategory: (kind, name) => update(s => {
        s.customCategories = s.customCategories || { income:[], expense:[] };
        s.customCategories[kind] = (s.customCategories[kind]||[]).filter(c => c !== name);
        return s;
      }),

      // Presupuestos
      setBudget: (category, amount) => update(s => {
        s.budgets = s.budgets || {};
        if (amount > 0) s.budgets[category] = +amount;
        else delete s.budgets[category];
        return s;
      }),

      // Transferencias entre cuentas (no afectan patrimonio neto, solo mueven plata)
      addTransfer: (tr) => update(s => {
        const t = { id: uid(), date: todayISO(), verified: false, ...tr };
        s.transfers = s.transfers || [];
        s.transfers.unshift(t);
        const fromAcc = s.accounts[t.from], toAcc = s.accounts[t.to];
        if (fromAcc) fromAcc.balance -= +t.amount;
        if (toAcc)   toAcc.balance   += +t.amount;
        return s;
      }),
      updateTransfer: (id, patch) => update(s => {
        s.transfers = s.transfers || [];
        const t = s.transfers.find(x => x.id === id); if (!t) return s;
        // revertir
        if (s.accounts[t.from]) s.accounts[t.from].balance += +t.amount;
        if (s.accounts[t.to])   s.accounts[t.to].balance   -= +t.amount;
        Object.assign(t, patch);
        // re-aplicar
        if (s.accounts[t.from]) s.accounts[t.from].balance -= +t.amount;
        if (s.accounts[t.to])   s.accounts[t.to].balance   += +t.amount;
        return s;
      }),
      removeTransfer: (id) => update(s => {
        s.transfers = s.transfers || [];
        const i = s.transfers.findIndex(x => x.id === id); if (i < 0) return s;
        const t = s.transfers[i];
        if (s.accounts[t.from]) s.accounts[t.from].balance += +t.amount;
        if (s.accounts[t.to])   s.accounts[t.to].balance   -= +t.amount;
        s.transfers.splice(i, 1);
        return s;
      }),

      // Verificación (conciliación contra banco)
      toggleVerified: (kind, id) => update(s => {
        const arr = kind === 'transfer' ? s.transfers : s.transactions;
        const it = (arr || []).find(x => x.id === id);
        if (it) it.verified = !it.verified;
        return s;
      }),

      /* ============== Pendientes (cuentas por cobrar / por pagar) ============== */
      addPending: (p) => update(s => {
        s.pending = s.pending || [];
        s.pending.unshift({
          id: uid(),
          direction: 'in',
          title: '',
          amount: 0,
          account: 'personal',
          category: '',
          expectedDate: todayISO(),
          fixed: false,
          recurring: false,
          recurringPeriod: 'monthly',
          status: 'pending',
          note: '',
          createdAt: Date.now(),
          paidAt: null,
          convertedToTxId: null,
          ...p,
        });
        return s;
      }),
      updatePending: (id, patch) => update(s => {
        const it = (s.pending || []).find(x => x.id === id);
        if (it) Object.assign(it, patch);
        return s;
      }),
      removePending: (id) => update(s => {
        s.pending = (s.pending || []).filter(x => x.id !== id);
        return s;
      }),
      // Confirmar = materializar como transacción real y marcar como recibido/pagado.
      // Si es recurrente, generar la siguiente instancia con expectedDate += período.
      confirmPending: (id, opts = {}) => update(s => {
        const it = (s.pending || []).find(x => x.id === id);
        if (!it || it.status !== 'pending') return s;
        const useDate = opts.date || todayISO();
        const useAmount = opts.amount != null ? +opts.amount : +it.amount;
        const useAccount = opts.account || it.account;
        const tx = {
          id: uid(),
          date: useDate,
          type: it.direction === 'in' ? 'income' : 'expense',
          amount: useAmount,
          account: useAccount,
          category: it.category || (it.direction === 'in' ? 'Otros' : 'Otros'),
          note: it.note ? `${it.title} · ${it.note}` : it.title,
          recurring: false,
          verified: false,
        };
        s.transactions.unshift(tx);
        const acc = s.accounts[tx.account];
        if (acc) acc.balance += tx.type === 'income' ? +tx.amount : -+tx.amount;
        it.status = it.direction === 'in' ? 'received' : 'paid';
        it.paidAt = Date.now();
        it.convertedToTxId = tx.id;

        // Si era recurrente, crear el siguiente
        if (it.recurring) {
          const d = new Date((it.expectedDate || useDate) + 'T00:00:00');
          if (it.recurringPeriod === 'weekly') d.setDate(d.getDate() + 7);
          else if (it.recurringPeriod === 'yearly') d.setFullYear(d.getFullYear() + 1);
          else d.setMonth(d.getMonth() + 1);
          s.pending.unshift({
            id: uid(),
            direction: it.direction,
            title: it.title,
            amount: +it.amount,
            account: it.account,
            category: it.category,
            expectedDate: isoOf(d),
            fixed: !!it.fixed,
            recurring: true,
            recurringPeriod: it.recurringPeriod,
            status: 'pending',
            note: it.note,
            createdAt: Date.now(),
            paidAt: null,
            convertedToTxId: null,
          });
        }
        return s;
      }),
      cancelPending: (id) => update(s => {
        const it = (s.pending || []).find(x => x.id === id);
        if (it) { it.status = 'cancelled'; it.paidAt = Date.now(); }
        return s;
      }),

      // Snapshot del patrimonio neto (1 por día)
      snapshotNetWorth: () => update(s => {
        const today = todayISO();
        const total = Object.entries(s.accounts).filter(([,a])=>a.enabled).reduce((a,[,acc])=>a+(acc.balance||0),0);
        const byAccount = Object.fromEntries(Object.entries(s.accounts).filter(([,a])=>a.enabled).map(([id,acc])=>[id, acc.balance||0]));
        s.netWorthHistory = s.netWorthHistory || [];
        const idx = s.netWorthHistory.findIndex(x => x.date === today);
        const entry = { date: today, total, byAccount };
        if (idx >= 0) s.netWorthHistory[idx] = entry;
        else s.netWorthHistory.push(entry);
        // mantenemos máximo 365 días
        if (s.netWorthHistory.length > 365) s.netWorthHistory = s.netWorthHistory.slice(-365);
        return s;
      }),

      /* Energía */
      setEnergy: (level) => update(s => {
        s.energy = s.energy || { current: null, lastUpdated: null, history: [] };
        s.energy.current = level;
        s.energy.lastUpdated = Date.now();
        s.energy.history = (s.energy.history || []).slice(-200);
        s.energy.history.push({ ts: Date.now(), level });
        return s;
      }),

      /* Salud — todas defensivas: garantizan estructura antes de mutar */
      addSleep: (entry) => update(s => {
        s.health = s.health || { sleep: [], hydration: [], workouts: [] };
        s.health.sleep = s.health.sleep || [];
        const idx = s.health.sleep.findIndex(x => x.date === entry.date);
        if (idx >= 0) s.health.sleep[idx] = { ...s.health.sleep[idx], ...entry };
        else s.health.sleep.push(entry);
        return s;
      }),
      removeSleep: (date) => update(s => {
        s.health = s.health || { sleep: [], hydration: [], workouts: [] };
        s.health.sleep = (s.health.sleep || []).filter(x => x.date !== date);
        return s;
      }),
      setHydration: (date, glasses) => update(s => {
        s.health = s.health || { sleep: [], hydration: [], workouts: [] };
        s.health.hydration = s.health.hydration || [];
        const idx = s.health.hydration.findIndex(x => x.date === date);
        if (idx >= 0) s.health.hydration[idx].glasses = glasses;
        else s.health.hydration.push({ date, glasses });
        return s;
      }),
      addWorkout: (entry) => update(s => {
        s.health = s.health || { sleep: [], hydration: [], workouts: [] };
        s.health.workouts = s.health.workouts || [];
        s.health.workouts.push({ id: uid(), ...entry });
        return s;
      }),
      removeWorkout: (id) => update(s => {
        s.health = s.health || { sleep: [], hydration: [], workouts: [] };
        s.health.workouts = (s.health.workouts || []).filter(x => x.id !== id);
        return s;
      }),
      updateWorkout: (id, patch) => update(s => {
        s.health = s.health || { sleep: [], hydration: [], workouts: [] };
        const w = (s.health.workouts || []).find(x => x.id === id);
        if (w) Object.assign(w, patch);
        return s;
      }),

      /* Plan semanal */
      saveWeeklyPlan: (plan) => update(s => {
        s.weeklyPlans = s.weeklyPlans || [];
        const idx = s.weeklyPlans.findIndex(x => x.weekStart === plan.weekStart);
        if (idx >= 0) s.weeklyPlans[idx] = { ...s.weeklyPlans[idx], ...plan };
        else s.weeklyPlans.unshift({ createdAt: Date.now(), ...plan });
        return s;
      }),

      reset: () => setState(defaultState),
      importState: (obj) => setState({ ...defaultState, ...obj }),
    }), [update]);

    return <StoreCtx.Provider value={{ state, actions, auth, login, logout, syncStatus, authBusy }}>{children}</StoreCtx.Provider>;
  }

  /* =========================================================
     FINANZAS · helpers
     ========================================================= */
  function enabledAccounts(state) {
    if (!state || !state.accounts) return [];
    return Object.entries(state.accounts)
      .filter(([,a]) => a && a.enabled)
      .sort((a,b) => (a[1].order||0) - (b[1].order||0))
      .map(([id, a]) => ({ id, ...a }));
  }
  function netWorth(state) {
    return enabledAccounts(state).reduce((sum, a) => sum + (a.balance || 0), 0);
  }
  function categoriesFor(state, kind) {
    const base = kind === 'income' ? CATEGORIAS_INGRESO : CATEGORIAS_GASTO;
    const custom = (state.customCategories?.[kind]) || [];
    // únicas, preservando orden: defaults primero, custom después
    const set = new Set(base); const merged = [...base];
    custom.forEach(c => { if (!set.has(c)) { set.add(c); merged.push(c); } });
    return merged;
  }
  function txByMonth(state, monthISO, opts = {}) {
    const tx = (state.transactions || []).filter(t => t.date && t.date.startsWith(monthISO));
    if (opts.account && opts.account !== 'all') return tx.filter(t => t.account === opts.account);
    return tx;
  }
  function monthSummary(state, monthISO, opts = {}) {
    const tx = txByMonth(state, monthISO, opts);
    let inc = 0, exp = 0;
    const byCat = {};
    tx.forEach(t => {
      if (t.type === 'income') inc += +t.amount;
      else { exp += +t.amount; byCat[t.category] = (byCat[t.category]||0) + +t.amount; }
    });
    return { inc, exp, net: inc - exp, byCat, count: tx.length };
  }
  function avgMonthlySpend(state, months = 3) {
    const today = todayISO();
    const list = [];
    for (let i = 1; i <= months; i++) {
      const d = new Date(today + 'T00:00:00');
      d.setMonth(d.getMonth() - i);
      const m = isoOf(d).slice(0, 7);
      list.push(monthSummary(state, m).exp);
    }
    if (!list.length) return 0;
    return list.reduce((a, b) => a + b, 0) / list.length;
  }
  // Cash flow esperado por pendientes en una ventana de N días
  function expectedCashFlow(state, days = 30) {
    const today = todayISO();
    const endDate = addDays(today, days);
    let inMoney = 0, outMoney = 0;
    const items = (state.pending || []).filter(p => p.status === 'pending');
    for (const p of items) {
      if (!p.expectedDate || p.expectedDate > endDate) continue;
      if (p.direction === 'in') inMoney += +p.amount;
      else outMoney += +p.amount;
    }
    return { inMoney, outMoney, net: inMoney - outMoney };
  }
  // Plata disponible para gastar libre = balance + ingresos esperados pendientes - gastos fijos pendientes - gasto variable promedio restante del mes
  function availableMoney(state, scope = 'month') {
    const today = todayISO();
    // Días restantes del mes
    const d = new Date(today + 'T00:00:00');
    const last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
    const daysLeft = Math.max(1, Math.round((last - d) / 86400000) + 1);
    const days = scope === 'week' ? 7 : daysLeft;
    const balance = netWorth(state);
    const expected = expectedCashFlow(state, days);
    // gasto variable promedio diario (3M) prorrateado a los días que quedan
    const avgMonthly = avgMonthlySpend(state, 3);
    const avgDaily = avgMonthly / 30;
    // gasto del mes ya ejecutado (lo descontamos del avg estimado para no contar dos veces)
    const m = monthKey(today);
    const cur = monthSummary(state, m);
    const projectedRemainingVarSpend = Math.max(0, avgDaily * days - 0); // simple: días por avg
    const available = balance + expected.inMoney - expected.outMoney - projectedRemainingVarSpend;
    return { available, balance, expectedIn: expected.inMoney, expectedOut: expected.outMoney, projectedRemainingVarSpend, daysLeft, days };
  }
  // Sugiere presupuestos basados en promedio últimos 3 meses + 10% buffer
  function suggestBudgets(state) {
    const today = todayISO();
    const acc = {};
    for (let i = 1; i <= 3; i++) {
      const d = new Date(today + 'T00:00:00'); d.setMonth(d.getMonth() - i);
      const ms = monthSummary(state, isoOf(d).slice(0, 7));
      Object.entries(ms.byCat).forEach(([c, v]) => { acc[c] = (acc[c] || 0) + v; });
    }
    const cats = Object.entries(acc).map(([cat, total]) => ({
      cat,
      avg: total / 3,
      suggested: Math.ceil((total / 3) * 1.1 / 1000) * 1000, // round up to nearest 1000
      current: state.budgets?.[cat] || 0,
    })).filter(x => x.avg >= 1000) // ignorar categorías triviales
      .sort((a, b) => b.avg - a.avg);
    return cats;
  }

  function recurringMonthlyImpact(state) {
    // suma neto/mes de las transacciones recurrentes (semilla con recurring=true && !parentId)
    const seeds = (state.transactions || []).filter(t => t.recurring && !t.parentId);
    let net = 0;
    seeds.forEach(s => {
      const factor = s.recurringPeriod === 'weekly' ? (52/12) : s.recurringPeriod === 'yearly' ? (1/12) : 1;
      const monthly = +s.amount * factor;
      net += s.type === 'income' ? monthly : -monthly;
    });
    return net;
  }
  function projectCashFlow(state, monthsAhead = 3) {
    // Cash flow neto proyectado: (recurrentes mensual) ajustado por promedio histórico no recurrente
    const today = todayISO();
    const m = monthKey(today);
    const cur = monthSummary(state, m);
    // Recurrentes fijas
    const recur = recurringMonthlyImpact(state);
    // Histórico no recurrente (último 3M, excluyendo recurrentes)
    let nonRecurNet = 0; let n = 0;
    for (let i = 1; i <= 3; i++) {
      const d = new Date(today + 'T00:00:00'); d.setMonth(d.getMonth() - i);
      const mk = isoOf(d).slice(0,7);
      const tx = (state.transactions || []).filter(t => t.date && t.date.startsWith(mk) && !t.parentId && !t.recurring);
      const net = tx.reduce((a,t) => a + (t.type==='income'?+t.amount:-+t.amount), 0);
      nonRecurNet += net; n++;
    }
    const avgNonRecur = n ? nonRecurNet / n : 0;
    const monthlyEst = recur + avgNonRecur;
    const start = netWorth(state);
    const series = [];
    for (let i = 0; i <= monthsAhead; i++) {
      series.push({ monthsAhead: i, total: start + monthlyEst * i });
    }
    return { monthlyEst, series, recur, avgNonRecur };
  }
  function computeInsights(state) {
    const out = [];
    const today = todayISO();
    const m = monthKey(today);
    const cur = monthSummary(state, m);
    const avgExp = avgMonthlySpend(state, 3);

    // 1. Tasa de ahorro este mes
    if (cur.inc > 0) {
      const rate = (cur.inc - cur.exp) / cur.inc;
      const pct = Math.round(rate * 100);
      const tone = pct >= 20 ? 'good' : pct >= 10 ? 'info' : pct >= 0 ? 'warn' : 'bad';
      out.push({
        tone, icon:'trending-up',
        title: 'Tasa de ahorro este mes',
        value: (pct >= 0 ? '+' : '') + pct + '%',
        hint: pct >= 20 ? 'Excelente. Estás arriba de la regla 50/30/20.'
            : pct >= 10 ? 'Vas bien, pero podés apuntar a 20%.'
            : pct >= 0 ? 'Estás ahorrando muy poco. Revisa categorías top.'
            : 'Estás gastando más de lo que ingresa. Acción urgente.',
      });
    }

    // 2. Cobertura de fondo de emergencia
    const ahorros = state.accounts?.ahorros?.balance || 0;
    const ahorrosEnabled = state.accounts?.ahorros?.enabled;
    if (avgExp > 0) {
      const meses = ahorros / avgExp;
      const tone = meses >= 6 ? 'good' : meses >= 3 ? 'info' : meses >= 1 ? 'warn' : 'bad';
      out.push({
        tone, icon: 'shield',
        title: 'Cobertura de emergencia',
        value: meses.toFixed(1) + ' meses',
        hint: ahorrosEnabled
          ? meses >= 6 ? 'Sólido. Considera mover excedente a Inversiones.'
          : meses >= 3 ? 'Suficiente. Apunta a 6 meses para tranquilidad.'
          : meses >= 1 ? 'Riesgo moderado. Prioriza llenar Ahorros.'
          : 'Crítico. Necesitas un fondo de al menos 1 mes de gastos.'
          : 'Activa la cuenta Ahorros en Cuentas para empezar a llenarla.',
      });
    }

    // 3. Top categoría del mes
    const cats = Object.entries(cur.byCat).sort((a,b)=>b[1]-a[1]);
    if (cats.length > 0 && cur.exp > 0) {
      const [cat, amt] = cats[0];
      const pctOfExp = Math.round((amt / cur.exp) * 100);
      out.push({
        tone: pctOfExp > 40 ? 'warn' : 'info',
        icon: 'pie-chart',
        title: 'Tu mayor gasto',
        value: cat,
        hint: `${fmtMoney(amt)} · ${pctOfExp}% del gasto total. ${pctOfExp > 40 ? 'Concentración alta — vale revisar.' : ''}`,
      });
    }

    // 4. Anomalía: categoría sobre promedio 3M
    const last3CatAvg = {};
    for (let i = 1; i <= 3; i++) {
      const d = new Date(today + 'T00:00:00'); d.setMonth(d.getMonth() - i);
      const mk = isoOf(d).slice(0,7);
      const ms = monthSummary(state, mk);
      Object.entries(ms.byCat).forEach(([c,v]) => { last3CatAvg[c] = (last3CatAvg[c]||0) + v/3; });
    }
    let anomalies = [];
    Object.entries(cur.byCat).forEach(([c,v]) => {
      const avg = last3CatAvg[c] || 0;
      if (avg > 5000 && v > avg * 1.4) anomalies.push({ cat: c, current: v, avg, delta: ((v/avg)-1)*100 });
    });
    if (anomalies.length > 0) {
      const top = anomalies.sort((a,b)=>b.delta-a.delta)[0];
      out.push({
        tone: 'warn', icon: 'alert-triangle',
        title: 'Anomalía detectada',
        value: top.cat,
        hint: `Vas ${Math.round(top.delta)}% sobre tu promedio (${fmtMoney(top.avg)}). Mes actual: ${fmtMoney(top.current)}.`,
      });
    }

    // 5. Categorías sobre presupuesto
    const budgets = state.budgets || {};
    const overBudget = Object.entries(budgets).filter(([cat, lim]) => (cur.byCat[cat]||0) > lim);
    if (overBudget.length > 0) {
      const [cat, lim] = overBudget[0];
      const used = cur.byCat[cat] || 0;
      out.push({
        tone: 'bad', icon: 'circle-alert',
        title: 'Sobre presupuesto',
        value: cat,
        hint: `Usaste ${fmtMoney(used)} de ${fmtMoney(lim)} (${Math.round((used/lim)*100)}%). ${overBudget.length>1?` Y otras ${overBudget.length-1} más.`:''}`,
      });
    }

    // 6. Cash flow proyectado
    const fc = projectCashFlow(state, 3);
    if (Math.abs(fc.monthlyEst) > 1000) {
      out.push({
        tone: fc.monthlyEst > 0 ? 'good' : 'warn',
        icon: 'activity',
        title: 'Cash flow neto proyectado',
        value: (fc.monthlyEst > 0 ? '+' : '') + fmtMoney(fc.monthlyEst) + '/mes',
        hint: fc.monthlyEst > 0
          ? `Si nada cambia, en 3 meses tendrás ${fmtMoney(netWorth(state) + fc.monthlyEst*3)}.`
          : `Estás quemando plata cada mes. Revisa gastos recurrentes.`,
      });
    }

    // 7. Plata disponible este mes (incluye pendientes)
    const av = availableMoney(state, 'month');
    if (av.daysLeft > 0) {
      out.push({
        tone: av.available > 0 ? 'good' : 'warn',
        icon: 'wallet-cards',
        title: `Disponible · ${av.daysLeft} días restantes`,
        value: fmtMoney(av.available),
        hint: av.available > 0
          ? `Saldo ${fmtMoney(av.balance)} + por cobrar ${fmtMoney(av.expectedIn)} − por pagar ${fmtMoney(av.expectedOut)} − gasto típico restante ${fmtMoney(av.projectedRemainingVarSpend)}.`
          : 'Tu plata no alcanza para tus gastos típicos del mes. Revisa pendientes y ajusta.',
      });
    }

    // 8. Próximos por cobrar (30 días)
    const exp30 = expectedCashFlow(state, 30);
    if (exp30.inMoney > 0) {
      out.push({
        tone: 'info', icon: 'inbox',
        title: 'Por cobrar · próx. 30 días',
        value: fmtMoney(exp30.inMoney),
        hint: 'Plata comprometida que llega pronto. Úsala para presupuestar.',
      });
    }
    if (exp30.outMoney > 0) {
      out.push({
        tone: 'warn', icon: 'calendar-clock',
        title: 'Por pagar · próx. 30 días',
        value: fmtMoney(exp30.outMoney),
        hint: 'Gastos fijos / comprometidos por venir. Asegurá liquidez.',
      });
    }

    // 9. Disponible para invertir o ahorrar más
    if (avgExp > 0 && ahorros > avgExp * 6 && ahorrosEnabled) {
      const excedente = ahorros - avgExp * 6;
      out.push({
        tone: 'good', icon: 'sparkles',
        title: 'Disponible para invertir',
        value: fmtMoney(excedente),
        hint: 'Tu fondo de emergencia ya está cubierto. Esto puede ir a Inversiones.',
      });
    } else if (cur.net > 5000 && cur.inc > 0) {
      const sugerido = Math.round(cur.net * 0.5);
      out.push({
        tone: 'info', icon: 'piggy-bank',
        title: 'Plata para mover a Ahorros',
        value: fmtMoney(sugerido),
        hint: `Tu cash flow neto del mes es ${fmtMoney(cur.net)}. Mover el 50% a ahorros es disciplina sana.`,
        action: { label: 'Transferir', kind: 'transfer', toAhorros: sugerido },
      });
    }

    return out;
  }

  /* =========================================================
     Cálculo del estado de un día (cumplido / a medias / fallido)
     ========================================================= */
  function dayStatus(state, dateISO) {
    const today = todayISO();
    // Ítems del día: todos los hábitos que existían en/antes del día + todos los todos asignados a ese día
    const habitsForDay = state.habits.filter(h => h.createdAt <= dateISO);
    const todosForDay = state.todos.filter(t => t.date === dateISO);
    const totalH = habitsForDay.length;
    const totalT = todosForDay.length;
    const total = totalH + totalT;
    const doneH = habitsForDay.filter(h => h.log[dateISO]).length;
    const doneT = todosForDay.filter(t => !!t.completedAt).length;
    const done = doneH + doneT;
    const score = total > 0 ? done/total : 0;

    let status;
    if (total === 0) status = 'empty';            // sin plan
    else if (score >= 1) status = 'done';
    else if (dateISO > today) status = 'planned';
    else if (dateISO === today) status = 'inProgress';
    else if (score >= 0.5) status = 'partial';
    else status = 'failed';

    return { status, score, done, total, doneH, totalH, doneT, totalT };
  }

      if (!open) return;
      setStep(0);
      setWins((existing?.wins || []).join('\n'));
      setLearnings((existing?.learnings || []).join('\n'));

    const steps = [

        title: 'Mirá la semana que pasó',

          <div className="space-y-4">

            </label>

              <span className="text-sm text-zinc-500 dark:text-zinc-400">Aprendizajes · qué no funcionó</span>
              <Textarea rows={4} value={learnings} onChange={e=>setLearnings(e.target.value)} placeholder="Me distraigo cuando…"/>

          <div className="space-y-2">

            <Input placeholder="Ej. Dejar lista la colección para fotos" value={intention} onChange={e=>setIntention(e.target.value)} icon="target"/>
          </div>
        ),
      },
      {
        title: 'Tres prioridades',
        body: (
          <div className="space-y-3">
            <p className="text-sm text-zinc-500 dark:text-zinc-400">Solo tres. Lo demás es ruido. Si una semana se complica, esto es lo único que tenés que mover.</p>

              <div key={i} className="flex items-center gap-3">
                <span className="h-7 w-7 grid place-items-center rounded-full bg-ink text-white dark:bg-white dark:text-ink text-xs font-semibold shrink-0">{i+1}</span>

              </div>
            ))}
          </div>
        ),
      },
    ];

    const last = step === steps.length - 1;
    const s = steps[step];

    return (
      <Sheet open={open} onClose={onClose}
             title={`Ritual de domingo · semana del ${fmtDate(ws,{day:'numeric',month:'long'})}`}
             footer={
               <div className="flex items-center gap-2">
                 {step > 0 && <Button variant="ghost" onClick={()=>setStep(s=>s-1)}>Atrás</Button>}
                 <div className="flex-1"/>

          {steps.map((_, i) => (
            <div key={i} className={`h-1 flex-1 rounded-full transition-all duration-500 ${i <= step ? 'bg-ink dark:bg-white' : 'bg-zinc-200 dark:bg-ink-softer'}`}/>

  function AreaPill({ areaId, className='' }) {
    const a = AREA_BY_ID[areaId]; if (!a) return null;
    return <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[12px] font-medium ${className}`} style={{background:a.accent+'1f',color:a.accent}}><Icon name={a.icon} size={12}/>{a.name}</span>;
  }

  function Tabs({ items, value, onChange, className = '' }) {
    const wrapRef = useRef(null);
    const lastValueRef = useRef(value);
    const [pill, setPill] = useState({ left: 4, width: 0, ready: false });
    const positionPill = useCallback(() => {
      try {
        const idx = Math.max(0, items.findIndex(i => i.value === value));
        const btns = wrapRef.current?.querySelectorAll('button');
        const btn = btns?.[idx];
        if (!btn || !wrapRef.current) return;
        const sl = wrapRef.current.scrollLeft;
        const wrap = wrapRef.current.getBoundingClientRect();
        const r = btn.getBoundingClientRect();
        setPill({ left: r.left - wrap.left + sl, width: r.width, ready: true });
      } catch (_) {}
    }, [items, value]);
    // Posicionamiento del pill
    useEffect(() => { positionPill(); }, [positionPill]);
    // Auto-scroll horizontal SOLO cuando cambia el valor (no en cada render)
    useEffect(() => {
      if (lastValueRef.current === value) return;
      lastValueRef.current = value;
      try {
        const idx = Math.max(0, items.findIndex(i => i.value === value));
        const btns = wrapRef.current?.querySelectorAll('button');
        const btn = btns?.[idx];
        if (btn && wrapRef.current) {
          const wrap = wrapRef.current;
          const targetLeft = btn.offsetLeft - wrap.clientWidth/2 + btn.clientWidth/2;
          wrap.scrollTo({ left: Math.max(0, targetLeft), behavior: 'smooth' });
        }
      } catch (_) {}
    }, [value, items]);
    useEffect(() => {
      const onResize = () => positionPill();
      window.addEventListener('resize', onResize);
      return () => window.removeEventListener('resize', onResize);
    }, [positionPill]);
    useEffect(() => {
      const onScroll = () => {
        try {
          const idx = Math.max(0, items.findIndex(i => i.value === value));
          const btns = wrapRef.current?.querySelectorAll('button');
          const btn = btns?.[idx];
          if (!btn || !wrapRef.current) return;
          const sl = wrapRef.current.scrollLeft;
          const wrap = wrapRef.current.getBoundingClientRect();
          const r = btn.getBoundingClientRect();
          setPill(p => ({ ...p, left: r.left - wrap.left + sl }));
        } catch (_) {}
      };
      const el = wrapRef.current;
      el?.addEventListener('scroll', onScroll, { passive: true });
      return () => el?.removeEventListener('scroll', onScroll);
    }, [items, value]);
    return (
      <div ref={wrapRef} className={`tabs-wrap ${className}`}>
        <span className="tabs-pill" style={{ transform: `translateX(${pill.left}px)`, width: pill.width, opacity: pill.ready ? 1 : 0 }}/>
        {items.map(it => (
          <button key={it.value} data-active={value===it.value}
                  onClick={()=>{ if (value!==it.value) { SoundFX.tap(); onChange(it.value); } }}
                  className="tabs-btn press-spring">{it.label}</button>
        ))}
      </div>
    );
  }

  function CountUp({ value, format = (n)=>n, duration = 600 }) {
    const [n, setN] = useState(value);
    const fromRef = useRef(value);
    useEffect(() => {
      const from = fromRef.current; const to = value;
      if (from === to) return;
      const start = performance.now();
      let raf;
      const tick = (t) => {
        const p = Math.min(1, (t-start)/duration);
        const eased = 1 - Math.pow(1-p, 3);
        setN(from + (to-from)*eased);
        if (p < 1) raf = requestAnimationFrame(tick);
        else fromRef.current = to;
      };
      raf = requestAnimationFrame(tick);
      return () => cancelAnimationFrame(raf);
    }, [value]);
    return <span className="ticker">{format(n)}</span>;
  }

    const total = all.length;
    const done = habits.filter(h=>h.log[date]).length + todos.filter(t=>t.completedAt).length;
    const score = total ? done/total : 0;

    return (
      <div className="space-y-5">
        <Card className="p-5">
          <div className="flex items-end justify-between">
            <div>
              <div className="text-xs uppercase tracking-wider text-zinc-500 font-semibold">{planning ? 'Plan para mañana':'Progreso'}</div>
              <div className="mt-1 text-2xl font-semibold ticker">{done}<span className="text-zinc-400 text-base font-medium"> / {total}</span></div>
            </div>
            <div className="text-sm text-zinc-500 capitalize">{dayName(date).toLowerCase()} {fmtDate(date,{day:'numeric',month:'short'})}</div>
          </div>
          <div className="mt-3 h-2 rounded-full bg-paper-softer dark:bg-ink-softer overflow-hidden">
            <div className="h-full transition-all duration-700 ease-out" style={{ width: `${Math.round(score*100)}%`, background: score>=1?'#30D158':score>=.5?'#FF9F0A':'#0A84FF' }}/>

          <Card className="p-10 text-center">
            <Icon name="sparkles" size={28} className="text-zinc-400"/>
            <p className="mt-3 text-zinc-500">{planning ? 'Aún no hay nada para mañana. Crea tus primeras tareas.' : 'No hay nada planeado para hoy.'}</p>
          </Card>
        ) : (
          <div className="space-y-2 stagger">
            {all.map(it => it.k === 'habit'

  function TodoForm({ open, onClose, date, existing = null }) {
    const { actions } = useStore();
    const [text, setText] = useState('');
    const [areaId, setAreaId] = useState('personal');
    const [d, setD] = useState(date || todayISO());
    const isEdit = !!existing;
    useEffect(() => {
      if (!open) return;
      if (existing) { setText(existing.text||''); setAreaId(existing.areaId||'personal'); setD(existing.date||todayISO()); }
      else { setText(''); setAreaId('personal'); setD(date || todayISO()); }
    }, [open, date, existing]);
    const save = () => {
      if (!text.trim()) return;
      try {
        if (isEdit) { actions.updateTodo(existing.id, { text: text.trim(), areaId, date: d }); SoundFX.success(); Toast.success('Tarea actualizada'); }
        else { actions.addTodo({ text: text.trim(), areaId, date: d }); SoundFX.success(); Toast.success(d===todayISO()?'Tarea para hoy':`Tarea para ${fmtDate(d)}`); }
      } catch (e) { console.error(e); Toast.error('No se pudo guardar'); }
      finally { onClose(); }
    };
    const remove = () => {
      if (!isEdit) return;
      const snap = { ...existing };
      try {
        actions.removeTodo(existing.id); SoundFX.uncheck();
        Toast.push({ kind:'info', message:'Tarea eliminada', duration: 5500,
          action: { label:'Deshacer', onClick: () => { actions.addTodo(snap); Toast.success('Restaurada'); } } });
      } catch (e) {}
      finally { onClose(); }
    };
    return (
      <Sheet open={open} onClose={onClose} title={isEdit?'Editar tarea':'Nueva tarea'}
             footer={
               <div className="flex justify-end gap-2">
                 {isEdit && <Button variant="ghost" onClick={remove} className="text-accent-red mr-auto"><Icon name="trash-2" size={16}/> Eliminar</Button>}
                 <Button variant="ghost" onClick={onClose}>Cancelar</Button>
                 <Button onClick={save}>{isEdit?'Guardar':'Crear'}</Button>

             }>

          <label className="block">
            <span className="text-sm text-zinc-500">Tarea</span>

            <span className="text-sm text-zinc-500">Área</span>
            <div className="mt-2 grid grid-cols-5 gap-2">
