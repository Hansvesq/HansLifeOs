                </button>
              ))}
            </div>
          </div>
        </div>
      </Sheet>
    );
  }

  /* =========================================================
     CALENDARIO
     ========================================================= */
  function CalendarView() {
    const { state } = useStore();
    const [cursor, setCursor] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
    const [selected, setSelected] = useState(todayISO());

    const monthMatrix = useMemo(() => {
      const y = cursor.getFullYear(), m = cursor.getMonth();
      const firstDay = new Date(y, m, 1);
      const startWeekDay = firstDay.getDay(); // 0 Sun
      const daysInMonth = new Date(y, m+1, 0).getDate();
      const cells = [];
      for (let i=0; i<startWeekDay; i++) cells.push(null);
      for (let d=1; d<=daysInMonth; d++) {
        const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        cells.push({ iso, day: d, ...dayStatus(state, iso) });
      }
      while (cells.length % 7 !== 0) cells.push(null);
      return cells;
    }, [cursor, state]);

    const monthLabel = cursor.toLocaleDateString('es-CR', { month: 'long', year: 'numeric' });

    // stats del mes mostrado
    const monthStats = useMemo(() => {
      let done=0, partial=0, failed=0, planned=0, totalDays=0;
      for (const c of monthMatrix) if (c) {
        totalDays++;
        if (c.status==='done') done++;
        else if (c.status==='partial') partial++;
        else if (c.status==='failed') failed++;
        else if (c.status==='planned' || c.status==='inProgress') planned++;
      }
      return { done, partial, failed, planned, totalDays };
    }, [monthMatrix]);

    // racha máxima del estado completo
    const bestStreak = useMemo(() => {
      const start = state.habits.reduce((min, h) => h.createdAt < min ? h.createdAt : min, todayISO());
      let best = 0, cur = 0; let d = start;
      while (d <= todayISO()) {
        const st = dayStatus(state, d);
        if (st.status === 'done') { cur++; if (cur > best) best = cur; }
        else cur = 0;
        d = addDays(d, 1);
      }
      return best;
    }, [state]);

    const sel = dayStatus(state, selected);
    const habitsSel = state.habits.filter(h => h.createdAt <= selected);
    const todosSel = state.todos.filter(t => t.date === selected);

    return (
      <div className="space-y-8 anim-in">
        <div>
          <h1 className="text-3xl font-semibold tracking-tight">Calendario</h1>
          <p className="text-zinc-500 mt-1">Tu historial: cumplido, a medias, fallido.</p>
        </div>

        {/* Resumen del mes */}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 stagger-fast">
          <Card className="p-4 card-shine relative overflow-hidden mesh-green">
            <div className="text-[11px] uppercase tracking-wider text-zinc-500 font-bold relative">Cumplidos</div>
            <div className="text-3xl font-bold mt-1 ticker grad-text-cool relative">{monthStats.done}</div>
          </Card>
          <Card className="p-4 card-shine relative overflow-hidden mesh-orange">
            <div className="text-[11px] uppercase tracking-wider text-zinc-500 font-bold relative">A medias</div>
            <div className="text-3xl font-bold mt-1 ticker grad-text-warm relative">{monthStats.partial}</div>
          </Card>
          <Card className="p-4 card-shine relative overflow-hidden mesh-pink">
            <div className="text-[11px] uppercase tracking-wider text-zinc-500 font-bold relative">Fallidos</div>
            <div className="text-3xl font-bold mt-1 ticker relative" style={{color:'#FF453A'}}>{monthStats.failed}</div>
          </Card>
          <Card className="p-4 card-shine relative overflow-hidden mesh-purple">
            <div className="text-[11px] uppercase tracking-wider text-zinc-500 font-bold relative">Mejor racha</div>
            <div className="text-3xl font-bold mt-1 ticker grad-text-purple relative">{bestStreak} <span className="text-base text-zinc-400 font-medium">{bestStreak===1?'día':'días'}</span></div>
          </Card>
        </div>

        {/* Calendario */}
        <Card className="p-4 sm:p-6">
          <div className="flex items-center justify-between mb-4">
            <button onClick={()=>{ SoundFX.tap(); setCursor(new Date(cursor.getFullYear(), cursor.getMonth()-1, 1)); }} className="press h-9 w-9 grid place-items-center rounded-xl hover:bg-paper-softer dark:hover:bg-ink-softer"><Icon name="chevron-left" size={18}/></button>
            <div className="font-semibold capitalize">{monthLabel}</div>
            <button onClick={()=>{ SoundFX.tap(); setCursor(new Date(cursor.getFullYear(), cursor.getMonth()+1, 1)); }} className="press h-9 w-9 grid place-items-center rounded-xl hover:bg-paper-softer dark:hover:bg-ink-softer"><Icon name="chevron-right" size={18}/></button>
          </div>

          <div className="grid grid-cols-7 text-center text-xs text-zinc-400 mb-2">
            {['D','L','M','M','J','V','S'].map((d,i) => <div key={i}>{d}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1.5 sm:gap-2">
            {monthMatrix.map((c, i) => {
              if (!c) return <div key={i}/>;
              const isToday = c.iso === todayISO();
              const isSelected = c.iso === selected;
              const grad = c.status==='done' ? 'linear-gradient(135deg,#30D158,#64D2FF)'
                         : c.status==='partial' ? 'linear-gradient(135deg,#FF9F0A,#FF453A)'
                         : c.status==='failed' ? 'linear-gradient(135deg,#FF453A,#FF375F)'
                         : c.status==='inProgress' ? 'rgba(10,132,255,.22)'
                         : c.status==='planned' ? 'rgba(10,132,255,.10)'
                         : null;
              const textColor = (c.status==='done'||c.status==='partial'||c.status==='failed') ? 'white' : 'inherit';
              const haloColor = c.status==='done' ? 'rgba(48,209,88,.55)'
                              : c.status==='partial' ? 'rgba(255,159,10,.55)'
                              : c.status==='failed' ? 'rgba(255,69,58,.55)'
                              : 'rgba(10,132,255,.45)';
              return (
                <button key={i} onClick={()=>{SoundFX.tap(); setSelected(c.iso);}}
                        className={`day-cell press-spring aspect-square rounded-2xl text-sm font-semibold relative grid place-items-center ${c.status==='empty' ? 'bg-paper-softer dark:bg-ink-softer text-zinc-400' : ''}`}
                        style={{
                          background: grad || undefined,
                          color: textColor,
                          boxShadow: isSelected ? `0 0 0 2px ${isToday?'#0A84FF':'#0a0a0a'}, 0 6px 18px ${haloColor}` : (c.status==='done'||c.status==='partial'||c.status==='failed') ? `0 4px 14px ${haloColor}` : undefined,
                        }}>
                  <span>{c.day}</span>
                  {isToday && <span className="absolute bottom-1.5 h-1 w-1 rounded-full bg-white shadow-[0_0_6px_rgba(255,255,255,.9)]" style={c.status==='empty'?{background:'#0A84FF'}:undefined}/>}

  function TxForm({ open, onClose, existing = null }) {
    const { state, actions } = useStore();
    const accs = enabledAccounts(state);
    const [account, setAccount] = useState(accs[0]?.id || 'personal');
    const [type, setType] = useState('expense');
    const [amount, setAmount] = useState('');
    const [category, setCategory] = useState('Comida');
    const [note, setNote] = useState('');
    const [date, setDate] = useState(todayISO());
    const [recurring, setRecurring] = useState(false);
    const [recurringPeriod, setRecurringPeriod] = useState('monthly');
    const [verified, setVerified] = useState(false);
    const isEdit = !!existing;
    const cats = useMemo(() => categoriesFor(state, type), [state, type]);

    // Live preview del saldo de la cuenta seleccionada después de aplicar el cambio
    const preview = useMemo(() => {
      const acc = state.accounts[account];
      if (!acc) return null;
      const a = parseFloat(amount); const valid = a > 0;
      let after = acc.balance || 0;
      if (isEdit) {
        // revertir el original si misma cuenta
        if (existing.account === account) after -= (existing.type==='income' ? +existing.amount : -+existing.amount);
        else if (existing.account) {
          // si cambió de cuenta, no afecta a "after" (pero el preview de la otra cuenta no lo mostramos por brevedad)
        }
      }
      if (valid) after += (type === 'income' ? a : -a);
      return { acc, before: acc.balance || 0, after, delta: after - (acc.balance || 0), valid };
    }, [state.accounts, account, amount, type, isEdit, existing]);

    useEffect(() => {
      if (!open) return;
      if (existing) {
        setAccount(existing.account || 'personal');
        setType(existing.type || 'expense');
        setAmount(String(existing.amount || ''));
        setCategory(existing.category || 'Comida');
        setNote(existing.note || '');
        setDate(existing.date || todayISO());
        setRecurring(!!existing.recurring);
        setRecurringPeriod(existing.recurringPeriod || 'monthly');
        setVerified(!!existing.verified);
      } else {
        const en = enabledAccounts(state);
        setAccount(en[0]?.id || 'personal');
        setType('expense');
        setAmount(''); setCategory(categoriesFor(state, 'expense')[0] || 'Comida');
        setNote(''); setDate(todayISO()); setRecurring(false); setRecurringPeriod('monthly'); setVerified(false);
      }
    }, [open, existing]);
    useEffect(() => {
      if (!isEdit) setCategory(categoriesFor(state, type)[0] || (type==='income'?'Otros':'Comida'));
    }, [type, isEdit]);

    const save = () => {
      const a = parseFloat(amount); if (!a||a<=0) return;
      try {
        const payload = { account, type, amount: a, category, note, date, recurring, recurringPeriod, verified };
        const accName = state.accounts[account]?.name || account;
        if (isEdit) {
          actions.updateTransaction(existing.id, payload); SoundFX.success();
          Toast.success(`Movimiento actualizado · ${accName}`);
        } else {
          actions.addTransaction(payload); SoundFX.coin();
          Toast.push({ kind: type==='income' ? 'success' : 'info', message: `${type==='income'?'+':'-'}${fmtMoney(a)} · ${accName}`, title: type==='income'?'Ingreso':'Gasto' });
          // Hito: primera transacción
          const txCount = (state.transactions || []).length + 1;
          if (txCount === 1) { fireConfetti({ count: 90 }); SoundFX.milestone?.(); Toast.success('¡Tu primer movimiento registrado!', { duration: 4500 }); }
        }
        // Glow pulse en main view: dispara animación
        const ev = new CustomEvent('vida:balance-changed', { detail: { account, delta: type==='income'?a:-a } });
        window.dispatchEvent(ev);
      } catch (e) { console.error('save tx failed:', e); SoundFX.error?.(); Toast.error('No se pudo guardar'); }
      finally { onClose(); }
    };
    const remove = () => {
      if (!isEdit) return;
      const snapshot = { ...existing };
      try {
        actions.removeTransaction(existing.id); SoundFX.uncheck();
        Toast.push({ kind:'info', message:`Movimiento eliminado · ${state.accounts[snapshot.account]?.name||snapshot.account}`,
          duration: 6000,
          action: { label: 'Deshacer', onClick: () => { actions.addTransaction(snapshot); Toast.success('Restaurado'); } } });
      } catch (e) {}
      finally { onClose(); }
    };
    return (
      <Sheet open={open} onClose={onClose} title={isEdit ? 'Editar movimiento' : 'Nuevo movimiento'}
             footer={
               <div className="flex justify-end gap-2 flex-wrap">
                 {isEdit && <Button variant="ghost" onClick={remove} className="text-accent-red"><Icon name="trash-2" size={16}/> Eliminar</Button>}
                 {isEdit && <Button variant="ghost" onClick={()=>{
                   try {
                     actions.addTransaction({ account, type, amount: parseFloat(amount)||0, category, note, date: todayISO(), recurring:false, verified:false });
                     SoundFX.coin(); Toast.success('Movimiento duplicado a hoy');
                   } catch (e) { Toast.error('No se pudo duplicar'); }
                   finally { onClose(); }
                 }}><Icon name="copy" size={16}/> Duplicar</Button>}
                 <div className="flex-1"/>
                 <Button variant="ghost" onClick={onClose}>Cancelar</Button>
                 <Button onClick={save}>{isEdit?'Guardar':'Crear'}</Button>
               </div>
             }>
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-2">
            <button onClick={()=>{SoundFX.tap(); setType('expense');}} className={`press h-12 rounded-2xl font-medium transition inline-flex items-center justify-center gap-2 ${type==='expense' ? 'bg-accent-red text-white' : 'bg-paper-softer dark:bg-ink-softer'}`}><Icon name="arrow-down" size={16}/> Gasto</button>
            <button onClick={()=>{SoundFX.tap(); setType('income');}} className={`press h-12 rounded-2xl font-medium transition inline-flex items-center justify-center gap-2 ${type==='income' ? 'bg-accent-green text-white' : 'bg-paper-softer dark:bg-ink-softer'}`}><Icon name="arrow-up" size={16}/> Ingreso</button>
          </div>
          <label className="block"><span className="text-sm text-zinc-500">Monto</span><Input type="number" inputMode="decimal" placeholder="0" value={amount} onChange={e=>setAmount(e.target.value)} icon="banknote" className="mt-1"/></label>
          {preview && preview.valid && (
            <div className="anim-in flex items-center justify-between gap-2 px-4 py-2 rounded-xl bg-paper-softer dark:bg-ink-softer">
              <div className="flex items-center gap-2 text-[12px] text-zinc-500">
                <span className="h-2 w-2 rounded-full" style={{background: preview.acc.color}}/>
                Saldo {preview.acc.name}
              </div>
              <div className="text-[12px] tabular flex items-center gap-2">
                <span className="text-zinc-400">{fmtMoney(preview.before)}</span>
                <Icon name="arrow-right" size={11} className="text-zinc-400"/>
                <span className="font-semibold" style={{color: preview.delta >= 0 ? '#30D158' : '#FF453A'}}>{fmtMoney(preview.after)}</span>
              </div>
            </div>
          )}
          <div className="grid grid-cols-2 gap-3">
            <label className="block">
              <span className="text-sm text-zinc-500">Cuenta</span>
              <Select value={account} onChange={e=>setAccount(e.target.value)} className="mt-1">
                {accs.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
              </Select>
            </label>
            <label className="block">
              <span className="text-sm text-zinc-500">Categoría</span>
              <Select value={category} onChange={e=>setCategory(e.target.value)} className="mt-1">{cats.map(c => <option key={c}>{c}</option>)}</Select>
            </label>
          </div>
          <label className="block"><span className="text-sm text-zinc-500">Fecha</span><Input type="date" value={date} onChange={e=>setDate(e.target.value)} className="mt-1"/></label>
          <label className="block"><span className="text-sm text-zinc-500">Nota (opcional)</span><Textarea rows={2} value={note} onChange={e=>setNote(e.target.value)}/></label>

          {/* Recurrencia */}
          <div className="rounded-2xl bg-paper-softer dark:bg-ink-softer p-4">
            <label className="flex items-start gap-3 cursor-pointer">
              <input type="checkbox" checked={recurring} onChange={e=>setRecurring(e.target.checked)} className="mt-0.5 h-4 w-4 accent-ink dark:accent-white"/>
              <div className="flex-1">
                <div className="font-medium text-sm">Repetir automáticamente</div>
                <div className="text-xs text-zinc-500 mt-0.5">Vida creará una copia cada periodo desde la fecha indicada (útil para salario VDL, suscripciones).</div>
              </div>
            </label>
            {recurring && (
              <div className="mt-3 grid grid-cols-3 gap-2">
                {[['weekly','Semanal'],['monthly','Mensual'],['yearly','Anual']].map(([k,l])=>(
                  <button key={k} onClick={()=>{SoundFX.tap(); setRecurringPeriod(k);}}
                          className={`press h-10 rounded-xl text-sm font-medium ${recurringPeriod===k?'bg-ink text-white dark:bg-white dark:text-ink':'bg-white dark:bg-ink-soft'}`}>
                    {l}
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* Verificada */}
          <label className="flex items-center gap-3 cursor-pointer rounded-2xl px-4 py-3 bg-paper-softer dark:bg-ink-softer">
            <input type="checkbox" checked={verified} onChange={e=>setVerified(e.target.checked)} className="h-4 w-4 accent-accent-green"/>
            <div className="flex-1">
              <div className="font-medium text-sm inline-flex items-center gap-1.5"><Icon name="check-circle" size={13} className={verified?'text-accent-success':'text-zinc-400'}/> Verificada contra el banco</div>
              <div className="text-xs text-zinc-500 mt-0.5">Marca cuando hayas conciliado este movimiento contra tu estado de cuenta.</div>
            </div>
          </label>
        </div>
      </Sheet>
    );
  }

  function ForecastCard() {
    const { state } = useStore();
    const fc = useMemo(() => projectCashFlow(state, 6), [state]);
    const series = fc.series;
    if (!series || series.length < 2) return null;
    const max = Math.max(...series.map(s => s.total));
    const min = Math.min(...series.map(s => s.total));
    const range = Math.max(1, max - min);
    const w = 100, h = 60; // viewBox
    const points = series.map((s,i) => {
      const x = (i / (series.length-1)) * w;
      const y = h - ((s.total - min) / range) * h;
      return [x, y];
    });
    const path = points.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
    const fillPath = path + ` L${w},${h} L0,${h} Z`;
    const trend = series[series.length-1].total - series[0].total;
    const color = trend >= 0 ? '#30D158' : '#FF453A';
    return (
      <Card className="p-5">
        <div className="flex items-center justify-between mb-2">
          <div className="text-[13px] font-semibold uppercase tracking-[0.08em] text-zinc-500 dark:text-zinc-400">Proyección · 6 meses</div>
          <div className="text-xs text-zinc-500">{fc.monthlyEst >= 0 ? '+' : ''}{fmtMoney(fc.monthlyEst)}/mes est.</div>
        </div>
        <div className="text-2xl font-semibold tracking-tight ticker" style={{color}}>
          {trend >= 0 ? '+' : ''}{fmtMoney(trend)}
        </div>
        <div className="text-xs text-zinc-500 mb-3">Cambio proyectado de patrimonio</div>
        <svg viewBox={`0 0 ${w} ${h}`} className="w-full" style={{height: 80}} preserveAspectRatio="none">
          <defs>
            <linearGradient id="fcgrad" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={fillPath} fill="url(#fcgrad)"/>
          <path d={path} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
        <div className="flex justify-between text-[10px] text-zinc-400 mt-1">
          <span>hoy</span>
          <span>+3m</span>
          <span>+6m</span>
        </div>
      </Card>
    );
  }

  function NetWorthChart() {
    const { state } = useStore();
    const hist = (state.netWorthHistory || []).slice(-90);
    if (hist.length < 2) return (
      <Card className="p-5">
        <div className="text-[13px] font-semibold uppercase tracking-[0.08em] text-zinc-500 dark:text-zinc-400">Patrimonio neto</div>
        <div className="text-2xl font-semibold tracking-tight ticker mt-2">{fmtMoney(netWorth(state))}</div>
        <div className="text-xs text-zinc-500 mt-1">Aún no hay histórico. Se registra un snapshot diario.</div>
      </Card>
    );
    const values = hist.map(x => x.total);
    const max = Math.max(...values), min = Math.min(...values), range = Math.max(1, max - min);
    const w = 100, h = 50;
    const path = hist.map((p,i) => {
      const x = (i / (hist.length-1)) * w;
      const y = h - ((p.total - min) / range) * h;
      return (i===0?'M':'L') + x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
    const first = values[0], last = values[values.length-1];
    const delta = last - first;
    const pct = first ? ((last/first) - 1) * 100 : 0;
    const color = delta >= 0 ? '#30D158' : '#FF453A';
    return (
      <Card className="p-5">
        <div className="flex items-center justify-between mb-2">
          <div className="text-[13px] font-semibold uppercase tracking-[0.08em] text-zinc-500 dark:text-zinc-400">Patrimonio · {hist.length}d</div>
          <div className="text-xs font-semibold" style={{color}}>{delta>=0?'+':''}{fmtMoney(delta)} · {delta>=0?'+':''}{pct.toFixed(1)}%</div>
        </div>
        <div className="text-2xl font-semibold tracking-tight ticker">{fmtMoney(last)}</div>
        <svg viewBox={`0 0 ${w} ${h}`} className="w-full mt-2" style={{height: 70}} preserveAspectRatio="none">
          <path d={path} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </Card>
    );
  }

                <div className="font-medium truncate flex-1">{cat}</div>
                <div className="text-sm tabular text-zinc-500 truncate">{fmtMoney(used)}{limit > 0 && <span className="text-zinc-400"> / {fmtMoney(limit)}</span>}</div>
                <button onClick={()=>{SoundFX.tap(); startEdit(cat);}} className="press h-7 w-7 grid place-items-center rounded-lg hover:bg-paper-softer dark:hover:bg-ink-softer text-zinc-500"><Icon name="pencil" size={13}/></button>
              </div>
              {limit > 0 ? (
                <div className="h-1.5 rounded-full bg-paper-softer dark:bg-ink-softer overflow-hidden">
                  <div className="h-full transition-all duration-700 rounded-full" style={{ width: `${pct}%`, background: tone, boxShadow: over ? '0 0 12px '+tone : 'none' }}/>
                </div>
              ) : (
                <div className="text-[11px] text-zinc-400">Sin límite definido</div>
              )}
              {isEditing && (
                <div className="mt-3 flex gap-2 items-end anim-in">
                  <Input type="number" inputMode="decimal" placeholder="Ej. 80000" value={val} onChange={e=>setVal(e.target.value)} icon="banknote" autoFocus/>
                  <Button size="sm" onClick={save}>Guardar</Button>
                  <Button size="sm" variant="ghost" onClick={()=>{setEditing(null); setVal('');}}>Cancelar</Button>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <BudgetSuggestSheet open={suggestOpen} onClose={()=>setSuggestOpen(false)}/>
      </div>
    );
  }

  function BudgetSuggestSheet({ open, onClose }) {
    const { state, actions } = useStore();
    const suggestions = useMemo(() => suggestBudgets(state), [state]);
    const [picked, setPicked] = useState({});
    useEffect(() => {
      if (!open) return;
      // Por defecto, marcamos todos los que tienen sugerencia distinta al actual
      const init = {};
      suggestions.forEach(s => { if (s.suggested !== s.current) init[s.cat] = true; });
      setPicked(init);
    }, [open]);
    const toggle = (cat) => setPicked(p => ({ ...p, [cat]: !p[cat] }));
    const apply = () => {
      let n = 0;
      suggestions.forEach(s => { if (picked[s.cat]) { actions.setBudget(s.cat, s.suggested); n++; } });
      onClose();
      if (n > 0) { SoundFX.success(); Toast.success(`Aplicado a ${n} ${n===1?'categoría':'categorías'}`); }
    };
    const totalSuggested = suggestions.filter(s => picked[s.cat]).reduce((a, s) => a + s.suggested, 0);
    return (
      <Sheet open={open} onClose={onClose} title="Sugerencias de presupuesto"
             footer={
               <div className="flex justify-end gap-2 items-center">
                 <span className="text-xs text-zinc-500 mr-auto tabular">{Object.values(picked).filter(Boolean).length} seleccionadas · total {fmtMoney(totalSuggested)}</span>
                 <Button variant="ghost" onClick={onClose}>Cancelar</Button>
                 <Button onClick={apply} disabled={Object.values(picked).filter(Boolean).length===0}>Aplicar</Button>
               </div>
             }>
        <p className="text-sm text-zinc-500 leading-relaxed mb-4">Basado en tu promedio de gastos los últimos 3 meses, +10% de buffer, redondeado a ₡1.000. Tocá las categorías que querés aplicar.</p>
        {suggestions.length === 0 ? (
          <div className="text-center py-8 text-zinc-500 text-sm">Aún no tenés suficiente histórico (3 meses) para sugerir presupuestos.</div>
        ) : (
          <div className="space-y-2">
            {suggestions.map(s => {
              const sel = picked[s.cat];
              const same = s.suggested === s.current;
              return (
                <button key={s.cat} onClick={()=>toggle(s.cat)} className={`w-full text-left flex items-center gap-3 p-3 rounded-2xl transition press ${sel?'bg-accent-blue/10':'bg-paper-softer dark:bg-ink-softer'}`} style={sel?{boxShadow:'inset 0 0 0 1px rgba(10,132,255,.4)'}:undefined}>
                  <div className={`h-5 w-5 grid place-items-center rounded-full transition border-2 shrink-0 ${sel?'bg-accent-blue border-accent-blue text-white':'border-zinc-400'}`}>
                    {sel && <Icon name="check" size={11}/>}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="font-medium text-sm">{s.cat}</div>
                    <div className="text-[11px] text-zinc-500">Promedio 3M: {fmtMoney(s.avg)}</div>
                  </div>
                  <div className="text-right shrink-0">
                    {s.current > 0 && <div className="text-[11px] text-zinc-400 tabular line-through">{fmtMoney(s.current)}</div>}
                    <div className="font-semibold tabular text-sm">{fmtMoney(s.suggested)}</div>
                    {same && <div className="text-[10px] text-zinc-400">igual</div>}
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </Sheet>
    );
  }

  function TransferForm({ open, onClose, prefill = null, existing = null }) {
    const { state, actions } = useStore();
    const accs = enabledAccounts(state);
    const [from, setFrom] = useState(accs[0]?.id || 'personal');
    const [to, setTo] = useState(accs[1]?.id || 'nakit');
    const [amount, setAmount] = useState('');
    const [date, setDate] = useState(todayISO());
    const [note, setNote] = useState('');
    const isEdit = !!existing;
    useEffect(() => {
      if (!open) return;
      if (existing) {
        setFrom(existing.from); setTo(existing.to);
        setAmount(String(existing.amount||'')); setDate(existing.date||todayISO()); setNote(existing.note||'');
      } else {
        const en = enabledAccounts(state);
        setFrom(prefill?.from || en[0]?.id || 'personal');
        setTo(prefill?.to || en[1]?.id || (en[0]?.id === 'personal' ? 'nakit' : 'personal'));
        setAmount(prefill?.amount ? String(prefill.amount) : '');
        setDate(todayISO()); setNote('');
      }
    }, [open, prefill, existing]);
    const save = () => {
      const a = parseFloat(amount); if (!a || a <= 0) return;
      if (from === to) { Toast.error('Las cuentas deben ser distintas'); return; }
      try {
        const payload = { from, to, amount: a, date, note: note.trim() };
        const fromName = state.accounts[from]?.name||from, toName = state.accounts[to]?.name||to;
        if (isEdit) { actions.updateTransfer(existing.id, payload); Toast.success('Transferencia actualizada'); }
        else { actions.addTransfer(payload); Toast.push({ kind:'info', title:'Transferencia', message:`${fmtMoney(a)} · ${fromName} → ${toName}` }); }
        SoundFX.coin();
      } catch (e) { console.error(e); Toast.error('No se pudo transferir'); }
      finally { onClose(); }
    };
    const remove = () => {
      if (!isEdit) return;
      const snap = { ...existing };
      try {
        actions.removeTransfer(existing.id); SoundFX.uncheck();
        Toast.push({ kind:'info', message:'Transferencia eliminada', duration: 5500,
          action: { label:'Deshacer', onClick: () => { actions.addTransfer(snap); Toast.success('Restaurada'); } } });
      } catch (e) {}
      finally { onClose(); }
    };
    return (
      <Sheet open={open} onClose={onClose} title={isEdit?'Editar transferencia':'Nueva transferencia'}
             footer={
               <div className="flex justify-end gap-2">
                 {isEdit && <Button variant="ghost" onClick={remove} className="text-accent-red mr-auto"><Icon name="trash-2" size={16}/> Eliminar</Button>}
                 <Button variant="ghost" onClick={onClose}>Cancelar</Button>
                 <Button onClick={save}>{isEdit?'Guardar':'Mover'}</Button>
               </div>
             }>
        <div className="space-y-4">
          <div className="grid grid-cols-[1fr_auto_1fr] gap-2 items-end">
            <label className="block">
              <span className="text-sm text-zinc-500">Desde</span>
              <Select value={from} onChange={e=>setFrom(e.target.value)} className="mt-1">
                {accs.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
              </Select>
            </label>
            <div className="h-11 grid place-items-center text-zinc-400"><Icon name="arrow-right" size={18}/></div>
            <label className="block">
              <span className="text-sm text-zinc-500">Hacia</span>
              <Select value={to} onChange={e=>setTo(e.target.value)} className="mt-1">
                {accs.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
              </Select>
            </label>
          </div>
          <label className="block"><span className="text-sm text-zinc-500">Monto</span><Input type="number" inputMode="decimal" placeholder="0" value={amount} onChange={e=>setAmount(e.target.value)} icon="banknote" className="mt-1"/></label>
          <label className="block"><span className="text-sm text-zinc-500">Fecha</span><Input type="date" value={date} onChange={e=>setDate(e.target.value)} className="mt-1"/></label>
          <label className="block"><span className="text-sm text-zinc-500">Nota (opcional)</span><Textarea rows={2} value={note} onChange={e=>setNote(e.target.value)}/></label>
        </div>
      </Sheet>
    );
  }

  /* =========================================================
     PENDIENTES — cuentas por cobrar / por pagar
     ========================================================= */
  function PendingForm({ open, onClose, existing = null, prefill = null }) {
    const { state, actions } = useStore();
    const accs = enabledAccounts(state);
    const [direction, setDirection] = useState('in');
    const [title, setTitle] = useState('');
    const [amount, setAmount] = useState('');
    const [account, setAccount] = useState(accs[0]?.id || 'personal');
    const [category, setCategory] = useState('');
    const [expectedDate, setExpectedDate] = useState(todayISO());
    const [recurring, setRecurring] = useState(false);
    const [recurringPeriod, setRecurringPeriod] = useState('monthly');
    const [fixed, setFixed] = useState(false);
    const [note, setNote] = useState('');
    const isEdit = !!existing;
    const cats = useMemo(() => categoriesFor(state, direction === 'in' ? 'income' : 'expense'), [state, direction]);

    useEffect(() => {
      if (!open) return;
      if (existing) {
        setDirection(existing.direction || 'in');
        setTitle(existing.title || '');
        setAmount(String(existing.amount || ''));
        setAccount(existing.account || 'personal');
        setCategory(existing.category || '');
        setExpectedDate(existing.expectedDate || todayISO());
        setRecurring(!!existing.recurring);
        setRecurringPeriod(existing.recurringPeriod || 'monthly');
        setFixed(!!existing.fixed);
        setNote(existing.note || '');
      } else {
        const dir = prefill?.direction || 'in';
        setDirection(dir);
        setTitle(prefill?.title || '');
        setAmount('');
        setAccount(prefill?.account || (dir==='in' ? 'personal' : 'personal'));
        setCategory(categoriesFor(state, dir==='in'?'income':'expense')[0] || '');
        setExpectedDate(prefill?.expectedDate || todayISO());
        setRecurring(!!prefill?.recurring);
        setRecurringPeriod(prefill?.recurringPeriod || 'monthly');
        setFixed(!!prefill?.fixed);
        setNote('');
      }
    }, [open, existing, prefill]);

    useEffect(() => {
      if (!isEdit) setCategory(categoriesFor(state, direction === 'in' ? 'income' : 'expense')[0] || '');
    }, [direction, isEdit]);

    const save = () => {
      const a = parseFloat(amount); if (!a || a <= 0) { Toast.error('Monto inválido'); return; }
      if (!title.trim()) { Toast.error('Falta título'); return; }
      try {
        const payload = { direction, title: title.trim(), amount: a, account, category, expectedDate, fixed, recurring, recurringPeriod, note: note.trim() };
        if (isEdit) { actions.updatePending(existing.id, payload); Toast.success('Pendiente actualizado'); }
        else { actions.addPending(payload); Toast.push({ kind:'info', title: direction==='in'?'Por cobrar':'Por pagar', message: `${title.trim()} · ${fmtMoney(a)} · ${fmtDate(expectedDate)}` }); }
        SoundFX.success();
      } catch (e) { console.error(e); Toast.error('No se pudo guardar'); }
      finally { onClose(); }
    };
    const remove = () => {
      if (!isEdit) return;
      const snap = { ...existing };
      try {
        actions.removePending(existing.id); SoundFX.uncheck();
        Toast.push({ kind:'info', message:'Pendiente eliminado', duration: 5500,
          action: { label:'Deshacer', onClick: () => { actions.addPending(snap); Toast.success('Restaurado'); } } });
      } catch (e) {}
      finally { onClose(); }
    };
    const confirm = () => {
      if (!isEdit) return;
      const a = parseFloat(amount) || +existing.amount;
      try {
        actions.confirmPending(existing.id, { date: todayISO(), amount: a, account });
        SoundFX.coin(); fireConfetti({ count: 50, originY: window.innerHeight*0.5 });
        const accName = state.accounts[account]?.name || account;
        Toast.push({
          kind:'success',
          title: direction === 'in' ? '¡Cobrado!' : 'Pago confirmado',
          message: `${fmtMoney(a)} · ${accName}`,
        });
      } catch (e) { Toast.error('No se pudo confirmar'); }
      finally { onClose(); }
    };

    return (
      <Sheet open={open} onClose={onClose} title={isEdit ? (existing.status==='pending'?'Editar pendiente':'Pendiente cerrado') : 'Nuevo pendiente'}
             footer={
               <div className="flex justify-end gap-2 flex-wrap">
                 {isEdit && existing.status === 'pending' && (
                   <Button variant="success" onClick={confirm}>
                     <Icon name={direction==='in'?'check':'check-circle'} size={16}/>
                     {direction==='in'?'Cobrar ahora':'Pagar ahora'}
                   </Button>
                 )}
                 {isEdit && <Button variant="ghost" onClick={remove} className="text-accent-red"><Icon name="trash-2" size={16}/></Button>}
                 <div className="flex-1"/>
                 <Button variant="ghost" onClick={onClose}>Cancelar</Button>
                 <Button onClick={save}>{isEdit?'Guardar':'Crear'}</Button>
               </div>
             }>
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-2">
            <button onClick={()=>{SoundFX.tap(); setDirection('in');}} className={`press h-12 rounded-2xl font-medium transition inline-flex items-center justify-center gap-2 ${direction==='in' ? 'bg-accent-green text-white' : 'bg-paper-softer dark:bg-ink-softer'}`}><Icon name="inbox" size={16}/> Por cobrar</button>
            <button onClick={()=>{SoundFX.tap(); setDirection('out');}} className={`press h-12 rounded-2xl font-medium transition inline-flex items-center justify-center gap-2 ${direction==='out' ? 'bg-accent-red text-white' : 'bg-paper-softer dark:bg-ink-softer'}`}><Icon name="calendar-clock" size={16}/> Por pagar</button>
          </div>
          <label className="block">
            <span className="text-sm text-zinc-500">Título</span>
            <Input className="mt-1" placeholder={direction==='in' ? 'Ej. Cliente X · anillo perla' : 'Ej. Netflix mensual'} value={title} onChange={e=>setTitle(e.target.value)}/>
          </label>
          <div className="grid grid-cols-2 gap-3">
            <label className="block"><span className="text-sm text-zinc-500">Monto</span><Input type="number" inputMode="decimal" placeholder="0" value={amount} onChange={e=>setAmount(e.target.value)} icon="banknote" className="mt-1"/></label>
            <label className="block"><span className="text-sm text-zinc-500">Fecha esperada</span><Input type="date" value={expectedDate} onChange={e=>setExpectedDate(e.target.value)} className="mt-1"/></label>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <label className="block">
              <span className="text-sm text-zinc-500">Cuenta</span>
              <Select value={account} onChange={e=>setAccount(e.target.value)} className="mt-1">
                {accs.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
              </Select>
            </label>
            <label className="block">
              <span className="text-sm text-zinc-500">Categoría</span>
              <Select value={category} onChange={e=>setCategory(e.target.value)} className="mt-1">{cats.map(c => <option key={c}>{c}</option>)}</Select>
            </label>
          </div>
          <label className="block"><span className="text-sm text-zinc-500">Nota (opcional)</span><Textarea rows={2} value={note} onChange={e=>setNote(e.target.value)}/></label>

          {/* Recurrente / Fijo */}
          <div className="rounded-2xl bg-paper-softer dark:bg-ink-softer p-4 space-y-3">
            <label className="flex items-start gap-3 cursor-pointer">
              <input type="checkbox" checked={recurring} onChange={e=>setRecurring(e.target.checked)} className="mt-0.5 h-4 w-4 accent-ink dark:accent-white"/>
              <div className="flex-1">
                <div className="font-medium text-sm">Repetir tras confirmar</div>
                <div className="text-xs text-zinc-500 mt-0.5">{direction==='in'?'Útil para clientes recurrentes.':'Útil para suscripciones, cuotas, gastos fijos.'}</div>
              </div>
            </label>
            {recurring && (
              <div className="grid grid-cols-3 gap-2">
                {[['weekly','Semanal'],['monthly','Mensual'],['yearly','Anual']].map(([k,l])=>(
                  <button key={k} onClick={()=>{SoundFX.tap(); setRecurringPeriod(k);}} className={`press h-10 rounded-xl text-sm font-medium ${recurringPeriod===k?'bg-ink text-white dark:bg-white dark:text-ink':'bg-white dark:bg-ink-soft'}`}>{l}</button>
                ))}
              </div>
            )}
            <label className="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" checked={fixed} onChange={e=>setFixed(e.target.checked)} className="h-4 w-4 accent-ink dark:accent-white"/>
              <div className="flex-1 text-sm font-medium inline-flex items-center gap-1.5">
                <Icon name="lock" size={12} className="text-zinc-500"/> Marcar como gasto fijo
              </div>
            </label>
          </div>
        </div>
      </Sheet>
    );
  }

  function PendientesView({ openPendingForm }) {
    const { state, actions } = useStore();
    const today = todayISO();
    const [filter, setFilter] = useState('all'); // all | in | out | fixed | overdue | week
    const items = (state.pending || []).filter(p => p.status === 'pending');
    let filtered = items.slice();
    if (filter === 'in') filtered = filtered.filter(p => p.direction === 'in');
    else if (filter === 'out') filtered = filtered.filter(p => p.direction === 'out');
    else if (filter === 'fixed') filtered = filtered.filter(p => p.fixed || p.recurring);
    else if (filter === 'overdue') filtered = filtered.filter(p => p.expectedDate < today);
    else if (filter === 'week') filtered = filtered.filter(p => p.expectedDate >= today && p.expectedDate <= addDays(today, 7));
    filtered.sort((a, b) => (a.expectedDate || '').localeCompare(b.expectedDate || ''));

    const totalIn = items.filter(p => p.direction === 'in').reduce((a, p) => a + +p.amount, 0);
    const totalOut = items.filter(p => p.direction === 'out').reduce((a, p) => a + +p.amount, 0);
    const overdue = items.filter(p => p.expectedDate < today).length;

    return (
      <div className="space-y-4">
        {/* Top summary */}
        <div className="grid grid-cols-2 gap-3">
          <Card className="p-4 anim-scale-in" style={{background: 'rgba(48,209,88,.08)', boxShadow:'inset 0 0 0 1px rgba(48,209,88,.2)'}}>
            <div className="flex items-center gap-2 text-[12px] text-zinc-500 font-semibold uppercase tracking-wider"><Icon name="inbox" size={12} className="text-accent-success"/> Por cobrar</div>
            <div className="mt-2 text-2xl font-semibold tracking-tight ticker" style={{color:'#30D158'}}>{fmtMoney(totalIn)}</div>
            <div className="text-[11px] text-zinc-500 mt-1">{items.filter(p=>p.direction==='in').length} pendientes</div>
          </Card>
          <Card className="p-4 anim-scale-in" style={{background: 'rgba(255,69,58,.08)', boxShadow:'inset 0 0 0 1px rgba(255,69,58,.2)'}}>
            <div className="flex items-center gap-2 text-[12px] text-zinc-500 font-semibold uppercase tracking-wider"><Icon name="calendar-clock" size={12} className="text-accent-red"/> Por pagar</div>
            <div className="mt-2 text-2xl font-semibold tracking-tight ticker" style={{color:'#FF453A'}}>{fmtMoney(totalOut)}</div>
            <div className="text-[11px] text-zinc-500 mt-1">{items.filter(p=>p.direction==='out').length} pendientes</div>
          </Card>
        </div>

        {/* Net + alertas */}
        <Card className="p-4">
          <div className="flex items-center justify-between gap-3">
            <div>
              <div className="text-[12px] text-zinc-500 font-semibold uppercase tracking-wider">Neto pendiente</div>
              <div className="mt-1 text-xl font-semibold tracking-tight ticker" style={{color: (totalIn-totalOut)>=0?'#30D158':'#FF453A'}}>
                {(totalIn-totalOut)>=0?'+':''}{fmtMoney(totalIn - totalOut)}
              </div>
            </div>
            {overdue > 0 && (
              <div className="text-right">
                <div className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-accent-red/15 text-accent-red text-[12px] font-semibold">
                  <Icon name="alert-circle" size={11}/> {overdue} {overdue===1?'atrasado':'atrasados'}
                </div>
              </div>
            )}
          </div>
        </Card>

        {/* Filtros */}
        <div className="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1 snap-x">
          {[
            ['all','Todos', items.length],
            ['week','Esta semana', items.filter(p=>p.expectedDate>=today && p.expectedDate<=addDays(today,7)).length],
            ['overdue','Atrasados', overdue],
            ['in','Por cobrar', items.filter(p=>p.direction==='in').length],
            ['out','Por pagar', items.filter(p=>p.direction==='out').length],
            ['fixed','Fijos', items.filter(p=>p.fixed||p.recurring).length],
          ].map(([k,l,n])=>(
            <button key={k} onClick={()=>{SoundFX.tap(); setFilter(k);}}
                    className={`press shrink-0 snap-start px-3 h-8 rounded-full text-xs font-medium inline-flex items-center gap-1.5 ${filter===k?'bg-ink text-white dark:bg-white dark:text-ink':'bg-paper-softer dark:bg-ink-softer'}`}>
              {l} <span className={`tabular ${filter===k?'opacity-70':'text-zinc-400'}`}>{n}</span>
            </button>
          ))}
        </div>

        {/* Lista */}
        {filtered.length === 0 ? (
          <Card className="p-8 text-center">
            <Icon name="check-check" size={28} className="text-zinc-400"/>
            <p className="mt-3 text-zinc-500 text-sm">{filter==='all' ? 'No hay pendientes. Agrega ingresos esperados o gastos fijos.' : 'Nada en este filtro.'}</p>
            <Button className="mt-4" onClick={openPendingForm}><Icon name="plus" size={16}/> Pendiente</Button>
          </Card>
        ) : (
          <div className="space-y-2">
            {filtered.map(p => <PendingRow key={p.id} item={p} openEdit={()=>openPendingForm(p)}/>)}
          </div>
        )}

        {/* Tip footer */}
        <p className="text-[11px] text-zinc-400 leading-relaxed px-2">
          Los pendientes <strong>no afectan tu saldo</strong> hasta que los confirmes. Sí se usan para presupuestar y proyectar tu plata disponible.
        </p>
      </div>
    );
  }

    const overdue = item.expectedDate < today;
    const acc = state.accounts[item.account];
    const isIn = item.direction === 'in';
    const color = isIn ? '#30D158' : '#FF453A';
    const days = daysBetween(today, item.expectedDate);

    const quickConfirm = (e) => {
      e.stopPropagation();
      try {
        actions.confirmPending(item.id, { date: todayISO() });
        SoundFX.coin(); vibrate(20); fireConfetti({ count: 60, originY: window.innerHeight*0.5 });
        Toast.push({
          kind:'success',
          title: isIn ? '¡Cobrado!' : 'Pago confirmado',
          message: `${fmtMoney(item.amount)} · ${item.title}`,
        });
      } catch (err) { Toast.error('No se pudo confirmar'); }
    };

    return (
      <button onClick={openEdit} className="w-full text-left flex items-center gap-3 p-3 sm:p-4 rounded-2xl bg-white dark:bg-ink-soft hairline transition hover:shadow-soft press">
        <div className="h-10 w-10 grid place-items-center rounded-2xl shrink-0" style={{background: color+'20', color}}>
          <Icon name={isIn?'inbox':'calendar-clock'} size={18}/>
        </div>
        <div className="min-w-0 flex-1">
          <div className="font-medium text-sm flex items-center gap-1.5">
            <span className="truncate">{item.title || '(sin título)'}</span>
            {item.recurring && <Icon name="repeat" size={11} className="text-zinc-400 shrink-0"/>}
            {item.fixed && <Icon name="lock" size={11} className="text-zinc-400 shrink-0"/>}
          </div>
          <div className="text-[11px] text-zinc-500 truncate flex items-center gap-1.5">
            <span className={`${overdue?'text-accent-red font-semibold':''}`}>
              {overdue ? `Atrasado ${Math.abs(days)}d` : days===0 ? 'Hoy' : days===1 ? 'Mañana' : `En ${days}d`}
            </span>
            <span className="text-zinc-400">·</span>
            <span>{fmtDate(item.expectedDate, {day:'numeric', month:'short'})}</span>
            {acc && <><span className="text-zinc-400">·</span><span>{acc.name}</span></>}
          </div>
        </div>
        <div className="text-right shrink-0">
          <div className="font-semibold tabular text-sm" style={{color}}>{isIn?'+':'-'}{fmtMoney(item.amount)}</div>
          <button onClick={quickConfirm} className="press mt-1 text-[11px] font-semibold text-accent-blue hover:underline inline-flex items-center gap-0.5">
            <Icon name="check" size={11}/> {isIn?'Cobrar':'Pagar'}
          </button>
        </div>
      </button>
    );
  }

  function CategoryManager() {
    const { state, actions } = useStore();
    const [kind, setKind] = useState('expense');
    const [text, setText] = useState('');
    const items = (state.customCategories?.[kind]) || [];
    const baseDefaults = kind === 'income' ? CATEGORIAS_INGRESO : CATEGORIAS_GASTO;
    const add = () => { if (!text.trim()) return; actions.addCategory(kind, text.trim()); setText(''); SoundFX.tap(); };
    return (
      <Card className="p-5">
        <div className="flex items-center justify-between mb-3">
          <div className="text-[13px] font-semibold uppercase tracking-[0.08em] text-zinc-500 dark:text-zinc-400">Categorías custom</div>
          <div className="flex gap-1 p-1 rounded-xl bg-paper-softer dark:bg-ink-softer">
            <button onClick={()=>{SoundFX.tap(); setKind('expense');}} className={`press px-3 h-8 rounded-lg text-xs font-semibold ${kind==='expense'?'bg-white dark:bg-ink-soft':'text-zinc-500'}`}>Gastos</button>
            <button onClick={()=>{SoundFX.tap(); setKind('income');}} className={`press px-3 h-8 rounded-lg text-xs font-semibold ${kind==='income'?'bg-white dark:bg-ink-soft':'text-zinc-500'}`}>Ingresos</button>
          </div>
        </div>
        <div className="flex flex-wrap gap-2 mb-3">
          {baseDefaults.map(c => <span key={c} className="px-3 py-1 rounded-full text-[12px] bg-paper-softer dark:bg-ink-softer text-zinc-500">{c}</span>)}
          {items.map(c => (
            <span key={c} className="px-3 py-1 rounded-full text-[12px] bg-accent-blue/10 text-accent-blue inline-flex items-center gap-1.5">
              {c}
              <button onClick={()=>{ if (confirm('¿Eliminar esta categoría? Las transacciones que ya la usan no se modifican.')) actions.removeCategory(kind, c); }} className="press hover:opacity-70"><Icon name="x" size={11}/></button>
            </span>
          ))}
        </div>
        <div className="flex gap-2">
          <Input placeholder={`Nueva categoría de ${kind === 'income' ? 'ingreso' : 'gasto'}…`} value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{ if (e.key==='Enter') add(); }}/>
          <Button onClick={add}><Icon name="plus" size={16}/> Agregar</Button>
        </div>
      </Card>
    );
  }

  function AccountManager() {
    const { state, actions } = useStore();
    const accs = Object.entries(state.accounts).sort((a,b) => (a[1].order||0)-(b[1].order||0));
    return (
      <Card className="p-5">
        <div className="text-[13px] font-semibold uppercase tracking-[0.08em] text-zinc-500 dark:text-zinc-400 mb-3">Cuentas</div>
        <div className="space-y-2">
          {accs.map(([id, acc]) => (
            <div key={id} className="flex items-center gap-3 p-3 rounded-2xl bg-paper-softer dark:bg-ink-softer">
              <div className="h-9 w-9 grid place-items-center rounded-xl text-white" style={{background: acc.color}}>
                <Icon name={acc.icon || 'wallet'} size={16}/>
              </div>
              <div className="min-w-0 flex-1">
                <input className="w-full bg-transparent font-medium text-[15px] focus:outline-none" defaultValue={acc.name}
                       onBlur={e=>{ if (e.target.value.trim() && e.target.value !== acc.name) actions.updateAccount(id, { name: e.target.value.trim() }); }}/>
                <div className="text-xs text-zinc-500 tabular">Saldo: {fmtMoney(acc.balance||0)}</div>
              </div>
              {(id === 'personal' || id === 'nakit') ? (
                <span className="text-[10px] uppercase tracking-wider text-zinc-400 font-semibold">Core</span>

                <label className="inline-flex items-center cursor-pointer">
                  <input type="checkbox" checked={!!acc.enabled} onChange={e=>actions.toggleAccount(id, e.target.checked)} className="sr-only peer"/>
                  <div className="w-10 h-6 bg-paper-softer dark:bg-ink-soft rounded-full peer-checked:bg-accent-success transition relative">
                    <div className={`absolute top-0.5 left-0.5 h-5 w-5 rounded-full bg-white transition-all ${acc.enabled?'translate-x-4':''}`}/>
                  </div>
                </label>
              )}
            </div>
          ))}
        </div>
        <p className="text-[11px] text-zinc-400 mt-3 leading-relaxed">Personal y Nakit son fijas (siempre activas). Activá Ahorros e Inversiones cuando empieces a separar plata.</p>

    );

  function SearchFilter({ value, onChange }) {
    const { state } = useStore();
    const accs = enabledAccounts(state);
    const update = (patch) => onChange({ ...value, ...patch });
    return (
      <div className="space-y-3">
        <div className="relative">
          <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"/>
          <input type="search" placeholder="Buscar por categoría, nota, monto…" value={value.q || ''}
                 onChange={e=>update({ q: e.target.value })}
                 className="w-full h-11 pl-9 pr-4 rounded-2xl bg-paper-softer dark:bg-ink-soft text-ink dark:text-white placeholder:text-zinc-400 focus:outline-none focus:ring-2 focus:ring-ink/10 dark:focus:ring-white/10"/>
        </div>
        <div className="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1">
          {[['all','Todas'],['income','Ingresos'],['expense','Gastos'],['transfer','Transferencias']].map(([k,l])=>(
            <button key={k} onClick={()=>{SoundFX.tap(); update({type:k});}}
                    className={`press shrink-0 px-3 h-8 rounded-full text-xs font-medium ${value.type===k?'bg-ink text-white dark:bg-white dark:text-ink':'bg-paper-softer dark:bg-ink-softer'}`}>{l}</button>
          ))}
          <span className="w-px shrink-0 my-1 bg-paper-softer dark:bg-ink-softer"/>
          <button onClick={()=>{SoundFX.tap(); update({account:'all'});}} className={`press shrink-0 px-3 h-8 rounded-full text-xs font-medium ${value.account==='all' || !value.account?'bg-ink text-white dark:bg-white dark:text-ink':'bg-paper-softer dark:bg-ink-softer'}`}>Todas las cuentas</button>
          {accs.map(a => (
            <button key={a.id} onClick={()=>{SoundFX.tap(); update({account:a.id});}}
                    className={`press shrink-0 px-3 h-8 rounded-full text-xs font-medium inline-flex items-center gap-1.5 ${value.account===a.id?'text-white':'bg-paper-softer dark:bg-ink-softer'}`}
                    style={value.account===a.id?{background:a.color}:undefined}>
              <Icon name={a.icon||'wallet'} size={11}/> {a.name}
            </button>
          ))}
        </div>
      </div>
    );
  }

  function FinancesView() {
    const { state, actions } = useStore();
    const [tab, setTab] = useState('resumen');
    const [formOpen, setFormOpen] = useState(false);
    const [editingTx, setEditingTx] = useState(null);
    const [trOpen, setTrOpen] = useState(false);
    const [trPrefill, setTrPrefill] = useState(null);
    const [editingTr, setEditingTr] = useState(null);
    const [pendOpen, setPendOpen] = useState(false);
    const [editingPend, setEditingPend] = useState(null);
    const [pendPrefill, setPendPrefill] = useState(null);
    const [filter, setFilter] = useState({ q: '', type: 'all', account: 'all' });

    const accs = enabledAccounts(state);
    const today = todayISO();
    const m = monthKey(today);
    const cur = useMemo(() => monthSummary(state, m), [state, m]);
    const total = netWorth(state);

    const openNewTx = () => { setEditingTx(null); setFormOpen(true); };
    const openEditTx = (tx) => { setEditingTx(tx); setFormOpen(true); };
    const openNewTransfer = (prefill = null) => { setEditingTr(null); setTrPrefill(prefill); setTrOpen(true); };
    const openEditTransfer = (tr) => { setEditingTr(tr); setTrOpen(true); };
    const openPendingForm = (existingOrPrefill = null) => {
      // Heurística: si tiene id, lo tomamos como existing; si es null o un objeto sin id, prefill.
      if (existingOrPrefill && existingOrPrefill.id) { setEditingPend(existingOrPrefill); setPendPrefill(null); }
      else { setEditingPend(null); setPendPrefill(existingOrPrefill); }
      setPendOpen(true);
    };

    // Atender intenciones del FAB
    useEffect(() => {
      const onQuick = (e) => {
        if (e.detail === 'tx') openNewTx();
        else if (e.detail === 'transfer') openNewTransfer();
        else if (e.detail === 'pending') { setTab('pendientes'); setTimeout(() => openPendingForm(null), 250); }
      };
      window.addEventListener('vida:quick', onQuick);
      return () => window.removeEventListener('vida:quick', onQuick);
    }, []);

    const exportExcel = () => {
      // Hoja 1: Movimientos
      const rows = (state.transactions||[]).map(t => ({
        Fecha: t.date,
        Cuenta: state.accounts[t.account]?.name || t.account,
        Tipo: t.type==='income' ? 'Ingreso' : 'Gasto',
        Categoría: t.category,
        Monto: t.type==='income' ? +t.amount : -+t.amount,
        Nota: t.note || '',
        Recurrente: t.recurring ? (t.recurringPeriod||'mensual') : '',
        Verificada: t.verified ? 'Sí' : '',
      }));
      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols'] = [{wch:12},{wch:14},{wch:10},{wch:18},{wch:14},{wch:30},{wch:12},{wch:12}];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Movimientos');
      // Hoja 2: Transferencias
      const trRows = (state.transfers||[]).map(t => ({
        Fecha: t.date, Desde: state.accounts[t.from]?.name||t.from, Hacia: state.accounts[t.to]?.name||t.to, Monto: +t.amount, Nota: t.note||'',
      }));
      if (trRows.length) {
        const ws2 = XLSX.utils.json_to_sheet(trRows);
        ws2['!cols'] = [{wch:12},{wch:14},{wch:14},{wch:14},{wch:30}];
        XLSX.utils.book_append_sheet(wb, ws2, 'Transferencias');
      }
      // Hoja 3: Cuentas
      const accRows = Object.entries(state.accounts).map(([id, a]) => ({ ID:id, Nombre:a.name, Saldo:a.balance||0, Activa: a.enabled?'Sí':'No' }));
      const ws3 = XLSX.utils.json_to_sheet(accRows);
      XLSX.utils.book_append_sheet(wb, ws3, 'Cuentas');
      XLSX.writeFile(wb, `vida-finanzas-${todayISO()}.xlsx`);
      SoundFX.success();
    };

    const pendCount = (state.pending || []).filter(p => p.status === 'pending').length;
    const TABS = [
      { value:'resumen',     label:'Resumen' },
      { value:'movimientos', label:'Movimientos' },
      { value:'pendientes',  label:`Pendientes${pendCount?' · '+pendCount:''}` },
      { value:'presupuestos',label:'Presupuesto' },
      { value:'reportes',    label:'Reportes' },
      { value:'cuentas',     label:'Cuentas' },
    ];

    return (
      <div className="space-y-5 sm:space-y-6 anim-in">
        {/* Header mobile-first: título compacto + toolbar de acciones */}
        <div>
          <div className="flex items-baseline justify-between gap-3 mb-3">
            <div className="min-w-0">
              <h1 className="text-2xl sm:text-3xl font-semibold tracking-tight">Finanzas</h1>
              <p className="text-zinc-500 text-[13px] sm:text-sm mt-0.5 hidden sm:block">Tu sistema completo de control de plata.</p>
            </div>
          </div>
          <div className="grid grid-cols-4 gap-2 sm:flex sm:gap-2">
            <button onClick={openNewTx} className="press-spring h-12 sm:h-10 sm:px-4 rounded-2xl sm:rounded-xl bg-ink text-white dark:bg-white dark:text-ink font-semibold text-[12px] sm:text-sm flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-2">
              <Icon name="plus" size={16}/><span>Mov.</span>
            </button>
            <button onClick={()=>openPendingForm(null)} className="press-spring h-12 sm:h-10 sm:px-4 rounded-2xl sm:rounded-xl bg-paper-softer dark:bg-ink-soft font-semibold text-[12px] sm:text-sm flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-2">
              <Icon name="calendar-clock" size={16}/><span>Pend.</span>
            </button>
            <button onClick={()=>openNewTransfer()} className="press-spring h-12 sm:h-10 sm:px-4 rounded-2xl sm:rounded-xl bg-paper-softer dark:bg-ink-soft font-semibold text-[12px] sm:text-sm flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-2">
              <Icon name="arrow-left-right" size={16}/><span>Transf.</span>
            </button>
            <button onClick={exportExcel} className="press-spring h-12 sm:h-10 sm:px-4 rounded-2xl sm:rounded-xl bg-paper-softer dark:bg-ink-soft font-semibold text-[12px] sm:text-sm flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-2">
              <Icon name="download" size={16}/><span>Excel</span>
            </button>
          </div>
        </div>

        {/* Tabs */}
        <Tabs value={tab} onChange={setTab} items={TABS}/>

        <div key={tab} className="anim-tab">
          {tab === 'resumen' && <FinanceResumen openNewTx={openNewTx} openEditTx={openEditTx} openNewTransfer={openNewTransfer}/>}
          {tab === 'movimientos' && <FinanceMovimientos filter={filter} setFilter={setFilter} openNewTx={openNewTx} openEditTx={openEditTx} openEditTransfer={openEditTransfer}/>}
          {tab === 'pendientes' && <PendientesView openPendingForm={openPendingForm}/>}
          {tab === 'presupuestos' && (
            <div className="space-y-4">
              <BudgetGrid/>
              <CategoryManager/>
            </div>
          )}
          {tab === 'reportes' && <FinanceReportes/>}
          {tab === 'cuentas' && (
            <div className="space-y-4">
              <AccountManager/>
              <Card className="p-5">
                <div className="text-[13px] font-semibold uppercase tracking-[0.08em] text-zinc-500 dark:text-zinc-400 mb-3">Ajuste manual de saldos</div>
                <p className="text-xs text-zinc-500 mb-3">Solo para reconciliar contra el banco al inicio o si hay desajuste. Las transacciones cambiarán el saldo automáticamente.</p>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {accs.map(a => (
                    <label key={a.id} className="block">
                      <span className="text-xs text-zinc-500 inline-flex items-center gap-1.5">
                        <Icon name={a.icon||'wallet'} size={11} className="opacity-60" style={{color:a.color}}/> {a.name}
                      </span>
                      <Input type="number" inputMode="decimal" value={a.balance||0} className="mt-1"
                             onChange={e=>actions.updateAccount(a.id, { balance: Number(e.target.value)||0 })}/>
                    </label>
                  ))}
                </div>
              </Card>
            </div>
          )}
        </div>

        <TxForm open={formOpen} onClose={()=>{ setFormOpen(false); setEditingTx(null); }} existing={editingTx}/>
        <TransferForm open={trOpen} onClose={()=>{ setTrOpen(false); setEditingTr(null); setTrPrefill(null); }} existing={editingTr} prefill={trPrefill}/>
        <PendingForm open={pendOpen} onClose={()=>{ setPendOpen(false); setEditingPend(null); setPendPrefill(null); }} existing={editingPend} prefill={pendPrefill}/>
      </div>
    );
  }

  function FinanceResumen({ openNewTx, openEditTx, openNewTransfer }) {
    const { state, actions } = useStore();
    const today = todayISO();
    const m = monthKey(today);
    const accs = enabledAccounts(state);
    const cur = monthSummary(state, m);
    const total = netWorth(state);
    const priv = !!state.settings?.privacy;
    const showAmt = (n) => priv ? fmtMoneyMasked : fmtMoney(n);
    const togglePriv = () => { actions.setSettings({ privacy: !priv }); SoundFX.tap(); vibrate(8); };
    const [glow, setGlow] = useState(null); // 'good' | 'bad' | null
    useEffect(() => {
      const onChange = (e) => {
        const delta = e.detail?.delta || 0;
        setGlow(delta >= 0 ? 'good' : 'bad');
        setTimeout(() => setGlow(null), 1100);
      };
      window.addEventListener('vida:balance-changed', onChange);
      return () => window.removeEventListener('vida:balance-changed', onChange);
    }, []);
    const recent = useMemo(() => {
      const tx = (state.transactions||[]).map(t => ({ ...t, _kind:'tx' }));
      const tr = (state.transfers||[]).map(t => ({ ...t, _kind:'tr' }));
      return [...tx, ...tr].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0, 8);
    }, [state.transactions, state.transfers]);

    return (
      <div className="space-y-4 sm:space-y-5">
        {/* Hero patrimonio — tap para alternar privacy */}
        <Card className={`p-5 sm:p-8 anim-scale-in ${glow==='good'?'anim-glow-good':glow==='bad'?'anim-glow-bad':''}`}>
          <button onClick={togglePriv} className="press w-full text-left flex items-end justify-between gap-2 group">
            <div>
              <div className="text-sm text-zinc-500 inline-flex items-center gap-1.5">
                Patrimonio neto
                <Icon name={priv?'eye-off':'eye'} size={11} className="text-zinc-400 opacity-0 group-hover:opacity-100 transition"/>
              </div>
              <div className="mt-1 text-4xl sm:text-5xl font-semibold tracking-tight grad-ink ticker">
                {priv ? <span className="text-zinc-400">{fmtMoneyMasked}</span> : <CountUp value={total} format={v=>fmtMoney(v)}/>}
              </div>
            </div>
            <div className="text-zinc-300 dark:text-zinc-600 mb-2"><Icon name={priv?'eye-off':'eye'} size={16}/></div>
          </button>
          <div className={`mt-5 grid gap-2 sm:gap-3 ${accs.length<=2?'grid-cols-2':'grid-cols-2 sm:grid-cols-4'}`}>
            {accs.map(a => (
              <div key={a.id} className="p-3 rounded-2xl bg-paper-softer dark:bg-ink-softer">
                <div className="text-[11px] text-zinc-500 inline-flex items-center gap-1.5 truncate">
                  <span className="h-2 w-2 rounded-full shrink-0" style={{background:a.color}}/>
                  <span className="truncate">{a.name}</span>
                </div>
                <div className="mt-1 text-base font-semibold ticker truncate">{showAmt(a.balance||0)}</div>
              </div>
            ))}
          </div>
          <div className="mt-5 grid grid-cols-2 gap-3">
            <div className="p-3 rounded-2xl bg-accent-green/8" style={{boxShadow:'inset 0 0 0 1px rgba(48,209,88,.18)'}}>
              <div className="flex items-center gap-1.5 text-xs text-zinc-500"><Icon name="arrow-up" size={12}/> Ingresos · {fmtDate(today,{month:'long'})}</div>
              <div className="mt-1 text-xl font-semibold ticker" style={{color:'#30D158'}}>{showAmt(cur.inc)}</div>
            </div>
            <div className="p-3 rounded-2xl bg-accent-red/8" style={{boxShadow:'inset 0 0 0 1px rgba(255,69,58,.18)'}}>
              <div className="flex items-center gap-1.5 text-xs text-zinc-500"><Icon name="arrow-down" size={12}/> Gastos · {fmtDate(today,{month:'long'})}</div>
              <div className="mt-1 text-xl font-semibold ticker" style={{color:'#FF453A'}}>{showAmt(cur.exp)}</div>
            </div>
          </div>
        </Card>

        {/* Insights */}
        <Section title="Consejos · análisis automático">
          <InsightsPanel openTransfer={openNewTransfer}/>
        </Section>

        {/* Forecast + NetWorth — stack en mobile, dos col en desktop */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-3 sm:gap-4">
          <NetWorthChart/>
          <ForecastCard/>
        </div>

        {/* Recientes */}
        <Section title="Movimientos recientes" action={<button onClick={openNewTx} className="text-sm text-accent-blue inline-flex items-center gap-1 press"><Icon name="plus" size={12}/> Movimiento</button>}>
          {recent.length === 0 ? (
            <Card className="p-8 text-center">
              <Icon name="receipt" size={24} className="text-zinc-400"/>
              <p className="mt-2 text-zinc-500 text-sm">Sin movimientos. Empezá a registrar y verás todo aquí.</p>
            </Card>
          ) : (
            <Card className="overflow-hidden">
              {recent.map((it, i) => <LedgerRow key={(it._kind||'tx')+'_'+it.id} item={it} index={i} onEditTx={openEditTx} onEditTr={()=>{}}/>)}
            </Card>
          )}
        </Section>
      </div>
    );
  }

  function LedgerRow({ item, index, onEditTx, onEditTr, compact = false }) {
    const { state, actions } = useStore();
    if (item._kind === 'tr') {
      const fromA = state.accounts[item.from], toA = state.accounts[item.to];
      return (
        <button key={item.id} onClick={()=>onEditTr && onEditTr(item)} className={`w-full text-left flex items-center gap-3 ${compact?'p-3':'p-3 sm:p-4'} transition hover:bg-paper-softer dark:hover:bg-ink-softer press ${index>0?'hairline-b':''}`}>
          <div className="h-9 w-9 sm:h-10 sm:w-10 grid place-items-center rounded-xl sm:rounded-2xl bg-accent-blue/10 text-accent-blue shrink-0"><Icon name="arrow-left-right" size={16}/></div>
          <div className="min-w-0 flex-1">
            <div className="font-medium flex items-center gap-1.5 text-[14px]">
              Transferencia
              {item.verified && <Icon name="check-circle" size={11} className="text-accent-success"/>}
            </div>
            <div className="text-[11px] text-zinc-500 truncate">{fromA?.name||item.from} → {toA?.name||item.to} · {fmtDate(item.date,{day:'numeric',month:'short'})}{item.note?' · '+item.note:''}</div>
          </div>
          <div className="font-semibold ticker text-zinc-500 text-sm">{fmtMoney(item.amount)}</div>
        </button>
      );
    }
    const t = item;
    const verifiedToggle = (e) => {
      e.stopPropagation();
      actions.toggleVerified('tx', t.id);
      SoundFX.tap(); vibrate(8);
      Toast.push({ kind: t.verified ? 'info' : 'success', message: t.verified ? 'Verificación quitada' : 'Marcada como verificada', duration: 1800 });

  function FinanceMovimientos({ filter, setFilter, openNewTx, openEditTx, openEditTransfer }) {
    const { state } = useStore();
    const merged = useMemo(() => {
      const tx = (state.transactions||[]).map(t => ({ ...t, _kind:'tx', _ts: t.date }));
      const tr = filter.type === 'expense' || filter.type === 'income' ? [] : (state.transfers||[]).map(t => ({ ...t, _kind:'tr', _ts: t.date }));
      let arr = [...tx, ...tr];
      if (filter.type === 'income') arr = arr.filter(x => x._kind==='tx' && x.type==='income');
      else if (filter.type === 'expense') arr = arr.filter(x => x._kind==='tx' && x.type==='expense');
      else if (filter.type === 'transfer') arr = arr.filter(x => x._kind==='tr');
      if (filter.account && filter.account !== 'all') {
        arr = arr.filter(x => x._kind==='tx' ? x.account === filter.account : (x.from === filter.account || x.to === filter.account));
      }
      const q = (filter.q||'').toLowerCase().trim();
      if (q) {
        arr = arr.filter(x => {
          const acc = x._kind==='tx' ? (state.accounts[x.account]?.name||'') : ((state.accounts[x.from]?.name||'')+' '+(state.accounts[x.to]?.name||''));
          const blob = [x.category||'', x.note||'', x.type||'', acc, String(x.amount||'')].join(' ').toLowerCase();
          return blob.includes(q);
        });
      }
      arr.sort((a,b)=>(b._ts||'').localeCompare(a._ts||''));
      return arr;
    }, [state.transactions, state.transfers, state.accounts, filter]);

    return (
      <div className="space-y-4">
        <SearchFilter value={filter} onChange={setFilter}/>
        <div className="text-xs text-zinc-500 px-1">{merged.length} {merged.length===1?'registro':'registros'}</div>
        {merged.length === 0 ? (
          <Card className="p-10 text-center">
            <Icon name="search-x" size={28} className="text-zinc-400"/>
            <p className="mt-3 text-zinc-500">{filter.q ? 'Sin resultados para tu búsqueda.' : 'Sin movimientos registrados.'}</p>
            <Button className="mt-4" onClick={openNewTx}><Icon name="plus" size={16}/> Movimiento</Button>
          </Card>
        ) : (
          <Card className="overflow-hidden">
            {merged.slice(0, 200).map((it, i) => <LedgerRow key={(it._kind||'tx')+'_'+it.id} item={it} index={i} onEditTx={openEditTx} onEditTr={openEditTransfer}/>)}
            {merged.length > 200 && <div className="p-3 text-center text-[11px] text-zinc-400">Mostrando 200 de {merged.length}. Filtra para ver más.</div>}
          </Card>
        )}
      </div>
    );
  }

  function FinanceReportes() {
    const { state } = useStore();
    const today = todayISO();
    // Series mensuales últimos 6 meses (incluye actual)
    const months = useMemo(() => {
      const out = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date(today + 'T00:00:00'); d.setMonth(d.getMonth() - i);
        const k = isoOf(d).slice(0,7);
        const ms = monthSummary(state, k);
        const label = d.toLocaleDateString('es-CR', { month:'short' });
        out.push({ k, label, ...ms });
      }
      return out;
    }, [state, today]);
    const cur = months[months.length-1], prev = months[months.length-2];
    const avg3 = months.slice(-3).reduce((a,m)=>a+m.exp,0) / 3;
    const maxBar = Math.max(1, ...months.flatMap(m => [m.inc, m.exp]));

    return (
      <div className="space-y-5">
        {/* Comparativa mes vs anterior */}
        <Card className="p-5">
          <div className="text-[13px] font-semibold uppercase tracking-[0.08em] text-zinc-500 dark:text-zinc-400 mb-3">Mes actual vs anterior</div>
          <div className="grid grid-cols-3 gap-4">
            {[
              { l: 'Ingresos', cur: cur?.inc||0, prev: prev?.inc||0, color:'#30D158' },
              { l: 'Gastos',   cur: cur?.exp||0, prev: prev?.exp||0, color:'#FF453A' },
              { l: 'Neto',     cur: cur?.net||0, prev: prev?.net||0, color: (cur?.net||0)>=0 ? '#30D158' : '#FF453A' },
            ].map((row, i) => {
              const delta = row.cur - row.prev;
              const pct = row.prev ? ((row.cur/row.prev) - 1) * 100 : 0;
              const upGood = row.l === 'Ingresos' || row.l === 'Neto';
              const goodDelta = upGood ? delta >= 0 : delta <= 0;
              const deltaColor = goodDelta ? '#30D158' : '#FF453A';
              return (
                <div key={i}>
                  <div className="text-xs text-zinc-500">{row.l}</div>
                  <div className="text-lg font-semibold tracking-tight ticker mt-0.5" style={{color: row.color}}>{fmtMoney(row.cur)}</div>
                  {row.prev > 0 && (
                    <div className="text-[11px] tabular mt-1" style={{color: deltaColor}}>
                      {delta >= 0 ? '↑' : '↓'} {fmtMoney(Math.abs(delta))} · {pct >= 0 ? '+' : ''}{pct.toFixed(0)}%
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </Card>

        {/* Series 6 meses */}
        <Card className="p-5">
          <div className="text-[13px] font-semibold uppercase tracking-[0.08em] text-zinc-500 dark:text-zinc-400 mb-3">Últimos 6 meses</div>
          <div className="grid grid-cols-6 gap-2">
            {months.map(m => (
              <div key={m.k} className="text-center">
                <div className="h-24 flex items-end gap-1 justify-center">
                  <div className="w-2 rounded-t-sm transition-all duration-700" title={`Ingresos: ${fmtMoney(m.inc)}`}
                       style={{ height: `${(m.inc/maxBar)*100}%`, minHeight: m.inc?'3px':'1px', background: '#30D158' }}/>
                  <div className="w-2 rounded-t-sm transition-all duration-700" title={`Gastos: ${fmtMoney(m.exp)}`}
                       style={{ height: `${(m.exp/maxBar)*100}%`, minHeight: m.exp?'3px':'1px', background: '#FF453A' }}/>
                </div>
                <div className="text-[10px] text-zinc-500 mt-1">{m.label}</div>
                <div className={`text-[10px] tabular ${m.net>=0?'text-accent-success':'text-accent-red'}`}>{m.net>=0?'+':''}{fmtMoney(m.net)}</div>
              </div>
            ))}
          </div>
          <div className="flex justify-center gap-4 mt-3 text-[11px]">
            <span className="inline-flex items-center gap-1.5"><span className="h-2 w-2 rounded-full bg-accent-success"/> Ingresos</span>
            <span className="inline-flex items-center gap-1.5"><span className="h-2 w-2 rounded-full bg-accent-red"/> Gastos</span>
            <span className="text-zinc-400">Promedio gasto 3M: {fmtMoney(avg3)}</span>
          </div>
        </Card>

        {/* Top categorías 3 meses */}
        <Card className="p-5">
          <div className="text-[13px] font-semibold uppercase tracking-[0.08em] text-zinc-500 dark:text-zinc-400 mb-3">Top gastos · últimos 3 meses</div>
          {(() => {
            const totals = {};
            months.slice(-3).forEach(m => Object.entries(m.byCat||{}).forEach(([c,v]) => { totals[c] = (totals[c]||0) + v; }));
            const sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0, 8);
            const sum = sorted.reduce((a,[,v])=>a+v,0) || 1;
            if (sorted.length === 0) return <p className="text-sm text-zinc-500">Sin gastos en los últimos 3 meses.</p>;
            return (
              <div className="space-y-2">
                {sorted.map(([cat,v]) => {
                  const pct = (v/sum)*100;
                  return (
                    <div key={cat}>
                      <div className="flex justify-between text-sm">
                        <span>{cat}</span>
                        <span className="text-zinc-500 tabular">{fmtMoney(v)} <span className="text-zinc-400">· {pct.toFixed(0)}%</span></span>
                      </div>
                      <div className="mt-1 h-1.5 bg-paper-softer dark:bg-ink-softer rounded-full overflow-hidden">
                        <div className="h-full bg-accent-red transition-all duration-700" style={{ width: pct + '%' }}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </Card>
      </div>
    );
  }
