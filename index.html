    const decFromCart = (id) => setCart(c => { const n = (c[id]||0)-1; const nc = {...c}; if (n<=0) delete nc[id]; else nc[id]=n; return nc; });
    const total = Object.entries(cart).reduce((a,[id,q]) => a + (event.items.find(i=>i.id===id)?.price||0)*q, 0);
    const cartCount = Object.values(cart).reduce((a,q)=>a+q,0);
    const completeSale = () => {
      if (cartCount === 0) return;
      const lines = Object.entries(cart).map(([itemId, qty]) => ({ itemId, qty, price: event.items.find(i=>i.id===itemId)?.price || 0 }));
      const salesBefore = (event.sales||[]).length;
      actions.addSale(event.id, { lines, method, note });
      setCart({}); setNote(''); SoundFX.cash(); vibrate(20);
      // Confetti más generoso en hito: primera venta de la feria
      const milestone = salesBefore === 0;
      fireConfetti({ count: milestone ? 100 : 30, originY: window.innerHeight*0.6 });
      Toast.push({ kind:'success', title: milestone ? '¡Primera venta!' : 'Venta cobrada', message: `+${fmtMoney(total)} · ${method}` });
    };
    return (
      <div className="grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-6">
        <div className="space-y-3">
          {event.items.length === 0 ? <Card className="p-10 text-center"><Icon name="package" size={28} className="text-zinc-400"/><p className="mt-3 text-zinc-500">Agrega productos primero.</p></Card> : (
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 stagger">
              {event.items.map(it => { const q = cart[it.id]||0; return (
                <button key={it.id} onClick={()=>addToCart(it.id)} className="press group relative p-4 rounded-3xl bg-white dark:bg-ink-soft hairline hover:shadow-soft transition text-left">
                  <div className="h-12 w-12 grid place-items-center rounded-2xl bg-accent-orange/10 text-accent-orange mb-3"><Icon name="gem" size={20}/></div>
                  <div className="font-medium truncate">{it.name}</div>
                  <div className="text-sm text-zinc-500">{fmtMoney(it.price)}</div>
                  {q>0 && <span className="absolute top-3 right-3 h-7 min-w-[28px] px-2 grid place-items-center rounded-full bg-ink text-white text-xs font-semibold dark:bg-white dark:text-ink anim-pop">{q}</span>}
                </button>
              ); })}
            </div>
          )}
        </div>
        <Card className="p-5 h-max lg:sticky lg:top-24">
          <h3 className="font-semibold mb-3">Venta actual</h3>
          {cartCount === 0 ? <p className="text-sm text-zinc-500">Toca un producto para empezar.</p> : (
            <div className="space-y-2 mb-4">
              {Object.entries(cart).map(([id, q]) => { const it = event.items.find(i=>i.id===id); if (!it) return null; return (
                <div key={id} className="flex items-center gap-2 anim-in">
                  <div className="flex-1 min-w-0"><div className="font-medium truncate">{it.name}</div><div className="text-xs text-zinc-500">{fmtMoney(it.price)} c/u</div></div>
                  <button onClick={()=>{SoundFX.tap(); decFromCart(id);}} className="press h-8 w-8 grid place-items-center rounded-lg bg-paper-softer dark:bg-ink-softer"><Icon name="minus" size={14}/></button>
                  <span className="w-6 text-center font-semibold ticker">{q}</span>
                  <button onClick={()=>addToCart(id)} className="press h-8 w-8 grid place-items-center rounded-lg bg-paper-softer dark:bg-ink-softer"><Icon name="plus" size={14}/></button>
                </div>
              );})}
            </div>
          )}
          <div className="hairline-b -mx-5 px-5 pb-4 mb-4"><div className="flex justify-between text-lg font-semibold"><span>Total</span><span className="ticker">{fmtMoney(total)}</span></div></div>
          <div className="space-y-3">
            <div><span className="text-sm text-zinc-500">Método</span>
              <div className="mt-1 grid grid-cols-3 gap-2">{['efectivo','sinpe','tarjeta'].map(m => (
                <button key={m} onClick={()=>{SoundFX.tap(); setMethod(m);}} className={`press h-10 rounded-xl text-sm font-medium capitalize ${method===m ? 'bg-ink text-white dark:bg-white dark:text-ink':'bg-paper-softer dark:bg-ink-softer'}`}>{m}</button>
              ))}</div>
            </div>
            <Input placeholder="Nota (opcional)" value={note} onChange={e=>setNote(e.target.value)}/>
            <Button className="w-full" size="lg" disabled={cartCount===0} onClick={completeSale} sound={null}><Icon name="check" size={18}/> Cobrar {total>0 && fmtMoney(total)}</Button>
          </div>
        </Card>
        {event.sales.length > 0 && (
          <div className="lg:col-span-2">
            <Section title="Ventas recientes">
              <Card className="overflow-hidden">
                {event.sales.slice().reverse().slice(0,12).map((s,i) => { const lines = s.lines||[]; return (
                  <div key={s.id} className={`flex items-center gap-4 p-4 anim-in ${i>0?'hairline-b':''}`}>
                    <div className="h-10 w-10 grid place-items-center rounded-2xl bg-accent-green/10 text-accent-green"><Icon name="receipt" size={18}/></div>
                    <div className="flex-1 min-w-0"><div className="font-medium truncate">{lines.map(l=>`${l.qty}× ${event.items.find(i=>i.id===l.itemId)?.name||'?'}`).join(', ')}</div><div className="text-xs text-zinc-500">{new Date(s.ts).toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit'})} · {s.method}{s.note?' · '+s.note:''}</div></div>
                    <div className="font-semibold text-accent-green ticker">+{fmtMoney(s.total)}</div>
                    <button onClick={()=>{ if (confirm('¿Eliminar esta venta?')) { actions.removeSale(event.id, s.id); SoundFX.uncheck(); } }} className="press h-8 w-8 grid place-items-center rounded-lg hover:bg-paper-softer dark:hover:bg-ink-softer text-zinc-400 hover:text-accent-red"><Icon name="x" size={14}/></button>
                  </div>
                );})}
              </Card>
            </Section>
          </div>
        )}
      </div>
    );
  }

  function SummaryTab({ event }) {
    const total = event.sales.reduce((a,s)=>a+s.total,0);
    const cash = event.sales.filter(s=>s.method==='efectivo').reduce((a,s)=>a+s.total,0);
    const sinpe = event.sales.filter(s=>s.method==='sinpe').reduce((a,s)=>a+s.total,0);
    const tarjeta = event.sales.filter(s=>s.method==='tarjeta').reduce((a,s)=>a+s.total,0);
    const itemStats = event.items.map(it => { const sold = event.sales.reduce((a,s)=> a + (s.lines||[]).filter(l=>l.itemId===it.id).reduce((aa,l)=>aa+l.qty,0), 0); return { ...it, sold, subtotal: sold*it.price }; }).sort((a,b)=>b.sold-a.sold);
    const top = itemStats[0]; const ticketAvg = event.sales.length ? total/event.sales.length : 0;
    return (
      <div className="space-y-5 stagger">
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <Card className="p-4"><div className="text-xs text-zinc-500">Total</div><div className="text-2xl font-semibold mt-1 ticker" style={{color:'#30D158'}}>{fmtMoney(total)}</div></Card>
          <Card className="p-4"><div className="text-xs text-zinc-500">Ventas</div><div className="text-2xl font-semibold mt-1 ticker">{event.sales.length}</div></Card>
          <Card className="p-4"><div className="text-xs text-zinc-500">Ticket promedio</div><div className="text-2xl font-semibold mt-1 ticker">{fmtMoney(ticketAvg)}</div></Card>
          <Card className="p-4"><div className="text-xs text-zinc-500">Más vendido</div><div className="text-base font-semibold mt-1 truncate">{top?top.name:'—'}</div><div className="text-xs text-zinc-500">{top?top.sold+' uds':''}</div></Card>
        </div>
        <Card className="p-5">
          <h3 className="font-semibold mb-4">Métodos de pago</h3>
          {[['Efectivo',cash,'#30D158'],['Sinpe',sinpe,'#0A84FF'],['Tarjeta',tarjeta,'#5E5CE6']].map(([n,v,c]) => { const pct = total ? (v/total)*100 : 0; return (
            <div key={n} className="mb-3 last:mb-0">
              <div className="flex justify-between text-sm"><span>{n}</span><span className="text-zinc-500">{fmtMoney(v)} · {pct.toFixed(0)}%</span></div>
              <div className="mt-1.5 h-2 bg-paper-softer dark:bg-ink-softer rounded-full overflow-hidden"><div className="h-full transition-all duration-700" style={{width:pct+'%',background:c}}/></div>
            </div>
          );})}
          {event.openingFloat > 0 && (
            <div className="mt-4 pt-4 hairline-b">
              <div className="flex justify-between text-sm"><span>Vuelto inicial</span><span>{fmtMoney(event.openingFloat)}</span></div>
              <div className="flex justify-between text-sm font-semibold mt-1"><span>Efectivo en caja al cerrar</span><span style={{color:'#30D158'}}>{fmtMoney(event.openingFloat + cash)}</span></div>
            </div>
          )}
        </Card>
        <Card className="p-5">
          <h3 className="font-semibold mb-3">Por producto</h3>
          {itemStats.length === 0 ? <p className="text-sm text-zinc-500">Sin productos.</p> : (
            <div className="space-y-2">{itemStats.map(it => (
              <div key={it.id} className="flex items-center gap-3">
                <div className="flex-1 min-w-0"><div className="font-medium truncate">{it.name}</div><div className="text-xs text-zinc-500">{fmtMoney(it.price)} c/u</div></div>
                <div className="text-right"><div className="font-semibold ticker">{it.sold} <span className="text-zinc-400 font-normal text-sm">uds</span></div><div className="text-xs text-zinc-500">{fmtMoney(it.subtotal)}</div></div>
              </div>
            ))}</div>
          )}
        </Card>
      </div>
    );
  }

  /* =========================================================
     SALUD — sueño, hidratación, entrenos
     ========================================================= */
  const WORKOUT_TYPES = ['Fuerza', 'Cardio', 'Flexibilidad', 'Deporte'];

  function SleepForm({ open, onClose, existing = null }) {
    const { actions } = useStore();
    const [date, setDate] = useState(todayISO());
    const [hours, setHours] = useState(7);
    const [quality, setQuality] = useState(3);
    const [bedtime, setBedtime] = useState('23:00');
    const [wakeTime, setWakeTime] = useState('06:30');
    const [notes, setNotes] = useState('');
    const isEdit = !!existing;
    useEffect(() => {
      if (!open) return;
      if (existing) {
        setDate(existing.date || todayISO());
        setHours(existing.h || 7);
        setQuality(existing.quality || 3);
        setBedtime(existing.bedtime || '23:00');
        setWakeTime(existing.wakeTime || '06:30');
        setNotes(existing.notes || '');
      } else {
        setDate(todayISO()); setHours(7); setQuality(3); setBedtime('23:00'); setWakeTime('06:30'); setNotes('');
      }
    }, [open, existing]);
    const save = () => {
      try {
        const entry = { date, h: +hours, quality, bedtime, wakeTime, notes: notes.trim() };
        actions.addSleep(entry); SoundFX.success();
        Toast.success(`${(+hours).toFixed(1)}h · calidad ${quality}/5 · ${fmtDate(date,{day:'numeric',month:'short'})}`, { title:'Sueño registrado' });
      } catch (e) { console.error('addSleep failed:', e); Toast.error('No se pudo guardar'); }
      finally { onClose(); }
    };
    const remove = () => {
      if (!isEdit) return;
      const snap = { ...existing };
      try {
        actions.removeSleep(existing.date); SoundFX.uncheck();
        Toast.push({ kind:'info', message:'Registro de sueño eliminado', duration: 5500,
          action: { label:'Deshacer', onClick: () => { actions.addSleep(snap); Toast.success('Restaurado'); } } });
      } catch (e) {}
      finally { onClose(); }
    };
    return (
      <Sheet open={open} onClose={onClose} title={isEdit?'Editar sueño':'Registrar sueño'}
             footer={
               <div className="flex justify-end gap-2">
                 {isEdit && <Button variant="ghost" onClick={remove} className="text-accent-red mr-auto"><Icon name="trash-2" size={16}/> Eliminar</Button>}
                 <Button variant="ghost" onClick={onClose}>Cancelar</Button>
                 <Button onClick={save}>{isEdit?'Guardar':'Crear'}</Button>
               </div>
             }>
        <div className="space-y-4">
          <label className="block"><span className="text-sm text-zinc-500">Fecha</span><Input type="date" value={date} onChange={e=>setDate(e.target.value)} className="mt-1"/></label>
          <div className="grid grid-cols-2 gap-3">
            <label className="block"><span className="text-sm text-zinc-500">Horas</span><Input type="number" step="0.5" min="0" max="14" value={hours} onChange={e=>setHours(e.target.value)} icon="moon" className="mt-1"/></label>
            <label className="block"><span className="text-sm text-zinc-500">Calidad</span>
              <div className="mt-1 flex gap-1.5">
                {[1,2,3,4,5].map(q => (
                  <button key={q} onClick={()=>{SoundFX.tap(); setQuality(q);}} className={`press flex-1 h-11 rounded-2xl text-sm font-semibold transition ${quality===q ? 'bg-ink text-white dark:bg-white dark:text-ink' : 'bg-paper-softer dark:bg-ink-softer'}`}>{q}</button>
                ))}
              </div>
            </label>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <label className="block"><span className="text-sm text-zinc-500">Acostado</span><Input type="time" value={bedtime} onChange={e=>setBedtime(e.target.value)} className="mt-1"/></label>
            <label className="block"><span className="text-sm text-zinc-500">Despertó</span><Input type="time" value={wakeTime} onChange={e=>setWakeTime(e.target.value)} className="mt-1"/></label>
          </div>
          <label className="block"><span className="text-sm text-zinc-500">Notas (café tarde, ruido…)</span><Textarea rows={2} value={notes} onChange={e=>setNotes(e.target.value)}/></label>
        </div>
      </Sheet>
    );
  }

  function WorkoutForm({ open, onClose, existing = null }) {
    const { actions } = useStore();
    const [date, setDate] = useState(todayISO());
    const [type, setType] = useState('Fuerza');
    const [duration, setDuration] = useState(60);
    const [intensity, setIntensity] = useState('media');
    const [notes, setNotes] = useState('');
    const isEdit = !!existing;
    useEffect(() => {
      if (!open) return;
      if (existing) {
        setDate(existing.date || todayISO());
        setType(existing.type || 'Fuerza');
        setDuration(existing.duration || 60);
        setIntensity(existing.intensity || 'media');
        setNotes(existing.notes || '');
      } else {
        setDate(todayISO()); setType('Fuerza'); setDuration(60); setIntensity('media'); setNotes('');
      }
    }, [open, existing]);
    const save = () => {
      const d = parseInt(duration); if (!d) return;
      try {
        const payload = { date, type, duration: d, intensity, notes: notes.trim() };
        if (isEdit) { actions.updateWorkout(existing.id, payload); Toast.success('Entreno actualizado'); }
        else { actions.addWorkout(payload); Toast.success(`${type} · ${d} min`, { title:'Entreno registrado' }); }
        SoundFX.success();
      } catch (e) { console.error('save workout failed:', e); Toast.error('No se pudo guardar'); }
      finally { onClose(); }
    };
    const remove = () => {
      if (!isEdit) return;
      const snap = { ...existing };
      try {
        actions.removeWorkout(existing.id); SoundFX.uncheck();
        Toast.push({ kind:'info', message:'Entreno eliminado', duration: 5500,
          action: { label:'Deshacer', onClick: () => { actions.addWorkout(snap); Toast.success('Restaurado'); } } });
      } catch (e) {}
      finally { onClose(); }
    };
    return (
      <Sheet open={open} onClose={onClose} title={isEdit?'Editar entreno':'Registrar entreno'}
             footer={
               <div className="flex justify-end gap-2">
                 {isEdit && <Button variant="ghost" onClick={remove} className="text-accent-red mr-auto"><Icon name="trash-2" size={16}/> Eliminar</Button>}
                 <Button variant="ghost" onClick={onClose}>Cancelar</Button>
                 <Button onClick={save}>{isEdit?'Guardar':'Crear'}</Button>

        <div className="space-y-4">

          <div className="grid grid-cols-2 gap-3">
            <label className="block"><span className="text-sm text-zinc-500">Duración (min)</span><Input type="number" min="1" value={duration} onChange={e=>setDuration(e.target.value)} className="mt-1"/></label>
            <label className="block"><span className="text-sm text-zinc-500">Intensidad</span>
              <div className="mt-1 flex gap-1.5">
                {[['baja','baja'],['media','media'],['alta','alta']].map(([k,l]) => (
                  <button key={k} onClick={()=>{SoundFX.tap(); setIntensity(k);}} className={`press flex-1 h-11 rounded-2xl text-sm font-semibold capitalize transition ${intensity===k ? 'bg-ink text-white dark:bg-white dark:text-ink' : 'bg-paper-softer dark:bg-ink-softer'}`}>{l}</button>

          </div>
          <label className="block"><span className="text-sm text-zinc-500">Notas</span><Textarea rows={2} value={notes} onChange={e=>setNotes(e.target.value)}/></label>
        </div>

              <CountUp value={workoutsLast30.length} format={n=>Math.round(n)}/>
            </div>
            <div className="mt-2 text-xs text-zinc-500 relative">{workoutsThisWeek.length} esta semana · {Math.round(workoutsLast30.reduce((a,w)=>a+(w.duration||0),0)/60)}h totales</div>
          </Card>
        </div>

        {/* Correlación sueño vs cumplimiento */}
        {(()=>{
          const points = last30.map(d => {
            const sl = sleepArr.find(x=>x.date===d)?.h;
            if (!sl) return null;
            const ds = dayStatus(state, d);
            return { d, h: sl, score: ds.score, status: ds.status };
          }).filter(Boolean);
          if (points.length < 5) return null;
          const maxH = Math.max(...points.map(p=>p.h), 9);
          return (
            <Section title="Sueño vs cumplimiento del día">
              <Card className="p-5">
                <p className="text-xs text-zinc-500 mb-4">Cada punto es un día. Eje X: horas dormidas. Eje Y: % completado del día.</p>
                <div className="relative h-48 border-l border-b border-zinc-200 dark:border-zinc-700">
                  {points.map((p,i) => (
                    <div key={i} title={`${p.d}: ${p.h}h, ${Math.round(p.score*100)}%`}
                         className="absolute w-2.5 h-2.5 rounded-full -translate-x-1/2 translate-y-1/2"
                         style={{
                           left: `${(p.h/maxH)*100}%`,
                           bottom: `${p.score*100}%`,
                           background: p.status==='done'?'#30D158':p.status==='partial'?'#FF9F0A':p.status==='failed'?'#FF453A':'#0A84FF',
                         }}/>
                  ))}
                </div>
                <div className="flex justify-between mt-2 text-[11px] text-zinc-400">
                  <span>0h</span><span>{maxH.toFixed(0)}h sueño</span>
                </div>
              </Card>
            </Section>
          );
        })()}

        {/* Sueño reciente */}
        <Section title="Registros de sueño" action={<span className="text-sm text-zinc-500">{sleepArr.length} totales</span>}>
          {sleepArr.length === 0 ? (
            <Card className="p-10 text-center">
              <Icon name="moon" size={28} className="text-zinc-400"/>
              <p className="mt-3 text-zinc-500">Sin registros de sueño todavía.</p>
              <Button className="mt-4" onClick={()=>setSleepOpen(true)}><Icon name="plus" size={16}/> Registrar</Button>
            </Card>
          ) : (
            <Card className="overflow-hidden">
              {sleepArr.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0, 14).map((s, i) => (
                <button key={s.date} onClick={()=>openEditSleep(s)} className={`w-full text-left flex items-center gap-4 p-4 transition hover:bg-paper-softer dark:hover:bg-ink-softer press ${i>0?'hairline-b':''}`}>
                  <div className="h-10 w-10 grid place-items-center rounded-2xl bg-accent-purple/10 text-accent-purple"><Icon name="moon" size={18}/></div>
                  <div className="min-w-0 flex-1">
                    <div className="font-medium">{s.h}h <span className="text-zinc-400 font-normal text-sm">· calidad {s.quality}/5</span></div>
                    <div className="text-xs text-zinc-500 truncate">{fmtDate(s.date,{day:'numeric',month:'short',year:'numeric'})} · {s.bedtime || '—'} → {s.wakeTime || '—'}{s.notes?' · '+s.notes:''}</div>
                  </div>
                  <Icon name="chevron-right" size={14} className="text-zinc-400 shrink-0"/>
                </button>
              ))}
            </Card>
          )}
        </Section>

        {/* Entrenos */}
        <Section title="Entrenos" action={<span className="text-sm text-zinc-500">{workArr.length} totales</span>}>
          {workArr.length === 0 ? (
            <Card className="p-10 text-center">
              <Icon name="dumbbell" size={28} className="text-zinc-400"/>
              <p className="mt-3 text-zinc-500">Sin entrenos registrados.</p>
              <Button className="mt-4" onClick={openNewWorkout}><Icon name="plus" size={16}/> Registrar</Button>
            </Card>
          ) : (
            <Card className="overflow-hidden">
              {workArr.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0, 14).map((w, i) => (
                <button key={w.id} onClick={()=>openEditWorkout(w)} className={`w-full text-left flex items-center gap-4 p-4 transition hover:bg-paper-softer dark:hover:bg-ink-softer press ${i>0?'hairline-b':''}`}>
                  <div className="h-10 w-10 grid place-items-center rounded-2xl bg-accent-green/10 text-accent-green"><Icon name="dumbbell" size={18}/></div>
                  <div className="min-w-0 flex-1">
                    <div className="font-medium">{w.type} · {w.duration} min</div>
                    <div className="text-xs text-zinc-500 truncate">{fmtDate(w.date,{day:'numeric',month:'short',year:'numeric'})} · intensidad {w.intensity}{w.notes?' · '+w.notes:''}</div>
                  </div>
                  <Icon name="chevron-right" size={14} className="text-zinc-400 shrink-0"/>
                </button>
              ))}
            </Card>
          )}
        </Section>

        <SleepForm open={sleepOpen} onClose={()=>{ setSleepOpen(false); setEditingSleep(null); }} existing={editingSleep}/>
        <WorkoutForm open={workoutOpen} onClose={()=>{ setWorkoutOpen(false); setEditingWorkout(null); }} existing={editingWorkout}/>
      </div>
    );
  }

  /* =========================================================
     SHELL
     ========================================================= */
  const NAV = [
    { id: 'home',     label: 'Inicio',    icon: 'house' },
    { id: 'today',    label: 'Hoy',       icon: 'list-checks' },
    { id: 'calendar', label: 'Calendario',icon: 'calendar-days' },
    { id: 'finances', label: 'Finanzas',  icon: 'wallet' },
    { id: 'events',   label: 'Eventos',   icon: 'store' },
    { id: 'health',   label: 'Salud',     icon: 'heart-pulse' },
    { id: 'settings', label: 'Ajustes',   icon: 'settings' },
  ];
  // En mobile mostramos sólo 5 + 'Más' que abre un sheet con el resto
  const NAV_MOBILE_PRIMARY = ['home', 'today', 'finances', 'calendar'];
  const NAV_MOBILE_OVERFLOW = ['events', 'health', 'settings'];

  function App() {
    const { state, auth, syncStatus, actions } = useStore();
    const [showLogin, setShowLogin] = useState(!auth);
    const [route, setRoute] = useState('home');

    useEffect(() => { if (auth) setShowLogin(false); }, [auth]);

    // Materializar transacciones recurrentes + snapshot patrimonio (1 por sesión + cada hora)
    useEffect(() => {
      if (!state.profile.onboarded) return;
      const tick = () => {
        try { actions.materializeRecurring && actions.materializeRecurring(); } catch (e) {}
        try { actions.snapshotNetWorth && actions.snapshotNetWorth(); } catch (e) {}
      };
      tick();
      const id = setInterval(tick, 60 * 60 * 1000);
      return () => clearInterval(id);
    }, [state.profile.onboarded]);

    // Refresh icons on route change
    useEffect(() => {
      const tid = setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 0);
      return () => clearTimeout(tid);
    });

    // Listener global: milestones de racha
    useEffect(() => {
      const onStreak = (e) => {
        const { habit, streak } = e.detail || {};
        fireConfetti({ count: 120 });
        SoundFX.milestone?.();
        vibrate(30);
        Toast.push({
          kind:'success',
          title: streak >= 100 ? '¡Racha legendaria!' : streak >= 30 ? '¡30 días seguidos!' : `¡${streak} días seguidos!`,
          message: habit, duration: 5000,
        });
      };
      window.addEventListener('vida:streak', onStreak);
      return () => window.removeEventListener('vida:streak', onStreak);
    }, []);

    // Wake audio context on first interaction
    useEffect(() => {
      const wake = () => SoundFX.wake();
      window.addEventListener('pointerdown', wake, { once: true });
      window.addEventListener('keydown', wake, { once: true });
      return () => { window.removeEventListener('pointerdown', wake); window.removeEventListener('keydown', wake); };
    }, []);

    const go = (r) => { window.scrollTo({ top: 0, behavior: 'instant' }); SoundFX.nav(); setRoute(r); };

    if (showLogin && !auth) return <Login onSkip={()=>setShowLogin(false)}/>;
    if (!state.profile.onboarded) return <Onboarding onDone={()=>{}}/>;

    const [base, sub] = route.split(':');
    let view;
    if (base === 'home') view = <Dashboard go={go}/>;
    else if (base === 'today') view = <TodayView go={go}/>;
    else if (base === 'calendar') view = <CalendarView/>;
    else if (base === 'finances') view = <FinancesView/>;
    else if (base === 'events') view = sub ? <EventDetail id={sub} back={()=>go('events')}/> : <EventsList go={go}/>;
    else if (base === 'health') view = <HealthView/>;
    else if (base === 'settings') view = <SettingsView/>;
    else view = <Dashboard go={go}/>;

    const activeNav = base;

    const activeIdx = Math.max(0, NAV.findIndex(n => n.id === activeNav));

    return (
      <div className="min-h-full">
        <header className="sticky top-0 z-30 glass hairline-b" style={{paddingTop:'env(safe-area-inset-top)'}}>
          <div className="max-w-6xl mx-auto px-3 sm:px-6 h-12 sm:h-14 flex items-center gap-2 sm:gap-3">
            <div className="h-7 w-7 sm:h-8 sm:w-8 rounded-xl bg-ink dark:bg-white grid place-items-center text-white dark:text-ink shadow-soft"><Icon name="layers" size={14}/></div>
            <div className="font-semibold tracking-tight text-[15px] sm:text-base">Vida</div>
            <div className="ml-1 hidden sm:flex items-center gap-1.5 text-xs text-zinc-500"><SyncDot status={syncStatus}/> <SyncLabel status={syncStatus}/></div>
            <span className="sm:hidden inline-flex items-center"><SyncDot status={syncStatus}/></span>
            <div className="flex-1"/>
            <TopNavDesktop nav={NAV} activeIdx={activeIdx} onGo={go}/>
            {auth && auth.user.avatar && <img src={auth.user.avatar} alt="" className="h-7 w-7 sm:h-8 sm:w-8 rounded-full hairline ml-1 sm:ml-2"/>}
          </div>
        </header>

        <main className="max-w-6xl mx-auto px-3 sm:px-6 py-4 sm:py-10 pb-28 md:pb-10">
          <div key={route} className="view-enter">{view}</div>
        </main>

        <BottomTabbar nav={NAV} activeId={activeNav} onGo={go}/>
        <FAB go={go}/>
        <ToastStack/>
      </div>
    );
  }

  function TopNavDesktop({ nav, activeIdx, onGo }) {
    const wrapRef = useRef(null);
    const [pill, setPill] = useState({ left: 0, width: 0, opacity: 0 });
    useEffect(() => {
      const el = wrapRef.current?.querySelectorAll('button')[activeIdx];
      if (!el) return;
      const wrap = wrapRef.current.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      setPill({ left: r.left - wrap.left, width: r.width, opacity: 1 });
    }, [activeIdx, nav.length]);

    return (
      <nav ref={wrapRef} className="hidden md:flex topnav items-center gap-1">
        <span className="topnav-pill" style={{ transform: `translateX(${pill.left}px)`, width: pill.width, opacity: pill.opacity }}/>
        {nav.map((n, i) => (
          <button key={n.id} onClick={()=>onGo(n.id)}
                  className={`topnav-btn press-spring px-3 h-9 rounded-xl text-sm font-medium inline-flex items-center gap-2 transition-colors ${i===activeIdx ? 'text-ink dark:text-white' : 'text-zinc-500 hover:text-ink dark:hover:text-white'}`}>
            <Icon name={n.icon} size={14}/> {n.label}
          </button>
        ))}
      </nav>
    );
  }

  function FAB({ go }) {
    const [open, setOpen] = useState(false);
    // Cierre del menú al clickear fuera — sólo cuando está abierto, usando mousedown que dispara antes del click
    // Así no interferimos con clicks normales en otros botones de la app.
    useEffect(() => {
      if (!open) return;
      const close = (e) => {
        try {
          if (e.target && e.target.closest && !e.target.closest('[data-fab-root]')) setOpen(false);
        } catch (_) {}
      };
      document.addEventListener('mousedown', close);
      document.addEventListener('touchstart', close, { passive: true });
      return () => {
        document.removeEventListener('mousedown', close);
        document.removeEventListener('touchstart', close);
      };
    }, [open]);
    const trigger = (kind) => {
      const dest = ({ tx:'finances', todo:'today', transfer:'finances', pending:'finances', energy:'home', workout:'health', sleep:'health' })[kind] || 'home';
      go(dest);
      // dispara la intención para que la vista destino abra el form correspondiente
      setTimeout(() => window.dispatchEvent(new CustomEvent('vida:quick', { detail: kind })), 220);
      setOpen(false);
    };
    const actions = [
      { kind:'tx',       icon:'wallet',     label:'Movimiento', color:'#0A84FF' },
      { kind:'pending',  icon:'calendar-clock', label:'Pendiente', color:'#FF9F0A' },
      { kind:'transfer', icon:'arrow-left-right', label:'Transferir',  color:'#5E5CE6' },
      { kind:'todo',     icon:'list-checks',label:'Tarea',     color:'#30D158' },
      { kind:'energy',   icon:'zap',        label:'Energía',   color:'#FF375F' },
    ];
    return (
      <div className="md:hidden fixed right-4 z-40 pointer-events-none" data-fab-root
           style={{ bottom: 'calc(env(safe-area-inset-bottom, 0px) + 80px)' }}>
        {open && (
          <div className="absolute bottom-16 right-0 flex flex-col gap-2 items-end pointer-events-auto">
            {actions.map((a, i) => (
              <button key={a.kind} onClick={()=>{SoundFX.tap(); trigger(a.kind);}}
                      className="anim-fab press-spring inline-flex items-center gap-2 pl-3 pr-1 py-1 rounded-full bg-white dark:bg-ink-soft hairline shadow-lift"
                      style={{ animationOrder: i }}>
                <span className="text-[13px] font-semibold whitespace-nowrap">{a.label}</span>
                <span className="h-9 w-9 grid place-items-center rounded-full text-white" style={{background: a.color}}>
                  <Icon name={a.icon} size={16}/>
                </span>
              </button>
            ))}
          </div>
        )}
        <button onClick={()=>{ SoundFX.tap(); vibrate(8); setOpen(o => !o); }}
                className="pointer-events-auto press-spring h-14 w-14 rounded-full grid place-items-center text-white shadow-lift transition"
                style={{ background: open ? '#1c1c1e' : 'linear-gradient(135deg, #0A84FF, #5E5CE6)', transform: open ? 'rotate(45deg)' : 'none' }}>
          <Icon name="plus" size={22}/>
        </button>
      </div>
    );
  }

  function BottomTabbar({ nav, activeId, onGo }) {
    const [moreOpen, setMoreOpen] = useState(false);
    const primary = NAV_MOBILE_PRIMARY.map(id => nav.find(n => n.id === id)).filter(Boolean);
    const overflow = NAV_MOBILE_OVERFLOW.map(id => nav.find(n => n.id === id)).filter(Boolean);
    const isOverflowActive = overflow.some(n => n.id === activeId);
    // Calcular el índice visible en los 5 (4 + más)
    const slots = [...primary.map(n=>n.id), '__more'];
    let activeSlot = slots.indexOf(activeId);
    if (activeSlot === -1) activeSlot = isOverflowActive ? 4 : 0;
    return (
      <>
        <nav className="tabbar md:hidden">
          <div className="tabbar-grid">
            <span className="tabbar-pill" style={{ transform: `translateX(${activeSlot*100}%)` }}/>
            {primary.map((n, i) => (
              <button key={n.id} onClick={()=>{SoundFX.tap(); vibrate(6); onGo(n.id);}} data-active={n.id===activeId} className="tabbar-btn press-spring">
                <Icon name={n.icon} size={n.id===activeId ? 20 : 18}/>
                <span>{n.label}</span>
              </button>
            ))}
            <button onClick={()=>{SoundFX.tap(); vibrate(6); setMoreOpen(true);}} data-active={isOverflowActive} className="tabbar-btn press-spring">
              <Icon name={isOverflowActive ? 'circle' : 'ellipsis'} size={isOverflowActive ? 20 : 18}/>
              <span>Más</span>
            </button>
          </div>
        </nav>
        <Sheet open={moreOpen} onClose={()=>setMoreOpen(false)} title="Más">
          <div className="grid grid-cols-3 gap-3">
            {overflow.map(n => (
              <button key={n.id} onClick={()=>{ SoundFX.tap(); vibrate(8); onGo(n.id); setMoreOpen(false); }}
                      className={`press-spring rounded-2xl p-4 text-center transition ${n.id===activeId ? 'bg-ink text-white dark:bg-white dark:text-ink' : 'bg-paper-softer dark:bg-ink-softer'}`}>
                <div className="h-10 w-10 mx-auto mb-2 grid place-items-center rounded-2xl"
                     style={n.id===activeId ? {} : { background: 'rgba(0,0,0,.06)' }}>
                  <Icon name={n.icon} size={18}/>
                </div>
                <div className="text-[13px] font-semibold">{n.label}</div>
              </button>
            ))}
          </div>
        </Sheet>
      </>
    );
  }

  /* =========================================================
     ERROR BOUNDARY — evita que un error de render ponga la pantalla en negro.
     ========================================================= */
  class ErrorBoundary extends React.Component {
    constructor(props){ super(props); this.state={hasError:false,error:null}; }
    static getDerivedStateFromError(error){ return {hasError:true, error}; }
    componentDidCatch(error, info){ try{ console.error('Vida ErrorBoundary:', error, info); }catch(e){} }
    reset = () => this.setState({hasError:false, error:null});
    render(){
      if (this.state.hasError) {
        return (
          <div className="min-h-full grid place-items-center p-6">
            <div className="max-w-md text-center anim-in">
              <div className="h-14 w-14 rounded-3xl bg-accent-red/15 text-accent-red grid place-items-center mx-auto mb-4">
                <Icon name="alert-triangle" size={26}/>
              </div>
              <h1 className="text-2xl font-semibold tracking-tight">Algo se rompió</h1>
              <p className="text-zinc-500 dark:text-zinc-400 mt-2">No te preocupes — tus datos están guardados. Toca el botón para volver al inicio.</p>
              <pre className="text-[11px] text-zinc-400 mt-3 max-h-32 overflow-auto bg-paper-softer dark:bg-ink-soft p-2 rounded-xl text-left">{String(this.state.error)}</pre>
              <button onClick={this.reset} className="mt-4 inline-flex items-center justify-center gap-2 h-10 px-5 rounded-2xl bg-ink text-white dark:bg-white dark:text-ink font-medium press-spring">
                Reintentar
              </button>
            </div>
          </div>
        );
      }
      return this.props.children;
    }
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<ErrorBoundary><StoreProvider><App /></StoreProvider></ErrorBoundary>);

  setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 50);

  /* =========================================================
     Service Worker — instalación y actualización
     ========================================================= */
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        // Cuando hay un nuevo SW esperando, lo activamos al instante
        if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              // Hay versión nueva esperando — al próximo navigate se sirve
            }
          });
        });
      }).catch(()=>{});
    });
  }

  /* Hook global para reinstalar (botón en Ajustes) */
  window.__vidaReinstall = async () => {
    try {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    } catch (_) {}
    location.reload();
  };

  /* Detectar si la app corre en modo standalone (instalada) */
  window.__vidaInstalled = () =>
    window.matchMedia('(display-mode: standalone)').matches ||
    (window.navigator.standalone === true);
  </script>
</body>
</html>
