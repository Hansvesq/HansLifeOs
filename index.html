<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#F2F2F7" />
<title>Hans OS</title>
<link rel="manifest" href="#" id="manifest-placeholder">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23667eea'/%3E%3Cstop offset='1' stop-color='%23764ba2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='system-ui' font-weight='700'%3EH%3C/text%3E%3C/svg%3E">

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap');
/* ============ MOBILE-FIRST OVERRIDES ============ */
/* Prevent overscroll bounce on iOS */
html { height: -webkit-fill-available; }
body { min-height: -webkit-fill-available; overscroll-behavior: none; }

/* Fix 100vh on mobile (URL bar issue) */
#app { min-height: 100vh; min-height: 100dvh; }

:root {
  --bg:#F2F2F7; --bg-elevated:#FFFFFF; --bg-tertiary:#FAFAFA;
  --bg-hover:rgba(0,0,0,0.04); --bg-pressed:rgba(0,0,0,0.08);
  --text:#1a1a2e; --text-secondary:rgba(60,60,67,0.60); --text-tertiary:rgba(60,60,67,0.30);
  --separator:rgba(60,60,67,0.10);
  --blue:#007AFF; --blue-d:rgba(0,122,255,0.10);
  --green:#34C759; --green-d:rgba(52,199,89,0.10);
  --orange:#FF9500; --orange-d:rgba(255,149,0,0.10);
  --red:#FF3B30; --red-d:rgba(255,59,48,0.10);
  --purple:#AF52DE; --purple-d:rgba(175,82,222,0.10);
  --pink:#FF2D55; --pink-d:rgba(255,45,85,0.10);
  --indigo:#5856D6; --indigo-d:rgba(88,86,214,0.10);
  --teal:#30B0C7; --teal-d:rgba(48,176,199,0.10);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.04);
  --shadow:0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 30px rgba(0,0,0,0.08);
  --shadow-xl:0 20px 40px rgba(0,0,0,0.12);
  --r-sm:12px; --r-md:16px; --r-lg:22px; --r-xl:28px;
  --font:'DM Sans',system-ui,sans-serif;
  --font-display:'DM Serif Display',serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,monospace;
  --ease:cubic-bezier(0.16,1,0.3,1);
  --tab-bar-h:0px;
  --safe-bottom:env(safe-area-inset-bottom,20px);
}
[data-theme="dark"] {
  --bg:#0a0a0f; --bg-elevated:#161620; --bg-tertiary:#1e1e2d;
  --bg-hover:rgba(255,255,255,0.06); --bg-pressed:rgba(255,255,255,0.1);
  --text:#f0f0f5; --text-secondary:rgba(235,235,245,0.55); --text-tertiary:rgba(235,235,245,0.25);
  --separator:rgba(84,84,88,0.4);
  --blue:#0A84FF; --blue-d:rgba(10,132,255,0.18);
  --green:#30D158; --green-d:rgba(48,209,88,0.18);
  --orange:#FF9F0A; --orange-d:rgba(255,159,10,0.18);
  --red:#FF453A; --red-d:rgba(255,69,58,0.18);
  --purple:#BF5AF2; --purple-d:rgba(191,90,242,0.18);
  --pink:#FF375F; --pink-d:rgba(255,55,95,0.18);
  --indigo:#5E5CE6; --indigo-d:rgba(94,92,230,0.18);
  --teal:#40C8E0; --teal-d:rgba(64,200,224,0.18);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.3);
  --shadow:0 2px 8px rgba(0,0,0,0.4);
  --shadow-lg:0 8px 30px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;min-height:100vh;overscroll-behavior-y:none}
body{overflow-x:hidden}
button,input,textarea,select{font-family:inherit;font-size:inherit;color:inherit;background:none;border:none;outline:none}
button{cursor:pointer}
a{color:var(--blue);text-decoration:none}
::selection{background:var(--blue);color:#fff}

#app{display:grid;grid-template-columns:220px 1fr;min-height:100vh;min-height:100dvh}
@media(max-width:900px){#app{grid-template-columns:1fr}:root{--tab-bar-h:calc(72px + env(safe-area-inset-bottom, 20px))}}

/* SIDEBAR */
.sidebar{background:var(--bg);border-right:1px solid var(--separator);padding:20px 12px;position:sticky;top:0;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow-y:auto}
@media(max-width:900px){.sidebar{display:none}}
.brand{padding:8px 12px 24px;display:flex;align-items:center;gap:10px}
.brand-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#667eea,#764ba2);display:grid;place-items:center;color:#fff;font-weight:700;font-size:18px;box-shadow:0 4px 12px rgba(102,126,234,0.3)}
.brand-text{line-height:1.15}
.brand-name{font-family:var(--font-display);font-size:16px;letter-spacing:0.01em}
.brand-sub{font-size:10px;color:var(--text-secondary);font-weight:400;display:block;margin-top:1px}
.sb-label{padding:16px 14px 6px;font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.08em}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px;font-weight:500;color:var(--text);width:100%;text-align:left;transition:all 0.15s;margin-bottom:2px}
.sb-item:hover{background:var(--bg-hover)}
.sb-item.active{background:var(--bg-elevated);box-shadow:var(--shadow-sm);font-weight:600}
.sb-item .icon{width:20px;height:20px;display:grid;place-items:center;color:var(--text-secondary)}
.sb-item.active .icon{color:var(--blue)}
.sb-item .lbl{flex:1}
.sb-item .count{font-size:10px;font-weight:700;background:var(--blue);color:#fff;padding:2px 7px;border-radius:100px;min-width:18px;text-align:center}
.sb-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--separator)}

/* TAB BAR */
.tab-bar{
  display:none;position:fixed;bottom:0;left:0;right:0;
  padding:10px 4px 0;
  padding-bottom:calc(10px + env(safe-area-inset-bottom, 18px));
  background:rgba(242,242,247,0.96);
  backdrop-filter:saturate(180%) blur(30px);
  -webkit-backdrop-filter:saturate(180%) blur(30px);
  border-top:0.5px solid var(--separator);
  z-index:200}
[data-theme="dark"] .tab-bar{background:rgba(10,10,15,0.96)}
@media(max-width:900px){.tab-bar{display:grid;grid-template-columns:repeat(5,1fr)}}
.tab-btn{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:3px;padding:4px 2px;border-radius:10px;color:var(--text-secondary);font-size:9.5px;font-weight:500;transition:color 0.15s;min-height:48px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.tab-btn .tico{width:28px;height:28px;display:grid;place-items:center}
.tab-btn .tico svg{width:22px;height:22px}
.tab-btn.active{color:var(--blue)}
.tab-btn.active .tico{background:var(--blue-d);border-radius:8px}
.tab-btn:active{opacity:0.6}
main{min-width:0;padding-bottom:calc(var(--tab-bar-h) + 8px)}

/* VIEW HERO AREAS - Different per tab */
.view-hero{padding:32px 32px 28px;position:relative;overflow:hidden}
@media(max-width:900px){.view-hero{padding:16px 20px 16px;padding-top:calc(16px + env(safe-area-inset-top,0px))}}
.view-hero .hero-bg{position:absolute;inset:0;z-index:0}
.view-hero>*{position:relative;z-index:1}
.view-hero .view-title{font-family:var(--font-display);font-size:32px;letter-spacing:-0.01em;line-height:1.1;margin-bottom:4px}
@media(max-width:600px){.view-hero .view-title{font-size:26px}}
.view-hero .view-subtitle{color:var(--text-secondary);font-size:14px;margin-bottom:0}
.hero-hoy .hero-bg{background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 50%,#ff9a9e 100%);opacity:0.15}
[data-theme="dark"] .hero-hoy .hero-bg{opacity:0.08}
.hero-habitos .hero-bg{background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%);opacity:0.12}
[data-theme="dark"] .hero-habitos .hero-bg{opacity:0.06}
.hero-metas .hero-bg{background:linear-gradient(135deg,#a18cd1 0%,#fbc2eb 100%);opacity:0.15}
[data-theme="dark"] .hero-metas .hero-bg{opacity:0.08}
.hero-finanzas .hero-bg{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);opacity:0.12}
[data-theme="dark"] .hero-finanzas .hero-bg{opacity:0.06}
.hero-ferias .hero-bg{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);opacity:0.12}
[data-theme="dark"] .hero-ferias .hero-bg{opacity:0.06}
.hero-vdl .hero-bg{background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);opacity:0.12}
[data-theme="dark"] .hero-vdl .hero-bg{opacity:0.06}

/* VIEW BODY */
.view-body{padding:0 32px 48px;max-width:1100px;margin:0 auto}
@media(max-width:900px){.view-body{padding:0 16px 32px}}

/* CARDS */
.card{background:var(--bg-elevated);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:20px;transition:transform 0.2s var(--ease)}
.card.clickable{cursor:pointer}
.card.clickable:active{transform:scale(0.99)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px}
.card-title{font-size:16px;font-weight:700;letter-spacing:-0.02em}
.card-subtitle{font-size:12px;color:var(--text-secondary)}

/* CHALLENGE CARD */
.challenge-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border-radius:var(--r-xl);padding:24px;box-shadow:0 12px 40px rgba(102,126,234,0.3);position:relative;overflow:hidden}
.challenge-card::before{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 70%)}
.challenge-card::after{content:"";position:absolute;left:-30px;bottom:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 70%)}

.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:100px;font-size:13px;font-weight:600;letter-spacing:-0.01em;background:var(--bg-elevated);color:var(--text);box-shadow:var(--shadow-sm);transition:all 0.15s var(--ease);min-height:40px}
.btn:hover{background:var(--bg-hover)}
.btn:active{transform:scale(0.96)}
.btn.primary{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(0,122,255,0.25)}
.btn.green{background:var(--green);color:#fff}
.btn.orange{background:var(--orange);color:#fff}
.btn.red{background:var(--red);color:#fff}
.btn.ghost{background:transparent;box-shadow:none;color:var(--blue)}
.btn.lg{padding:15px 28px;font-size:15px;min-height:52px}
.btn.sm{padding:6px 12px;font-size:12px}
.btn.block{width:100%}
.btn svg{width:16px;height:16px}
.btn-icon{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:var(--bg-hover);color:var(--text-secondary);transition:all 0.15s}
.btn-icon:hover{background:var(--bg-pressed);color:var(--text)}
.btn-icon:active{transform:scale(0.9)}
.btn-icon svg{width:16px;height:16px}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;background:var(--bg-hover);color:var(--text-secondary)}
.badge.blue{background:var(--blue-d);color:var(--blue)}
.badge.green{background:var(--green-d);color:var(--green)}
.badge.orange{background:var(--orange-d);color:var(--orange)}
.badge.red{background:var(--red-d);color:var(--red)}
.badge.purple{background:var(--purple-d);color:var(--purple)}
.badge.pink{background:var(--pink-d);color:var(--pink)}

.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;font-weight:500;color:var(--text-secondary);padding-left:2px}
.input,.field input,.field textarea,.field select{padding:13px 14px;border-radius:var(--r-sm);background:var(--bg-elevated);border:1.5px solid var(--separator);color:var(--text);font-size:16px;transition:border-color 0.2s;font-family:inherit;width:100%;-webkit-appearance:none;appearance:none}
[data-theme="dark"] .input,[data-theme="dark"] .field input,[data-theme="dark"] .field textarea,[data-theme="dark"] .field select{background:var(--bg-tertiary);border-color:transparent}
.input:focus,.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--blue)}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.segmented{display:inline-flex;background:rgba(120,120,128,0.12);padding:2px;border-radius:9px}
[data-theme="dark"] .segmented{background:rgba(118,118,128,0.24)}
.segmented .seg{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:500;transition:all 0.2s var(--ease)}
.segmented .seg.active{background:var(--bg-elevated);box-shadow:0 2px 6px rgba(0,0,0,0.06);font-weight:600}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;align-items:flex-end;justify-content:center;z-index:300;padding:0}
@media(min-width:601px){.modal-bg{align-items:center;padding:20px}}
.modal-bg.open{display:flex}
.modal{
  background:var(--bg);
  border-radius:22px 22px 0 0;
  width:100%;max-width:520px;
  max-height:90dvh;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:var(--shadow-xl);
  animation:modalSlide 0.35s var(--ease) both;
  padding-bottom:env(safe-area-inset-bottom, 0px);
}
@media(min-width:601px){.modal{border-radius:22px;padding-bottom:0}}
/* Drag handle for mobile sheet */
.modal::before{content:"";display:block;width:40px;height:4px;background:var(--separator);border-radius:2px;margin:10px auto 0;flex-shrink:0}
@media(min-width:601px){.modal::before{display:none}}
@keyframes modalSlide{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 14px;border-bottom:0.5px solid var(--separator);flex-shrink:0}
.modal-title{font-size:17px;font-weight:700;letter-spacing:-0.02em}
.modal-body{padding:16px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;display:flex;flex-direction:column;gap:12px}
.modal-foot{
  padding:12px 16px;
  padding-bottom:max(12px, env(safe-area-inset-bottom, 12px));
  border-top:0.5px solid var(--separator);
  display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;
  background:var(--bg);
}

.toast-wrap{position:fixed;top:calc(20px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:rgba(22,22,26,0.92);color:#fff;backdrop-filter:blur(20px);padding:12px 18px;border-radius:100px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);animation:toastIn 0.3s var(--ease) both;pointer-events:auto}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}

.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
@media(max-width:600px){.hide-sm{display:none !important}}
@keyframes viewEnter{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* ===== MOBILE EXPERIENCE OVERHAUL ===== */
@media(max-width:900px){
  /* Prevent iOS zoom on inputs */
  input,textarea,select{font-size:16px !important}
  
  /* View hero: compact on mobile */
  .view-hero{padding:14px 18px 14px !important;padding-top:calc(14px + env(safe-area-inset-top,0px)) !important}
  .view-hero .view-title{font-size:24px !important}
  .view-hero .view-subtitle{font-size:13px !important;margin-bottom:0 !important}

  /* View body */
  .view-body{padding:14px 16px 32px !important}

  /* Cards */
  .card{border-radius:16px !important;padding:16px !important}

  /* Bigger touch targets */
  .btn{min-height:44px !important;padding:10px 16px !important}
  .btn.lg{min-height:52px !important;padding:14px 24px !important;font-size:16px !important}
  .btn-icon{width:40px !important;height:40px !important}

  /* Grid: single column on small screens */
  .g2,.g3{grid-template-columns:1fr !important}
  
  /* Challenge card compact */
  .challenge-compact{padding:14px 16px !important}
  .challenge-compact .flex{flex-direction:column;gap:10px}

  /* Sale modal product grid: 2 cols on mobile (easier to tap) */
  .product-tiles-grid{grid-template-columns:repeat(2,1fr) !important}

  /* Make modal foot always sticky at bottom */
  .modal-foot{
    position:sticky;
    bottom:0;
    background:var(--bg);
    border-top:1px solid var(--separator);
    z-index:10;
    padding-bottom:max(16px, env(safe-area-inset-bottom,16px)) !important;
  }

  /* Full-width primary actions in modals */
  .modal-foot .btn.primary{flex:1 !important;max-width:none !important;justify-content:center !important}

  /* Habit list rows easier to tap */
  .habit-row{min-height:56px;padding:12px 16px !important}

  /* To-do items easier to tap */
  .todo-item{min-height:52px;padding:14px 16px !important}

  /* Tab icons bigger */
  .tab-btn .tico svg{width:24px !important;height:24px !important}
}

/* iOS safe area for when app is added to home screen */
@supports(padding:max(0px)){
  .tab-bar{
    padding-bottom:max(10px, env(safe-area-inset-bottom)) !important;
  }
  .modal-foot{
    padding-bottom:max(14px, env(safe-area-inset-bottom)) !important;
  }
}

/* Smooth scrolling everywhere */
*{-webkit-overflow-scrolling:touch}
.modal-body{scroll-behavior:smooth}

/* Remove hover effects on touch devices */
@media(hover:none){
  .card.clickable:hover{transform:none !important}
  .btn:hover{background:inherit !important;filter:none !important}
  .list-row:hover,.todo-item:hover,.habit-row:hover{background:inherit !important}
}

/* Active states for touch */
@media(hover:none){
  .card.clickable:active{transform:scale(0.98) !important;opacity:0.9}
  .btn:active{transform:scale(0.96) !important;opacity:0.85}
  .tab-btn:active{opacity:0.6 !important}
}

/* When installed as PWA / added to home screen */
@media all and (display-mode: standalone){
  .tab-bar{
    padding-bottom:max(16px, env(safe-area-inset-bottom)) !important;
  }
  .view-hero{
    padding-top:calc(20px + env(safe-area-inset-top,44px)) !important;
  }
}
</style>
</head>
<body>

<div id="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main>
    <div id="view"></div>
  </main>
</div>
<nav class="tab-bar" id="tab-bar"></nav>
<div class="modal-bg" id="modal-bg"><div class="modal" id="modal-content"></div></div>
<div class="toast-wrap" id="toasts"></div>

<style>
.hero-tareas .hero-bg{background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%);opacity:0.12}
[data-theme="dark"] .hero-tareas .hero-bg{opacity:0.06}
.habit-week{display:flex;gap:3px;margin-top:8px}
.habit-week .hw-dot{width:16px;height:16px;border-radius:4px;background:var(--bg-hover);transition:all 0.15s}
.habit-week .hw-dot.done{background:var(--green)}
.habit-week .hw-dot.today{border:2px solid var(--blue)}
.todo-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:0.5px solid var(--separator);transition:background 0.15s}
.todo-item:last-child{border-bottom:none}
.todo-item:hover{background:var(--bg-hover)}
.todo-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--text-tertiary);display:grid;place-items:center;flex-shrink:0;cursor:pointer;transition:all 0.2s}
.todo-check.done{background:var(--green);border-color:var(--green)}
.challenge-compact{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:var(--r-lg);padding:16px 18px;box-shadow:0 8px 24px rgba(102,126,234,0.25);display:flex;align-items:center;gap:16px;cursor:pointer;transition:transform 0.2s var(--ease)}
.challenge-compact:active{transform:scale(0.99)}
</style>

<script>
"use strict";

  const manifest={name:"Hans OS",short_name:"Hans OS",description:"Sistema de vida personal",start_url:".",display:"standalone",background_color:"#F2F2F7",theme_color:"#667eea",orientation:"portrait-primary",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23667eea'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='system-ui' font-weight='700'%3EH%3C/text%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"},{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23667eea'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='system-ui' font-weight='700'%3EH%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  document.getElementById("manifest-placeholder").href=url;
  
  // Register service worker for offline support
  if("serviceWorker" in navigator){
    const swCode=`
      const CACHE="hansos-v55";
      const ASSETS=["/"];
      self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
      self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
    `;
    const swBlob=new Blob([swCode],{type:"application/javascript"});
    const swUrl=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }
})();
